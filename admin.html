<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSbr — Painel de Controle ROOT v4.3</title>
    <!-- Motores Visuais -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --red: #E63946; --gold: #D4A24C; --bg: #050000; }
        body { 
            background: var(--bg); color: #eee; font-family: 'Space Grotesk', sans-serif; 
            background-image: radial-gradient(#1a0505 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .pixel { font-family: 'Press Start 2P', cursive; }

        /* DESIGN DO PAINEL ADMIN (VERMELHO ALERTA) */
        .admin-chassi {
            background: linear-gradient(145deg, #1a0808, #050000);
            border: 6px solid #3a1111; border-radius: 40px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.9), inset 0 0 20px rgba(230,57,70,0.1);
            position: relative;
        }

        .crt-admin {
            background: #0f0505; border: 8px solid #220a0a; border-radius: 20px;
            position: relative; overflow: hidden; box-shadow: inset 0 0 40px #000;
            font-family: 'Courier New', Courier, monospace;
        }
        .crt-admin::after {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%), linear-gradient(90deg, rgba(230, 57, 70, 0.05), rgba(0, 0, 0, 0), rgba(230, 57, 70, 0.05));
            z-index: 10; pointer-events: none; background-size: 100% 3px, 3px 100%;
        }

        .admin-btn {
            background: #2a0a0a; border-bottom: 4px solid #000; border-radius: 10px;
            padding: 15px; cursor: pointer; transition: 0.1s; text-align: center;
        }
        .admin-btn:active { transform: translateY(2px); border-bottom-width: 1px; background: var(--red); }
        
        .input-admin {
            background: #000; border: 1px solid #3a1111; padding: 12px; border-radius: 10px;
            width: 100%; font-size: 12px; outline: none; transition: 0.3s; color: #ff8888;
        }
        .input-admin:focus { border-color: var(--red); box-shadow: 0 0 15px rgba(230, 57, 70, 0.2); }
    </style>
</head>
<body class="hidden" id="root-access"> <!-- Só revela se for você -->

    <div class="min-h-screen flex items-center justify-center p-6">
        <div class="admin-chassi w-full max-w-5xl p-10">
            
            <!-- HEADER -->
            <div class="flex justify-between items-center mb-10 border-b border-red-900/30 pb-6">
                <div>
                    <h1 class="pixel text-red-600 text-[10px] mb-2 tracking-widest">CONSOLE_ROOT_OVERRIDE</h1>
                    <p class="text-[11px] text-gray-500 font-mono">ADMIN: <span class="text-white" id="current-admin"></span></p>
                </div>
                <button onclick="window.location.href='index.html'" class="pixel text-[8px] text-gray-600 hover:text-white">VOLTAR_P_ARENA</button>
            </div>

            <div class="grid grid-cols-12 gap-8">
                <!-- TELA DE MONITORAMENTO -->
                <div class="col-span-12 lg:col-span-7">
                    <div class="crt-admin h-[400px] p-6 text-red-500">
                        <div id="admin-logs" class="text-xs space-y-1">
                            <p>> ACESSO ROOT IDENTIFICADO...</p>
                            <p>> VERIFICANDO STATUS DA ARENA... [ONLINE]</p>
                            <p>> AGUARDANDO COMANDO DE MODERAÇÃO.</p>
                            <hr class="border-red-950 my-4">
                        </div>
                    </div>
                </div>

                <!-- CONTROLES LATERAIS -->
                <div class="col-span-12 lg:col-span-5 space-y-6">
                    <!-- REPOSITÓRIO DE KITS -->
                    <div class="bg-black/60 p-6 rounded-3xl border border-red-900/20">
                        <h3 class="pixel text-[8px] text-gold mb-4">DEPOSIT_SAMPLES_ZIP</h3>
                        <input type="text" id="kit-name" placeholder="TAG_DO_KIT (Ex: TRAP_DARK)" class="input-admin mb-3">
                        <input type="file" class="text-[9px] text-gray-500 mb-4 block">
                        <button onclick="alert('KIT INDEXADO COM SUCESSO!')" class="admin-btn w-full pixel text-[8px] text-white">SUBIR_KIT_P_ARENA</button>
                    </div>

                    <!-- TRIBUNAL DE BANIMENTO -->
                    <div class="bg-black/60 p-6 rounded-3xl border border-red-900/20">
                        <h3 class="pixel text-[8px] text-red-600 mb-4">TRIBUNAL_BAN_UNIT</h3>
                        <input type="text" id="ban-mail" placeholder="EMAIL_DO_TRAPACEIRO" class="input-admin mb-4">
                        <button onclick="confirmBan()" class="admin-btn w-full bg-red-900/20 border-red-600 text-red-500 pixel text-[8px]">EXECUTAR_EXPULSÃO</button>
                    </div>
                </div>
            </div>

            <!-- RODAPÉ -->
            <div class="mt-10 flex justify-between items-center text-[9px] font-mono text-gray-700">
                <span>SECURED_BY_PSBR_FIREWALL</span>
                <span class="pixel text-[7px]">SESSÃO_ATIVA_LIMITADA</span>
            </div>
        </div>
    </div>

    <!-- LÓGICA DE SEGURANÇA MESTRE -->
    <script type="module">
        import { auth } from './firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // 🟢 SUA CHAVE MESTRE DE ACESSO
        const MASTER_EMAIL = "eahprovideo1@gmail.com";

        onAuthStateChanged(auth, (user) => {
            if (user && user.email === MASTER_EMAIL) {
                // ACESSO CONCEDIDO
                document.getElementById('root-access').classList.remove('hidden');
                document.getElementById('current-admin').innerText = user.email.toUpperCase();
            } else {
                // ACESSO NEGADO - EXPULSA O USUÁRIO
                alert("ERRO_DE_SISTEMA: Você não possui privilégios ROOT.");
                window.location.href = "index.html";
            }
        });

        window.confirmBan = () => {
            const mail = document.getElementById('ban-mail').value;
            if(confirm(`DESEJA BANIR O USUÁRIO ${mail} POR 999 DIAS?`)) {
                alert("ORDEM EXECUTADA. USUÁRIO BLOQUEADO.");
            }
        };
    </script>
</body>
</html>
