<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>Perfect Sample BR — SUPREME v21</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #D4A24C; --orange: #ff5500; --bg: #000; --habbo-bg: #adadad; }
        
        /* 🕹️ MOTOR GRÁFICO HARDCORE PIXEL */
        * { 
            image-rendering: pixelated !important; 
            image-rendering: crisp-edges !important;
            font-smooth: never; -webkit-font-smoothing: none;
        }
        
        body { 
            background: #000; color: #fff; font-family: 'Space Grotesk', sans-serif; 
            margin: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; min-height: 100vh;
        }

        /* RESOLUÇÃO TRAVADA (GAME CORE) */
        #game-viewport {
            width: 1280px; height: 750px;
            display: none; position: relative;
            transform-origin: center;
            background: radial-gradient(circle, #111 0%, #000 100%);
        }

        /* CHASSI MPC - TEXTURA DE METAL INDUSTRIAL */
        .mpc-iron-v21 {
            background: #151515;
            background-image: 
                repeating-linear-gradient(0deg, transparent, transparent 1px, rgba(255,255,255,0.02) 1px, rgba(255,255,255,0.02) 2px),
                url('https://www.transparenttextures.com/patterns/brushed-alum.png');
            border: 6px solid #222; border-radius: 40px; padding: 30px; position: relative;
            box-shadow: 0 40px 100px #000, inset 4px 4px 0 #333, inset -4px -4px 0 #000;
            border-right: 30px solid #1a0f05;
        }

        /* AVATAR STACK ENGINE (CORPO INTEIRO 9:16) */
        .avatar-engine {
            width: 280px; height: 420px; background: #000; border: 4px solid #333;
            position: relative; display: flex; align-items: center; justify-content: center;
            box-shadow: inset 0 0 50px #000; overflow: hidden;
        }
        .av-layer {
            position: absolute; width: 220px; height: 350px;
            background-size: contain; background-repeat: no-repeat;
            bottom: 40px; pointer-events: none; transition: transform 0.2s ease;
        }

        /* HABBO UI REPLICA */
        .habbo-frame { background: #f0f0f0; border: 2px solid #000; box-shadow: 4px 4px 0 rgba(0,0,0,0.5); color: #000; }
        .habbo-head { background: #004f5d; padding: 8px 12px; color: #fff; font-size: 10px; display: flex; justify-content: space-between; }
        .habbo-tab { background: #adadad; border: 2px solid #000; padding: 10px; cursor: pointer; border-bottom: 0; font-size: 16px; }
        .habbo-tab.active { background: #f0f0f0; border-color: #000; padding-top: 14px; margin-top: -4px; }

        /* PADS DE BORRCHA */
        .mpc-pad {
            background: linear-gradient(180deg, #2a2a2a 0%, #0a0a0a 100%);
            border: 3px solid #444; border-bottom: 10px solid #000;
            border-radius: 12px; cursor: pointer; transition: 0.05s;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-family: 'Press Start 2P', cursive; font-size: 7px;
        }
        .mpc-pad:active { transform: translateY(6px); border-bottom-width: 4px; background: var(--orange); }

        /* LOJA RP STYLE */
        .store-card {
            background: #111; border: 4px solid #000; padding: 15px; text-align: center;
            transition: 0.2s; cursor: pointer; position: relative;
        }
        .store-card:hover { border-color: var(--gold); transform: scale(1.02); }
        .price-tag { background: var(--gold); color: #000; font-weight: bold; padding: 4px; border-radius: 5px; font-size: 10px; }

        .input-supreme { background: #fff; border: 3px solid #000; padding: 12px; width: 100%; color: #000; font-size: 12px; outline: none; }
    </style>
</head>
<body>

    <!-- LOADING VU-METER -->
    <div id="loading-screen" class="fixed inset-0 bg-[#050505] z-[9999] flex flex-col items-center justify-center">
        <img src="logo.png" style="width: 450px;" class="animate-pulse mb-8">
        <div class="pixel text-gold text-[12px] mb-4 uppercase">Initializing_Supreme_Engine...</div>
        <div id="vu-meter" class="flex gap-1 h-8 w-[500px] bg-[#111] p-1 border-4 border-[#333]"></div>
    </div>

    <div id="game-viewport">
        
        <!-- IDENTITY LAB (LOGIN / WARDROBE) -->
        <div id="auth-screen" class="fixed inset-0 z-[5000] bg-black/95 flex items-center justify-center hidden">
            <div class="habbo-frame w-[1150px] h-[780px] flex flex-col">
                <div class="habbo-head">
                    <span class="pixel text-[9px]">CONTRACT_REGISTRATION_V21</span>
                    <button onclick="location.reload()" class="font-bold">[X]</button>
                </div>
                
                <div class="flex flex-grow p-8 gap-8 overflow-hidden">
                    <!-- LOGIN/DADOS -->
                    <div class="w-80 flex flex-col justify-between">
                        <div class="bg-gray-300 border-2 border-gray-500 p-6 rounded">
                            <h3 class="pixel text-[7px] mb-4 border-b border-black pb-2 text-gray-700">AUTHORIZATION</h3>
                            <input type="email" id="u-email" placeholder="EMAIL" class="input-supreme mb-3">
                            <input type="password" id="u-pass" placeholder="CHAVE" class="input-supreme">
                            <div id="reg-extra" class="hidden mt-3">
                                <input type="text" id="u-nick" placeholder="NICKNAME" class="input-supreme">
                            </div>
                            <button onclick="handleAuth()" id="btn-auth-main" class="w-full bg-[#3d9a30] text-white py-4 border-b-8 border-[#1e4e18] font-bold text-sm mt-6 hover:brightness-110">CONECTAR</button>
                        </div>
                        <button onclick="toggleRegMode()" id="btn-reg-mode" class="text-xs text-gray-600 underline font-bold uppercase">Criar Contrato</button>
                    </div>

                    <!-- PERSONAGEM (HABBO IMAGER EMULATION) -->
                    <div class="flex-grow flex flex-col items-center justify-center bg-[# adadad] border-4 border-white rounded-xl shadow-2xl">
                        <div class="avatar-engine">
                            <div id="l-body" class="av-layer"></div>
                            <div id="l-bottoms" class="av-layer"></div>
                            <div id="l-tops" class="av-layer"></div>
                            <div id="l-hair" class="av-layer"></div>
                            <div id="l-acc" class="av-layer"></div>
                            <div style="position: absolute; bottom: 35px; width: 150px; height: 12px; background: rgba(0,0,0,0.5); border-radius: 50%; filter: blur(5px);"></div>
                        </div>
                        <div class="flex gap-4 mt-6">
                            <button class="bg-gray-300 p-4 border-2 border-black" onclick="rotate(-45)">◀</button>
                            <button class="bg-gray-300 p-4 border-2 border-black" onclick="rotate(45)">▶</button>
                        </div>
                    </div>

                    <!-- WARDROBE (ITEM SELECTOR) -->
                    <div class="w-[450px] flex flex-col bg-gray-200 border-2 border-gray-400 p-4">
                        <div class="flex mb-1" id="tabs">
                            <button class="habbo-tab active" onclick="setCat('body')">👤</button>
                            <button class="habbo-tab" onclick="setCat('hair')">💇</button>
                            <button class="habbo-tab" onclick="setCat('tops')">👕</button>
                            <button class="habbo-tab" onclick="setCat('bottoms')">👖</button>
                            <button class="habbo-tab" onclick="setCat('acc')">💎</button>
                        </div>
                        <div id="item-grid" class="grid grid-cols-4 gap-2 overflow-y-auto pr-2 flex-grow bg-white border-2 border-black p-4">
                            <!-- Items auto-load here -->
                        </div>
                        <button onclick="finishReg()" class="w-full bg-orange-600 text-white py-5 border-b-8 border-[#803300] font-bold text-sm mt-4">GRAVAR_IDENTIDADE</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- APP ARENA MPC (MAIN HARDWARE) -->
        <div id="app" class="mpc-iron-v21 hidden">
            <!-- HUD -->
            <div class="flex justify-between items-center mb-8 bg-black/90 p-8 border-4 border-black">
                <div class="flex items-center gap-8">
                    <div class="w-24 h-24 bg-black border-4 border-[#333] overflow-hidden relative">
                         <div id="hud-l-body" class="av-layer scale-50" style="bottom:-110px; left:-60px;"></div>
                         <div id="hud-l-tops" class="av-layer scale-50" style="bottom:-110px; left:-60px;"></div>
                    </div>
                    <div>
                        <h2 class="text-orange-500 text-[18px] uppercase font-black" id="user-display">---</h2>
                        <span class="text-emerald-500 text-[9px] pixel animate-pulse">SYSTEM_ACTIVE // 50% ROYALTIES</span>
                    </div>
                </div>
                <div class="text-right">
                    <span class="text-gold text-[28px] block font-black">1.500 <span class="text-xs">BC</span></span>
                    <button onclick="handleLogout()" class="text-red-600 text-[8px] underline uppercase font-bold">Log-out</button>
                </div>
            </div>

            <div class="grid grid-cols-12 gap-10">
                <!-- LCD DISPLAY -->
                <div class="col-span-8">
                    <div class="bg-[#050a05] border-[15px] border-[#000] h-[480px] p-10 flex flex-col justify-between shadow-2xl relative">
                        <div class="h-full flex flex-col justify-between font-mono text-emerald-500 relative z-10">
                             <div class="flex justify-between border-b border-white/5 pb-2 text-[12px]">
                                <span>KERNEL_V21_OMEGA</span>
                                <span id="socket-status" class="text-green-500">READY</span>
                             </div>
                             <div class="flex flex-col items-center">
                                <h1 class="pixel text-white text-[18px] mb-10 text-center leading-loose">START MATCHMAKING?</h1>
                                <button class="bg-[#003311] border-4 border-emerald-500 px-16 py-10 text-emerald-400 text-[14px] hover:bg-emerald-500 hover:text-black transition-all">CONECTAR_ARENA</button>
                             </div>
                        </div>
                    </div>
                </div>
                
                <!-- SIDEBAR MEMORY -->
                <div class="col-span-4 bg-black/40 border-4 border-black p-8 flex flex-col items-center justify-between shadow-inner">
                    <div class="avatar-engine w-full h-72 border-gold/20">
                         <div id="side-l-body" class="av-layer scale-50" style="bottom: -110px;"></div>
                         <div id="side-l-tops" class="av-layer scale-50" style="bottom: -110px;"></div>
                         <button onclick="openWardrobe()" class="absolute bottom-4 right-4 bg-gold text-black p-3 text-[12px] font-black border-4 border-black">👕 EDIT</button>
                    </div>
                    <div class="grid grid-cols-3 gap-2 w-full mt-6">
                        <button class="bg-black border-2 border-gold p-3 text-gold text-[10px] font-bold">S1</button>
                        <button class="bg-black border-2 border-gray-800 p-3 text-gray-800 text-[10px]">S2</button>
                        <button class="bg-black border-2 border-gray-800 p-3 text-gray-800 text-[10px]">S3</button>
                    </div>
                </div>
            </div>

            <!-- PADS -->
            <div class="grid grid-cols-4 gap-12 mt-12">
                <div class="mpc-pad"><span>ARENA</span></div>
                <div class="mpc-pad"><span>BPASS</span></div>
                <div id="admin-pad" class="mpc-pad hidden" onclick="window.location.href='admin.html'"><span class="text-red-500 font-bold">ROOT</span></div>
                <div class="mpc-pad border-gold/40" onclick="toggleStore()"><span class="text-gold font-bold">MARKET</span></div>
            </div>
        </div>

    </div>

    <!-- MARKETPLACE SUPREME (THE FIVE-M ENGINE) -->
    <div id="store-overlay" class="fixed inset-0 z-[6000] bg-black/98 hidden items-center justify-center p-12">
        <div class="mpc-iron-v21 w-[1150px] h-[750px] flex flex-col">
            <div class="flex justify-between items-center border-b-8 border-black pb-6 mb-8">
                <h2 class="text-gold text-[18px] uppercase tracking-widest font-black italic">Marketplace_RP_Supreme</h2>
                <button onclick="toggleStore()" class="text-red-600 text-[14px] font-bold">[X] CANCEL</button>
            </div>
            <div class="flex gap-10 flex-grow overflow-hidden">
                <!-- Sidebar Categorias -->
                <div class="w-80 space-y-4">
                    <button onclick="renderStore('vip')" class="w-full text-left p-6 bg-gold text-black text-[12px] font-black border-4 border-black">👑 PREMIUM BC</button>
                    <button onclick="renderStore('bt')" class="w-full text-left p-6 bg-[#222] text-gray-500 text-[12px] border-4 border-black">👕 VESTUÁRIO BT</button>
                    <button onclick="renderStore('kits')" class="w-full text-left p-6 bg-[#222] text-gray-500 text-[12px] border-4 border-black">🎹 DRUM KITS</button>
                </div>
                <!-- Grid de Produtos com Prévia -->
                <div class="flex-grow grid grid-cols-3 gap-8 overflow-y-auto pr-6" id="store-grid">
                    <!-- Itens carregados via Script -->
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        let visual = { body: 1, hair: 1, tops: 1, bottoms: 1, acc: 1 };
        let currentCat = 'body';
        let isRegister = false;

        // 1. ENGINE DE LOADING (VU METER)
        window.onload = () => {
            const vu = document.getElementById('vu-meter');
            for(let i=0; i<32; i++) {
                const s = document.createElement('div');
                s.className = "flex-1 bg-[#1a1a1a]";
                vu.appendChild(s);
            }
            let p = 0;
            const bits = vu.children;
            const interval = setInterval(() => {
                p++;
                if(p <= bits.length) {
                    const b = bits[p-1];
                    if(p < 18) b.style.backgroundColor = "#00ff66";
                    else if(p < 26) b.style.backgroundColor = "#ffff00";
                    else b.style.backgroundColor = "#ff0000";
                }
                if(p >= bits.length + 10) {
                    clearInterval(interval);
                    document.getElementById('loading-screen').style.display = 'none';
                    checkSession();
                }
            }, 60);
        };

        // 2. STACKING ENGINE (MONTAGEM DO BONECO)
        function updateRender() {
            const baseUrl = `https://api.dicebear.com/7.x/adventurer/svg?backgroundColor=transparent&seed=`;
            
            // Camadas do Boneco Lab
            document.getElementById('l-body').style.backgroundImage = `url('${baseUrl}body${visual.body}')`;
            document.getElementById('l-hair').style.backgroundImage = `url('${baseUrl}hair${visual.hair}')`;
            document.getElementById('l-tops').style.backgroundImage = `url('${baseUrl}tops${visual.tops}')`;
            document.getElementById('l-bottoms').style.backgroundImage = `url('${baseUrl}bottoms${visual.bottoms}')`;
            document.getElementById('l-acc').style.backgroundImage = `url('${baseUrl}acc${visual.acc}')`;

            // Sync HUD e Sidebar
            document.getElementById('hud-l-body').style.backgroundImage = `url('${baseUrl}body${visual.body}')`;
            document.getElementById('hud-l-tops').style.backgroundImage = `url('${baseUrl}tops${visual.tops}')`;
            document.getElementById('side-l-body').style.backgroundImage = `url('${baseUrl}body${visual.body}')`;
            document.getElementById('side-l-tops').style.backgroundImage = `url('${baseUrl}tops${visual.tops}')`;
        }

        window.setCat = (c) => { 
            currentCat = c; 
            document.querySelectorAll('.habbo-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            renderItems(); 
        };

        function renderItems() {
            const g = document.getElementById('item-grid'); g.innerHTML = '';
            for(let i=1; i<=30; i++) {
                if(i > 20) continue; // Filtro VIP
                const d = document.createElement('div');
                d.className = "bg-white border-2 border-black p-1 cursor-pointer hover:bg-gold/20 aspect-square";
                d.innerHTML = `<img src="https://api.dicebear.com/7.x/adventurer/svg?seed=${currentCat}${i}&backgroundColor=transparent">`;
                d.onclick = () => { visual[currentCat] = i; updateRender(); };
                g.appendChild(d);
            }
        }

        // 3. STORE ENGINE (FIVE-M RP STYLE)
        window.toggleStore = () => {
            const s = document.getElementById('store-overlay');
            s.style.display = (s.style.display === 'flex') ? 'none' : 'flex';
            if(s.style.display === 'flex') renderStore('vip');
        };

        window.renderStore = (type) => {
            const g = document.getElementById('store-grid'); g.innerHTML = '';
            const items = {
                vip: [
                    { name: "ICE CHAIN SUPREME", price: "500 BC", r: "LENDÁRIO", id: 15 },
                    { name: "TRAP MASK VVS", price: "350 BC", r: "ÉPICO", id: 22 },
                    { name: "GOLD WATCH", price: "900 BC", r: "LENDÁRIO", id: 11 }
                ],
                bt: [
                    { name: "BASIC HOODIE", price: "50 BT", r: "COMUM", id: 5 },
                    { name: "CARGO PANTS", price: "80 BT", r: "INCOMUM", id: 9 }
                ]
            };

            (items[type] || []).forEach(it => {
                g.innerHTML += `
                    <div class="store-card">
                        <span class="text-[8px] text-gold pixel">${it.r}</span>
                        <div class="w-full h-40 bg-black my-4 border-2 border-white/5 flex items-center justify-center overflow-hidden">
                             <img src="https://api.dicebear.com/7.x/adventurer/svg?seed=acc${it.id}&backgroundColor=transparent" class="scale-[2]">
                        </div>
                        <h4 class="text-[10px] mb-4 uppercase font-black">${it.name}</h4>
                        <button class="w-full bg-gold text-black py-4 font-black text-[12px] border-b-[8px] border-[#803300] hover:brightness-125">${it.price}</button>
                    </div>
                `;
            });
        }

        // 4. AUTH & SCALE
        function checkSession() {
            onAuthStateChanged(auth, (user) => {
                document.getElementById('game-viewport').style.display = 'flex';
                scaleUI();
                if (user) {
                    document.getElementById('auth-screen').classList.add('hidden');
                    document.getElementById('app').classList.remove('hidden');
                    document.getElementById('user-display').innerText = user.email.split('@')[0].toUpperCase();
                    if(user.email === 'eahprovideo1@gmail.com') document.getElementById('admin-pad').classList.remove('hidden');
                    updateRender();
                } else {
                    document.getElementById('auth-screen').classList.remove('hidden');
                    renderItems(); updateRender();
                }
            });
        }

        window.handleAuth = async () => {
            const e = document.getElementById('u-email').value;
            const p = document.getElementById('u-pass').value;
            try {
                if(isRegister) await createUserWithEmailAndPassword(auth, e, p);
                else await signInWithEmailAndPassword(auth, e, p);
            } catch (err) { alert("ERROR: " + err.message); }
        };

        window.toggleRegMode = () => {
            isRegister = !isRegister;
            document.getElementById('reg-extra').classList.toggle('hidden', !isRegister);
            document.getElementById('btn-auth-main').innerText = isRegister ? "CRIAR CONTRATO" : "CONECTAR";
        };

        function scaleUI() {
            const v = document.getElementById('game-viewport');
            const s = Math.min(window.innerWidth / 1350, window.innerHeight / 850);
            v.style.transform = `scale(${s})`;
        }
        window.addEventListener('resize', scaleUI);
        window.handleLogout = () => { if(confirm("Terminate Session?")) signOut(auth).then(() => location.reload()); };
    </script>
</body>
</html>
