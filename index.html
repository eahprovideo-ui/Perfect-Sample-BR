<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfect Sample BR — Arena MPC v4.3</title>
    <!-- Motores Visuais e de Rede -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #D4A24C; --orange: #ff5500; --bg: #050505; --screen: #0d1b10; }
        body { background: var(--bg); color: #eee; font-family: 'Space Grotesk', sans-serif; overflow: hidden; }
        .pixel { font-family: 'Press Start 2P', cursive; }

        /* BACKGORUND ANIMADO */
        #particle-canvas { position: fixed; inset: 0; z-index: -1; opacity: 0.3; }

        /* DESIGN DO HARDWARE MPC (METAL ESCOVADO) */
        .mpc-chassi {
            background: linear-gradient(135deg, #2a2a2a 0%, #111 100%);
            border: 10px solid #222; border-radius: 60px; padding: 40px; position: relative;
            border-right: 30px solid #1a0f05; box-shadow: 0 60px 120px rgba(0,0,0,0.9);
        }

        /* TELA LCD CRT */
        .lcd-display {
            background: var(--screen); border: 12px solid #050505; border-radius: 25px;
            position: relative; overflow: hidden; box-shadow: inset 0 0 80px #000;
        }
        .lcd-display::after {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.05));
            z-index: 10; pointer-events: none; background-size: 100% 3px, 3px 100%;
        }

        /* PADS DE BORRACHA */
        .mpc-pad {
            background: #333; border-bottom: 6px solid #000; border-radius: 12px;
            height: 100px; cursor: pointer; transition: 0.1s;
            display: flex; flex-direction: column; items: center; justify-content: center;
        }
        .mpc-pad:active { transform: translateY(4px); border-bottom-width: 1px; background: var(--orange); box-shadow: 0 0 40px var(--orange); }

        /* BOOT SCREEN */
        #auth-overlay { 
            position: fixed; inset: 0; background: #000; z-index: 1000; 
            display: flex; align-items: center; justify-content: center; flex-direction: column;
            transition: transform 1s cubic-bezier(0.87, 0, 0.13, 1);
        }
        .boot-hidden { transform: translateY(-100%); }
        .login-card { background: #0a0a0a; border: 2px solid var(--gold); padding: 50px; border-radius: 40px; width: 400px; text-align: center; }

        /* AVATAR SYSTEM */
        .avatar-engine { width: 160px; height: 180px; background: #000; border-radius: 25px; border: 2px solid #222; position: relative; overflow: hidden; }
        .av-layer { position: absolute; width: 100%; height: 100%; background-size: contain; background-repeat: no-repeat; image-rendering: pixelated; }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <!-- TELA DE LOGIN (BOOT SYSTEM) -->
    <div id="auth-overlay">
        <div class="login-card">
            <h2 class="pixel text-gold text-[10px] mb-8 tracking-widest">INITIALIZING_ARENA_v4.3</h2>
            <input type="email" id="email" placeholder="EMAIL_PRODUTOR" class="w-full bg-black border border-white/10 p-4 rounded-xl mb-4 text-xs outline-none focus:border-gold">
            <input type="password" id="pass" placeholder="SENHA_ACESSO" class="w-full bg-black border border-white/10 p-4 rounded-xl mb-8 text-xs outline-none focus:border-gold">
            <button onclick="handleAuth('login')" class="w-full bg-orange-600 text-white py-4 rounded-2xl font-bold text-xs mb-4 shadow-lg shadow-orange-900/20">LOGAR NA ARENA</button>
            <button onclick="handleAuth('register')" class="text-gray-600 text-[9px] pixel hover:text-white transition-colors">REGISTRAR_NOVA_IDENTIDADE</button>
        </div>
    </div>

    <!-- SITE PRINCIPAL (MPC HARDWARE) -->
    <div id="app" class="hidden mpc-chassi w-full max-w-6xl shadow-2xl relative">
        <!-- STATUS HUD -->
        <div class="flex justify-between items-center mb-10 bg-black/50 p-6 rounded-[35px] border border-white/5">
            <div class="flex items-center gap-5">
                <div class="w-14 h-14 bg-black border-2 border-orange-500/30 rounded-2xl flex items-center justify-center">
                    <span class="pixel text-gold text-lg" id="user-initial">P</span>
                </div>
                <div>
                    <h2 class="pixel text-[10px] text-orange-500" id="user-display">---</h2>
                    <span class="text-[9px] text-gray-500 uppercase font-bold tracking-widest">Patente: Legend Producer</span>
                </div>
            </div>
            <div class="flex gap-4">
                <div class="text-right">
                    <span class="block text-[8px] text-gray-600">BEAT_COINS</span>
                    <span class="text-gold font-bold text-lg">1,500 BC</span>
                </div>
                <div class="text-right border-l border-white/5 pl-6">
                    <span class="block text-[8px] text-gray-600">SERVER_STATUS</span>
                    <span class="text-green-500 font-bold text-[10px]" id="socket-status">CONNECTING...</span>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-12 gap-10">
            <!-- LCD SCREEN -->
            <div class="col-span-12 lg:col-span-8">
                <div class="lcd-display h-[450px] p-10 font-mono text-emerald-500">
                    <div id="screen-arena" class="h-full flex flex-col justify-between">
                        <div class="flex justify-between border-b border-emerald-950 pb-3">
                            <span class="pixel text-[8px] text-gold uppercase">Arena_Main_Frame</span>
                            <span class="text-[10px]" id="queue-status">FILA: 0/10</span>
                        </div>
                        <div class="flex-grow flex flex-col items-center justify-center">
                            <h2 class="pixel text-[10px] mb-8 text-white">READY FOR THE NEXT BATTLE?</h2>
                            <button onclick="window.startArena('TRAP')" class="px-8 py-4 bg-emerald-900/20 border-2 border-emerald-500 rounded-2xl pixel text-[9px] hover:bg-emerald-500 hover:text-black transition-all">START_TRAP_ARENA</button>
                        </div>
                        <div class="bg-black/40 p-4 rounded-xl border border-emerald-950">
                            <p class="text-[9px] text-emerald-800">> Aguardando sinal de Matchmaking...</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- SIDEBAR -->
            <div class="col-span-4 flex flex-col gap-6">
                <div class="bg-black/60 rounded-[45px] p-8 border border-white/5 h-[300px] flex flex-col items-center justify-center">
                    <div class="avatar-engine">
                        <div class="av-layer" id="av-base" style="background-image: url('https://api.dicebear.com/7.x/pixel-art/svg?seed=Junior')"></div>
                        <div class="av-layer" id="av-acc"></div>
                    </div>
                    <span class="pixel text-[8px] text-gold mt-5">IDENTITY_PREVIEW</span>
                </div>
                <div class="bg-black/60 rounded-[35px] p-5 border border-white/5 flex-grow text-center">
                     <span class="pixel text-[8px] text-orange-500">BATTLE_PASS: LVL 99</span>
                     <div class="w-full h-1 bg-black mt-4"><div class="h-full bg-orange-600 w-[99%]"></div></div>
                </div>
            </div>
        </div>

        <!-- PADS -->
        <div class="grid grid-cols-4 gap-6 mt-12">
            <div class="mpc-pad" onclick="window.playSound('click')"><span class="pixel text-[10px] text-white">ARENA</span></div>
            <div class="mpc-pad" onclick="window.playSound('click')"><span class="pixel text-[10px] text-white">PASS</span></div>
            <div class="mpc-pad" onclick="window.playSound('error')"><span class="pixel text-[10px] text-red-600">ANT_CHT</span></div>
            <div class="mpc-pad border-gold/30"><span class="pixel text-[10px] text-gold">LOJA</span></div>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // 🟢 CONEXÃO COM O RENDER (Seu Link Real)
        const socket = io("https://perfect-sample-br.onrender.com");

        socket.on('connect', () => {
            document.getElementById('socket-status').innerText = "LIVE_SERVER";
            document.getElementById('socket-status').className = "text-green-500 font-bold text-[10px]";
        });

        socket.on('queue_update', (data) => {
            document.getElementById('queue-status').innerText = `FILA: ${data.count}/10`;
        });

        socket.on('match_found_trigger', (data) => {
            alert("SALA ENCONTRADA! SEJA RÁPIDO.");
            console.log("Match ID:", data.matchId);
        });

        // FUNÇÃO DE BUSCA
        window.startArena = (style) => {
            window.playSound('click');
            socket.emit('join_ranked_queue', { 
                genre: style, 
                username: document.getElementById('user-display').innerText 
            });
        };

        // LÓGICA DE AUTH
        window.handleAuth = async (type) => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            try {
                let user;
                if(type === 'login') {
                    const cred = await signInWithEmailAndPassword(auth, email, pass);
                    user = cred.user;
                } else {
                    const cred = await createUserWithEmailAndPassword(auth, email, pass);
                    user = cred.user;
                }
                
                window.playSound('boot');
                document.getElementById('auth-overlay').classList.add('boot-hidden');
                setTimeout(() => {
                    document.getElementById('auth-overlay').style.display = 'none';
                    document.getElementById('app').classList.remove('hidden');
                    document.getElementById('user-display').innerText = user.email.split('@')[0].toUpperCase();
                    document.getElementById('user-initial').innerText = user.email[0].toUpperCase();
                }, 1000);
            } catch (err) {
                window.playSound('error');
                alert("ACESSO_NEGADO: " + err.message);
            }
        };

        // AUDIO ENGINE
        const aCtx = new (window.AudioContext || window.webkitAudioContext)();
        window.playSound = (type) => {
            const osc = aCtx.createOscillator();
            const g = aCtx.createGain();
            osc.connect(g); g.connect(aCtx.destination);
            if(type === 'boot') {
                osc.frequency.setValueAtTime(100, aCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(800, aCtx.currentTime + 1);
                g.gain.setValueAtTime(0.1, aCtx.currentTime);
                g.gain.linearRampToValueAtTime(0, aCtx.currentTime + 1);
            } else if(type === 'click') {
                osc.frequency.setValueAtTime(400, aCtx.currentTime);
                g.gain.setValueAtTime(0.1, aCtx.currentTime);
                osc.stop(aCtx.currentTime + 0.05);
            } else if(type === 'error') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(50, aCtx.currentTime);
                g.gain.setValueAtTime(0.1, aCtx.currentTime); osc.stop(aCtx.currentTime + 0.2);
            }
            osc.start();
        };

        // PARTICULAS
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let particles = [];
        for(let i=0; i<50; i++) particles.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: Math.random()*2, speed: Math.random()*0.5});
        function animate() {
            ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle = '#ff5500';
            particles.forEach(p => {
                p.y -= p.speed; if(p.y < 0) p.y = canvas.height;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
