<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>Perfect Sample BR — THE MACHINE v29.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root { --orange: #ff5500; --gold: #D4A24C; --matte: #121212; }
        * { image-rendering: pixelated; user-select: none; }
        
        body { 
            background: #000; margin: 0; overflow: hidden; 
            display: flex; align-items: center; justify-content: center; min-height: 100vh;
        }

        /* 🖼️ CONTAINER BASEADO NA IMAGEM (1200x800) */
        #mpc-master {
            width: 1200px; height: 800px;
            background-image: url('mpc_bg.png');
            background-size: contain;
            background-repeat: no-repeat;
            position: relative;
            transform-origin: center;
        }

        /* 📟 VISOR LCD (MAPA SOBRE A TELA VERDE) */
        .visor-area {
            position: absolute; top: 105px; left: 512px;
            width: 215px; height: 95px;
            display: flex; flex-direction: column;
            overflow: hidden; font-family: 'Press Start 2P'; color: #00ff66;
            text-shadow: 0 0 5px #00ff66; font-size: 5px; line-height: 1.4;
        }

        /* 👕 SIDEBAR (MÓDULO DE IDENTIDADE NO PAINEL PRETO) */
        .sidebar-module {
            position: absolute; top: 25px; left: 742px;
            width: 425px; height: 752px;
            padding: 40px; display: flex; flex-direction: column;
            background: transparent; /* Mantém o preto da foto */
        }

        /* 🕹️ GRID DE PADS INVISÍVEIS */
        .pads-overlay {
            position: absolute; top: 295px; left: 135px;
            width: 320px; height: 300px;
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
        }
        .invisible-pad {
            background: rgba(0,0,0,0.8); /* Preto fosco inicial */
            cursor: pointer; border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Press Start 2P'; font-size: 5px; color: #444;
            transition: 0.2s;
        }
        /* DEGRADÊ PARA FUNÇÕES ATIVAS */
        .pad-active {
            background: linear-gradient(180deg, #222 0%, #111 100%);
            border: 1px solid rgba(255, 85, 0, 0.3);
            color: #eee;
        }
        .pad-active:active { background: var(--orange); color: #000; box-shadow: 0 0 15px var(--orange); }

        /* INPUTS INTEGRADOS (ESTILO HARDWARE) */
        .input-hardware {
            background: #050505; border: 2px solid #222; 
            color: var(--gold); padding: 14px; font-size: 9px; 
            width: 100%; outline: none; border-radius: 5px;
            font-family: 'Space Grotesk';
        }
        .input-hardware:focus { border-color: var(--orange); }

        /* HABBO COMPACT UI */
        .habbo-mini-ui {
            background: #adadad; border: 3px solid #000;
            display: flex; flex-direction: column; height: 100%;
            box-shadow: 5px 5px 0 rgba(0,0,0,0.3);
        }
        .avatar-preview-box {
            background: #777; border-bottom: 3px solid #000; height: 280px;
            display: flex; align-items: center; justify-content: center; position: relative;
        }
        .layer { position: absolute; width: 140px; height: 240px; background-size: contain; background-repeat: no-repeat; bottom: 20px; }

        .visor-marquee {
            white-space: nowrap; position: absolute; bottom: 3px;
            animation: scroll 10s linear infinite; color: #00ff66; opacity: 0.8;
        }
        @keyframes scroll { from { left: 100%; } to { left: -100%; } }
    </style>
</head>
<body>

    <div id="mpc-master">
        
        <!-- 📟 VISOR LCD -->
        <div class="visor-area">
            <div class="mb-1 opacity-50">SISTEMA_V29.1_STABLE</div>
            <div id="visor-status">FILA: 0/10<br>KERNEL: OK<br>ARENA: READY</div>
            <div class="visor-marquee">SEJA BEM VINDO AO PERFECT SAMPLE BR — SUPREME ENGINE</div>
        </div>

        <!-- 🕹️ PADS MAPEADOS SOBRE A FOTO -->
        <div class="pads-overlay">
            <div class="invisible-pad pad-active" onclick="alert('Arena Ativa')">ARENA</div>
            <div class="invisible-pad pad-active" onclick="alert('Battle Pass')">PASS</div>
            <div class="invisible-pad pad-active" onclick="window.location.href='admin.html'">ROOT</div>
            <div class="invisible-pad pad-active" onclick="handleLogout()">OFF</div>
            <!-- Pads vazios (Preto Fosco) -->
            <script>for(let i=0; i<12; i++) document.write('<div class="invisible-pad"></div>');</script>
        </div>

        <!-- 👕 MÓDULO SIDEBAR (PAINEL DIREITO) -->
        <div class="sidebar-module">
            
            <!-- ESTADO: LOGIN (FORMATADO) -->
            <div id="auth-box" class="flex flex-col gap-4">
                <span class="pixel text-[8px] text-orange-500 uppercase tracking-widest mb-4">Contrato_Acesso</span>
                
                <div>
                    <label class="pixel text-[6px] text-gray-500 block mb-2">ENDEREÇO_MAIL</label>
                    <input type="email" id="u-email" placeholder="email@producer.com" class="input-hardware">
                </div>

                <div>
                    <label class="pixel text-[6px] text-gray-500 block mb-2">CHAVE_DNA</label>
                    <input type="password" id="u-pass" placeholder="••••••••" class="input-hardware">
                </div>

                <button onclick="handleAuth()" class="bg-gradient-to-b from-[#fde047] to-[#f97316] border-2 border-black py-4 mt-6 font-black text-[10px] uppercase text-black shadow-lg active:translate-y-1">Conectar</button>
                
                <button onclick="toggleRegMode()" id="btn-reg-mode" class="text-[7px] pixel text-gray-600 mt-4 hover:text-white transition-colors">Criar Novo Contrato</button>
            </div>

            <!-- ESTADO: APP (PÓS-LOGIN) -->
            <div id="app-box" class="hidden habbo-mini-ui">
                <div class="bg-[#004f5d] p-3 text-white text-[8px] font-bold flex justify-between border-b-2 border-black">
                    <span>ID_UNIT: <span id="user-display">---</span></span>
                    <span>1.500 BC</span>
                </div>
                
                <div class="avatar-preview-box">
                    <div id="l-body" class="layer"></div>
                    <div id="l-tops" class="layer"></div>
                    <div id="l-hair" class="layer"></div>
                    <div style="position: absolute; bottom: 20px; width: 100px; height: 8px; background: rgba(0,0,0,0.2); border-radius: 50%;"></div>
                </div>

                <div class="p-2 bg-white flex-grow grid grid-cols-3 gap-2 overflow-y-auto" id="item-grid">
                    <!-- Grade de itens -->
                </div>
                
                <button onclick="alert('Loja')" class="bg-orange-600 text-white py-4 font-bold pixel text-[8px] border-t-2 border-black">ABRIR MARKETPLACE</button>
            </div>

        </div>

    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        let isRegister = false;
        let figure = { hr: '115-42', hd: '180-1', ch: '215-62' };

        onAuthStateChanged(auth, (user) => {
            scaleUI();
            if (user) {
                document.getElementById('auth-box').classList.add('hidden');
                document.getElementById('app-box').classList.remove('hidden');
                document.getElementById('user-display').innerText = user.email.split('@')[0].toUpperCase();
                updateRender();
                renderGrid();
            }
        });

        function updateRender() {
            document.getElementById('l-body').style.backgroundImage = `url('https://www.habbo.com.br/habbo-imaging/avatarimage?figure=hd-${figure.hd}&size=l&direction=4&headonly=0')`;
            document.getElementById('l-tops').style.backgroundImage = `url('https://www.habbo.com.br/habbo-imaging/avatarimage?figure=ch-${figure.ch}&size=l&direction=4')`;
            document.getElementById('l-hair').style.backgroundImage = `url('https://www.habbo.com.br/habbo-imaging/avatarimage?figure=hr-${figure.hr}&size=l&direction=4')`;
        }

        function renderGrid() {
            const g = document.getElementById('item-grid'); g.innerHTML = '';
            [1, 10, 20, 45, 100, 115].forEach(id => {
                const d = document.createElement('div');
                d.className = "border-2 border-gray-400 aspect-square flex items-center justify-center cursor-pointer bg-gray-100 hover:bg-gold/20";
                d.innerHTML = `<img src="https://www.habbo.com.br/habbo-imaging/avatarimage?figure=ch-${id}-1&headonly=1&size=m">`;
                d.onclick = () => { figure.ch = id + "-1"; updateRender(); };
                g.appendChild(d);
            });
        }

        window.handleAuth = async () => {
            const e = document.getElementById('u-email').value;
            const p = document.getElementById('u-pass').value;
            try {
                if(isRegister) await createUserWithEmailAndPassword(auth, e, p);
                else await signInWithEmailAndPassword(auth, e, p);
            } catch (err) { alert("ERRO_IDENTIDADE: " + err.message); }
        };

        window.toggleRegMode = () => {
            isRegister = !isRegister;
            document.getElementById('btn-reg-mode').innerText = isRegister ? "JÁ TENHO CONTRATO" : "CRIAR NOVO CONTRATO";
        };

        function scaleUI() {
            const v = document.getElementById('mpc-master');
            const s = Math.min(window.innerWidth / 1250, window.innerHeight / 850);
            v.style.transform = `scale(${s})`;
        }
        window.addEventListener('resize', scaleUI);
        window.handleLogout = () => { if(confirm("Terminate?")) signOut(auth).then(() => location.reload()); };
    </script>
</body>
</html>
