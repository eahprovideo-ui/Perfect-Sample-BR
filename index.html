<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>Perfect Sample BR — SUPREME PIXEL v18</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #D4A24C; --orange: #ff5500; --bg: #000; --panel: #111; }
        
        /* 🕹️ MOTOR GRÁFICO PIXELADO (ESTILO HABBO) */
        * { 
            image-rendering: pixelated !important; 
            image-rendering: -moz-crisp-edges !important;
            image-rendering: crisp-edges !important;
            font-smooth: never;
            -webkit-font-smoothing: none;
        }
        
        body { 
            background: #000; color: #fff; font-family: 'Press Start 2P', cursive; 
            margin: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; min-height: 100vh;
        }

        /* RESOLUÇÃO FIXA 1280x800 (GAME VIEWPORT) */
        #game-viewport {
            width: 1280px; height: 800px;
            display: none; position: relative;
            transform-origin: center;
            background: #000; border: 4px solid #222;
        }

        /* CHASSI MPC - TEXTURA DE METAL ESCURÃO E MADEIRA */
        .mpc-supreme-chassi {
            background: #111;
            background-image: 
                linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 100%),
                url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            border: 6px solid #333; border-radius: 40px; padding: 30px; position: relative;
            box-shadow: 0 40px 100px #000, inset 4px 4px 0 #444;
            border-right: 35px solid #1a0f05; /* Lateral Madeira Dark */
        }

        /* LABORATÓRIO DE IDENTIDADE - PADRONIZADO NAS CORES DO SITE */
        .identity-lab-box {
            background: #1a1a1a; border: 4px solid var(--gold);
            box-shadow: 10px 10px 0 #000;
        }
        .lab-header { background: var(--gold); padding: 10px; color: #000; font-weight: bold; font-size: 10px; }

        /* AVATAR LAYER SYSTEM (9:16 ISOMÉTRICO) */
        .avatar-pedestal {
            width: 300px; height: 450px; background: #050505; border: 4px solid #222;
            position: relative; display: flex; align-items: center; justify-content: center;
            box-shadow: inset 0 0 50px #000;
        }
        .avatar-part { 
            position: absolute; width: 250px; height: 400px; 
            background-size: contain; background-repeat: no-repeat; bottom: 40px;
        }

        /* BOTÕES MPC (PADS) REALISTAS */
        .mpc-pad {
            background: linear-gradient(180deg, #333 0%, #0a0a0a 100%);
            border: 3px solid #444; border-bottom: 10px solid #000;
            border-radius: 10px; cursor: pointer; transition: 0.05s;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .mpc-pad:active { transform: translateY(6px); border-bottom-width: 4px; background: var(--orange); }

        /* ABAS DO GUARDA-ROUPA */
        .wardrobe-tab {
            background: #222; border: 2px solid #444; padding: 10px; cursor: pointer;
            font-size: 15px; border-bottom: 0; margin-right: 4px;
        }
        .wardrobe-tab.active { background: var(--gold); border-color: #fff; color: #000; }

        .item-card {
            background: #000; border: 3px solid #333; aspect-ratio: 1; cursor: pointer;
            display: flex; items: center; justify: center; padding: 5px;
        }
        .item-card:hover { border-color: var(--gold); }
        .item-card.selected { border-color: var(--gold); box-shadow: 0 0 10px var(--gold); }

        .input-supreme { background: #000; border: 3px solid #333; padding: 15px; width: 100%; color: var(--gold); outline: none; }
        .input-supreme:focus { border-color: var(--gold); }
    </style>
</head>
<body>

    <!-- TELA DE LOADING VU-METER PRO -->
    <div id="loading-screen" class="fixed inset-0 bg-[#050505] z-[9999] flex flex-col items-center justify-center">
        <img src="logo.png" style="width: 500px;" class="animate-pulse">
        <div class="pixel text-gold text-[12px] mt-10" id="load-msg">ASSINANDO_CONTRATOS_SUPREME...</div>
        <div id="vu-meter" class="flex gap-1 h-8 w-[500px] bg-[#111] p-1 border-4 border-[#333] mt-6"></div>
        <p class="text-gray-800 text-[8px] mt-10 tracking-[1.5em]">HARDWARE_READY_V18</p>
    </div>

    <div id="game-viewport">
        
        <!-- IDENTITY LAB (LOGIN / WARDROBE) -->
        <div id="auth-screen" class="fixed inset-0 z-[5000] bg-black/95 flex items-center justify-center hidden">
            <div class="identity-lab-box w-[1150px] h-[750px] flex flex-col">
                <div class="lab-header flex justify-between">
                    <span>LABORATÓRIO DE IDENTIDADE — PERFECT SAMPLE BR</span>
                    <button onclick="location.reload()">[SAIR]</button>
                </div>
                
                <div class="flex flex-grow p-10 gap-10 overflow-hidden bg-[#111]">
                    <!-- COLUNA 1: LOGIN/REGISTRO -->
                    <div class="w-80 flex flex-col justify-between">
                        <div class="bg-[#000] p-6 border-4 border-white/5">
                            <span class="text-gold text-[8px] block mb-4 uppercase">Login_Acesso</span>
                            <input type="email" id="u-email" placeholder="EMAIL" class="input-supreme text-[10px] mb-3">
                            <input type="password" id="u-pass" placeholder="SENHA" class="input-supreme text-[10px]">
                            
                            <div id="reg-extra" class="hidden mt-3">
                                <input type="text" id="u-nick" placeholder="NICKNAME" class="input-supreme text-[10px]">
                            </div>

                            <button onclick="handleAuth()" id="btn-auth-main" class="w-full bg-[#3d9a30] text-white py-4 border-b-8 border-[#1e4e18] font-bold text-xs mt-6">ENTRAR NA ARENA</button>
                        </div>
                        <button onclick="toggleRegMode()" id="btn-reg-mode" class="text-xs text-gray-500 underline uppercase">Novo por aqui?</button>
                    </div>

                    <!-- COLUNA 2: BONECO PIXEL 9:16 -->
                    <div class="flex-grow flex flex-col items-center">
                        <div class="avatar-pedestal">
                            <!-- Camadas montadas via JS -->
                            <div id="av-body" class="avatar-part"></div>
                            <div id="av-hair" class="avatar-part"></div>
                            <div id="av-tops" class="avatar-part"></div>
                            <div id="av-bottoms" class="avatar-part"></div>
                        </div>
                        <div class="flex gap-4 mt-6">
                            <button class="bg-[#222] p-4 border-4 border-black text-gold" onclick="rotate(-45)">◀</button>
                            <button class="bg-[#222] p-4 border-4 border-black text-gold" onclick="rotate(45)">▶</button>
                        </div>
                    </div>

                    <!-- COLUNA 3: WARDROBE (HABBO SYSTEM) -->
                    <div class="w-[450px] flex flex-col bg-[#222] p-6 border-4 border-black">
                        <div class="flex mb-4" id="tabs">
                            <div class="wardrobe-tab active" onclick="setCat('body')">👤</div>
                            <div class="wardrobe-tab" onclick="setCat('hair')">💇</div>
                            <div class="wardrobe-tab" onclick="setCat('tops')">👕</div>
                            <div class="wardrobe-tab" onclick="setCat('bottoms')">👖</div>
                        </div>
                        <div id="pixel-grid" class="grid grid-cols-4 gap-2 overflow-y-auto pr-2 flex-grow bg-black border-4 border-black p-4">
                            <!-- Itens filtrados aparecem aqui -->
                        </div>
                        <button onclick="finishReg()" class="w-full bg-orange-600 text-white py-5 border-b-8 border-[#803300] font-bold text-sm mt-4">GRAVAR CONTRATO</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- ARENA PRINCIPAL (HARDWARE MPC) -->
        <div id="app" class="mpc-supreme-chassi w-full h-full hidden">
            <!-- HUD -->
            <div class="flex justify-between items-center mb-10 bg-black/80 p-8 border-4 border-black shadow-2xl">
                <div class="flex items-center gap-8">
                    <div class="w-24 h-24 bg-black border-4 border-[#333] overflow-hidden">
                        <img id="hud-av" src="" class="w-full h-full scale-150">
                    </div>
                    <div>
                        <h2 class="text-orange-500 text-[18px] uppercase font-black" id="user-display">---</h2>
                        <span class="text-emerald-500 text-[10px]">LEGENDARY PRODUCER // #001</span>
                    </div>
                </div>
                <div class="text-right">
                    <span class="text-gold text-[24px] block font-black animate-pulse">1.500 BC</span>
                    <button onclick="handleLogout()" class="text-red-600 text-[10px] mt-2 underline">DESLOGAR</button>
                </div>
            </div>

            <!-- TELA LCD -->
            <div class="grid grid-cols-12 gap-10">
                <div class="col-span-8">
                    <div class="bg-[#050a05] border-[15px] border-[#000] rounded-[40px] h-[500px] p-10 relative overflow-hidden">
                        <div class="h-full flex flex-col justify-between font-mono text-emerald-500">
                             <div class="flex justify-between border-b border-white/5 pb-2 text-[12px]">
                                <span>KERNEL_V18_LEGACY</span>
                                <span id="socket-status" class="text-green-500">READY</span>
                             </div>
                             <div class="flex flex-col items-center">
                                <h1 class="text-white text-[18px] mb-12 text-center tracking-[0.2em] leading-loose">START MATCHMAKING?</h1>
                                <button onclick="alert('Buscando Arena...')" class="bg-[#003311] border-4 border-emerald-500 px-16 py-10 text-emerald-400 text-[14px] hover:bg-emerald-500 hover:text-black">CONNECT_ARENA</button>
                             </div>
                             <p class="text-[9px] opacity-20 text-center uppercase">Copyright Perfect Sample BR 2030</p>
                        </div>
                    </div>
                </div>
                
                <!-- SIDEBAR MEMORY -->
                <div class="col-span-4 bg-black/40 border-4 border-black p-8 flex flex-col items-center justify-between">
                    <div class="avatar-pedestal w-full h-72 border-gold/20">
                         <img id="side-av" src="" class="scale-75">
                         <button onclick="openWardrobe()" class="absolute bottom-4 right-4 bg-gold text-black p-3 text-[10px] font-black border-2 border-black">👕 EDIT</button>
                    </div>
                    <div class="grid grid-cols-3 gap-2 w-full mt-6">
                        <button class="bg-black border-2 border-gold p-3 text-gold text-[10px]">S1</button>
                        <button class="bg-black border-2 border-gray-800 p-3 text-gray-800 text-[10px]">S2</button>
                        <button class="bg-black border-2 border-gray-800 p-3 text-gray-800 text-[10px]">S3</button>
                    </div>
                </div>
            </div>

            <!-- PADS -->
            <div class="grid grid-cols-4 gap-12 mt-16">
                <div class="mpc-pad"><span class="text-[12px]">ARENA</span></div>
                <div class="mpc-pad"><span class="text-[12px]">PASS</span></div>
                <div id="admin-pad" class="mpc-pad hidden" onclick="window.location.href='admin.html'"><span class="text-red-500 font-bold">ADMIN</span></div>
                <div class="mpc-pad border-gold/40" onclick="toggleStore()"><span class="text-gold font-bold">LOJA_BC</span></div>
            </div>
        </div>

    </div>

    <!-- MARKETPLACE SUPREME (THE FIVE-M STYLE) -->
    <div id="store-overlay" class="fixed inset-0 z-[6000] bg-black/98 hidden items-center justify-center p-12">
        <div class="mpc-supreme-chassi w-[1100px] h-[750px] flex flex-col">
            <div class="flex justify-between items-center border-b-8 border-black pb-6 mb-8">
                <h2 class="text-gold text-[18px] uppercase tracking-widest font-black italic">Marketplace_RP_Supreme</h2>
                <button onclick="toggleStore()" class="text-red-600 text-[14px] font-bold">[X] FECHAR</button>
            </div>
            <div class="flex gap-10 flex-grow overflow-hidden">
                <div class="w-80 space-y-4">
                    <button class="w-full text-left p-6 bg-gold text-black text-[12px] font-black border-4 border-black">👑 PREMIUN BC</button>
                    <button class="w-full text-left p-6 bg-[#222] text-gray-500 text-[12px] border-4 border-black">👕 VESTUÁRIO BT</button>
                    <button class="w-full text-left p-6 bg-[#222] text-gray-500 text-[12px] border-4 border-black">🎹 DRUM KITS</button>
                </div>
                <div class="flex-grow grid grid-cols-3 gap-8 overflow-y-auto pr-6" id="store-grid">
                    <!-- Itens da Loja com Previa -->
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        let visual = { body: 1, hair: 1, tops: 1, bottoms: 1 };
        let currentCat = 'body';
        let isRegister = false;

        // 1. MOTOR DE CARREGAMENTO (VU METER)
        window.onload = () => {
            const vu = document.getElementById('vu-meter');
            for(let i=0; i<30; i++) {
                const s = document.createElement('div');
                s.className = "flex-1 bg-[#222] transition-all";
                vu.appendChild(s);
            }
            let p = 0;
            const bits = vu.children;
            const interval = setInterval(() => {
                p++;
                if(p <= bits.length) {
                    const b = bits[p-1];
                    if(p < 18) b.style.backgroundColor = "#00ff66";
                    else if(p < 25) b.style.backgroundColor = "#ffff00";
                    else b.style.backgroundColor = "#ff0000";
                }
                if(p >= bits.length + 10) {
                    clearInterval(interval);
                    document.getElementById('loading-screen').style.display = 'none';
                    checkSession();
                }
            }, 70);
        };

        // 2. TRUE PIXEL ENGINE (HABBO EMULATION)
        function updateRender() {
            const baseUrl = `https://api.dicebear.com/7.x/adventurer/svg?backgroundColor=transparent&seed=`;
            document.getElementById('av-body').style.backgroundImage = `url('${baseUrl}body${visual.body}')`;
            document.getElementById('av-hair').style.backgroundImage = `url('${baseUrl}hair${visual.hair}')`;
            document.getElementById('av-tops').style.backgroundImage = `url('${baseUrl}tops${visual.tops}')`;
            document.getElementById('av-bottoms').style.backgroundImage = `url('${baseUrl}bottoms${visual.bottoms}')`;
            
            // Sync HUD and Sidebar
            const finalSeed = JSON.stringify(visual);
            const finalUrl = `${baseUrl}${finalSeed}`;
            document.getElementById('hud-av').src = finalUrl;
            document.getElementById('side-av').src = finalUrl;
        }

        window.setCat = (c) => { 
            currentCat = c; 
            document.querySelectorAll('.wardrobe-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            renderItems(); 
        };

        function renderItems() {
            const g = document.getElementById('pixel-grid'); g.innerHTML = '';
            for(let i=1; i<=40; i++) {
                // Filtro VIP (itens > 20 não aparecem no cadastro)
                if(i > 20) continue;
                const d = document.createElement('div');
                d.className = "item-card";
                d.innerHTML = `<img src="https://api.dicebear.com/7.x/adventurer/svg?seed=${currentCat}${i}&backgroundColor=transparent">`;
                d.onclick = () => { visual[currentCat] = i; updateRender(); };
                g.appendChild(d);
            }
        }

        // 3. AUTH & STORE
        function checkSession() {
            onAuthStateChanged(auth, (user) => {
                document.getElementById('game-viewport').style.display = 'flex';
                scaleUI();
                if (user) {
                    document.getElementById('auth-screen').classList.add('hidden');
                    document.getElementById('app').classList.remove('hidden');
                    document.getElementById('user-display').innerText = user.email.split('@')[0].toUpperCase();
                    if(user.email === 'eahprovideo1@gmail.com') document.getElementById('admin-pad').classList.remove('hidden');
                    updateRender();
                } else {
                    document.getElementById('auth-screen').classList.remove('hidden');
                    renderItems(); updateRender();
                }
            });
        }

        window.handleAuth = async () => {
            const e = document.getElementById('u-email').value;
            const p = document.getElementById('u-pass').value;
            try {
                if(isRegister) await createUserWithEmailAndPassword(auth, e, p);
                else await signInWithEmailAndPassword(auth, e, p);
            } catch (err) { alert("ERRO: " + err.message); }
        };

        window.toggleRegMode = () => {
            isRegister = !isRegister;
            document.getElementById('reg-extra').classList.toggle('hidden', !isRegister);
            document.getElementById('btn-auth-main').innerText = isRegister ? "CRIAR CONTRATO" : "CONECTAR";
        };

        window.toggleStore = () => {
            const s = document.getElementById('store-overlay');
            s.style.display = (s.style.display === 'flex') ? 'none' : 'flex';
            if(s.style.display === 'flex') renderStore();
        };

        function renderStore() {
            const g = document.getElementById('store-grid'); g.innerHTML = '';
            const mock = [
                { name: "SUPREME MASK V1", price: "450 BC", rar: "LENDÁRIO" },
                { name: "ICE CHAIN", price: "1200 BC", rar: "ÉPICO" },
                { name: "TRAP HOODIE", price: "150 BT", rar: "COMUM" }
            ];
            mock.forEach(item => {
                g.innerHTML += `
                    <div class="bg-[#0a0a0a] p-6 border-8 border-black text-center hover:border-gold transition-all">
                        <span class="text-[8px] text-gold pixel">${item.rar}</span>
                        <div class="w-full h-32 bg-[#111] my-4 border-2 border-white/5"></div>
                        <h4 class="text-[10px] mb-4">${item.name}</h4>
                        <button class="w-full bg-gold text-black py-4 font-black text-[12px] border-b-[8px] border-[#803300]">${item.price}</button>
                    </div>
                `;
            });
        }

        function scaleUI() {
            const v = document.getElementById('game-viewport');
            const s = Math.min(window.innerWidth / 1350, window.innerHeight / 850);
            v.style.transform = `scale(${s})`;
        }
        window.addEventListener('resize', scaleUI);
        window.handleLogout = () => { if(confirm("Deslogar?")) signOut(auth).then(() => location.reload()); };
    </script>
</body>
</html>
