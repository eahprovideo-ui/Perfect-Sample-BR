<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfect Sample BR — Arena v14.0 PIXEL-ENGINE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #D4A24C; --orange: #ff5500; --bg: #050505; --screen: #0d1b10; }
        
        /* RESET PARA PIXEL ART */
        * { image-rendering: pixelated; image-rendering: crisp-edges; }
        body { 
            background: #000; color: #fff; font-family: 'Press Start 2P', cursive; 
            margin: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; min-height: 100vh;
        }

        /* CONTAINER ESCALONÁVEL (FIXO 1280x800) */
        #game-view {
            width: 1280px; height: 800px; display: none;
            position: relative; flex-direction: column; align-items: center; justify-content: center;
        }

        /* CHASSI MPC EM PIXEL ART */
        .mpc-pixel-frame {
            background: #1a1a1a;
            border: 6px solid #333;
            box-shadow: 10px 10px 0 #000, inset -4px -4px 0 #000, inset 4px 4px 0 #444;
            padding: 30px; position: relative; width: 1200px;
        }
        .wood-side { position: absolute; right: -30px; top: 0; bottom: 0; width: 30px; background: #2b1a0a; border: 4px solid #000; }

        /* TELA LCD PIXELADA */
        .lcd-pixel {
            background: var(--screen); border: 6px solid #000;
            box-shadow: inset 4px 4px 0 rgba(0,0,0,0.5), 0 0 20px rgba(0,255,102,0.1);
            position: relative; overflow: hidden;
        }
        .lcd-pixel::after {
            content: ""; position: absolute; inset: 0;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.1) 0px, rgba(0,0,0,0.1) 1px, transparent 1px, transparent 2px);
            pointer-events: none;
        }

        /* MODULO DE HARDWARE (LOGIN/CONFIG) */
        .hw-module {
            background: #222; border: 4px solid #000; padding: 20px;
            box-shadow: inset 2px 2px 0 #444, inset -2px -2px 0 #111;
        }

        /* BONECO PIXEL ART ISOMÉTRICO (ESTILO HABBO) */
        .avatar-pedestal {
            width: 240px; height: 320px; background: #000; border: 4px solid #333;
            position: relative; display: flex; align-items: center; justify-content: center;
        }
        .pixel-layer {
            position: absolute; width: 180px; height: 180px; 
            background-size: contain; background-repeat: no-repeat;
        }

        /* BOTÕES PAD MPC */
        .mpc-pad {
            background: #333; border: 4px solid #000; border-bottom: 8px solid #000;
            cursor: pointer; transition: 0.05s; display: flex; align-items: center; justify-content: center;
            text-align: center; color: #fff; font-size: 8px;
        }
        .mpc-pad:active { transform: translateY(4px); border-bottom-width: 4px; background: var(--orange); }

        /* INPUTS PIXELADOS */
        .pixel-input {
            background: #000; border: 3px solid #444; padding: 12px; width: 100%;
            color: var(--gold); outline: none; font-size: 8px;
        }
        .pixel-input:focus { border-color: var(--gold); }

        /* SCREWS (PARAFUSOS) */
        .hw-screw { width: 10px; height: 10px; background: #555; border: 2px solid #000; position: absolute; border-radius: 50%; }

        /* VU METER LOADING */
        .vu-container { display: flex; gap: 3px; height: 20px; width: 400px; background: #111; padding: 3px; border: 2px solid #333; }
        .vu-seg { flex: 1; background: #222; }
        .vu-g { background: #00ff66; box-shadow: 0 0 10px #00ff66; }
        .vu-y { background: #ffff00; }
        .vu-r { background: #ff0000; }
    </style>
</head>
<body>

    <!-- LOADING SCREEN VU METER -->
    <div id="loading-screen" class="fixed inset-0 bg-[#050505] z-[9999] flex flex-col items-center justify-center">
        <img src="logo.png" style="width: 280px;" class="animate-pulse mb-10">
        <div class="vu-container" id="vu-meter"></div>
        <p class="text-gold text-[8px] mt-4 uppercase" id="load-msg">SYSTEM_BOOTING...</p>
    </div>

    <div id="game-view">
        
        <!-- TELA DE LOGIN / REGISTRO (INTEGRADA AO HARDWARE) -->
        <div id="auth-screen" class="fixed inset-0 z-[5000] bg-black/90 flex items-center justify-center hidden">
            <div class="mpc-pixel-frame w-[1000px] flex gap-8 p-10">
                <div class="hw-screw top-4 left-4"></div><div class="hw-screw top-4 right-4"></div>
                <div class="hw-screw bottom-4 left-4"></div><div class="hw-screw bottom-4 right-4"></div>

                <!-- LADO ESQUERDO: LOGIN/CADASTRO -->
                <div class="w-80 space-y-6">
                    <div class="hw-module">
                        <span class="text-[8px] text-gray-500 mb-4 block underline">AUTHENTICATION_UNIT</span>
                        <input type="email" id="u-email" placeholder="EMAIL" class="pixel-input mb-3">
                        <div class="relative">
                            <input type="password" id="u-pass" placeholder="PASSWORD" class="pixel-input">
                            <span onclick="toggleEye()" class="absolute right-3 top-3 cursor-pointer text-[10px]">👁️</span>
                        </div>
                        <button onclick="handleAuth()" id="btn-auth-main" class="w-full bg-[#3d9a30] border-b-4 border-black py-3 mt-6 text-[10px] hover:bg-[#4eba3b]">CONECTAR</button>
                    </div>
                    <button onclick="toggleRegMode()" id="btn-reg-mode" class="text-[7px] text-gold uppercase hover:underline">Novo Produtor?</button>
                </div>

                <!-- LADO CENTRAL: AVATAR PIXEL -->
                <div class="flex-grow flex flex-col items-center">
                    <div class="avatar-pedestal">
                        <!-- Camadas do Boneco -->
                        <img id="av-render" src="" class="w-full h-full">
                    </div>
                    <div class="flex gap-4 mt-4">
                        <button class="bg-[#222] p-3 border-2 border-black" onclick="rotate(-45)">◀</button>
                        <button class="bg-[#222] p-3 border-2 border-black" onclick="rotate(45)">▶</button>
                    </div>
                </div>

                <!-- LADO DIREITO: GUARDA-ROUPA -->
                <div class="w-80 hw-module">
                    <div class="flex justify-around mb-4 border-b border-black pb-2">
                        <button onclick="setCat('body')">👤</button>
                        <button onclick="setCat('hair')">💇</button>
                        <button onclick="setCat('tops')">👕</button>
                    </div>
                    <div id="pixel-grid" class="grid grid-cols-3 gap-2 h-64 overflow-y-auto pr-2">
                        <!-- Itens aqui -->
                    </div>
                    <button onclick="finishReg()" class="w-full bg-orange-600 border-b-4 border-black py-3 mt-4 text-[8px]">SALVAR_PERFIL</button>
                </div>
            </div>
        </div>

        <!-- APP PRINCIPAL (ARENA MPC) -->
        <div id="app" class="mpc-pixel-frame hidden">
            <div class="wood-side"></div>
            <!-- HUD -->
            <div class="flex justify-between items-center mb-8 bg-[#111] p-6 border-4 border-black">
                <div class="flex items-center gap-6">
                    <div class="w-16 h-16 bg-black border-4 border-[#333] overflow-hidden">
                        <img id="hud-av" src="" class="w-full h-full scale-150">
                    </div>
                    <div>
                        <h2 class="text-orange-500 text-[12px]" id="user-display">---</h2>
                        <span class="text-emerald-500 text-[8px]">RANK: PRODUCER // LIVE</span>
                    </div>
                </div>
                <div class="text-right">
                    <span class="text-gold text-[12px] block">1.500 BC</span>
                    <button onclick="handleLogout()" class="text-red-600 text-[7px] mt-2 underline uppercase">Deslogar</button>
                </div>
            </div>

            <!-- TELA LCD CENTRAL -->
            <div class="grid grid-cols-12 gap-8">
                <div class="col-span-8">
                    <div class="lcd-pixel h-[480px] p-8">
                        <div class="h-full flex flex-col justify-between text-emerald-500">
                            <div class="flex justify-between border-b border-emerald-900 pb-2 text-[8px]">
                                <span>KERNEL_V14_ONLINE</span>
                                <span id="socket-status">READY</span>
                            </div>
                            <div class="flex flex-col items-center">
                                <h1 class="text-white text-[10px] mb-8 text-center leading-loose">INITIALIZE SUPREME MATCHMAKING?</h1>
                                <button onclick="startArena()" class="bg-[#003311] border-2 border-emerald-500 px-10 py-6 text-emerald-400 text-[10px] hover:bg-emerald-500 hover:text-black transition-all">START_ARENA</button>
                            </div>
                            <div class="text-[7px] opacity-40 text-center">Copyright PSBR Industrial 2030</div>
                        </div>
                    </div>
                </div>

                <!-- SIDEBAR PERFIL -->
                <div class="col-span-4 hw-module flex flex-col items-center justify-between">
                    <div class="avatar-pedestal w-full h-64 bg-black">
                        <img id="side-av" src="" class="scale-75">
                        <button onclick="openWardrobe()" class="absolute bottom-2 right-2 bg-gold text-black p-2 text-[8px] font-bold border-2 border-black">EDIT</button>
                    </div>
                    <div class="grid grid-cols-3 gap-2 w-full mt-4">
                        <button class="bg-black border-2 border-gold p-2 text-gold text-[8px]">S1</button>
                        <button class="bg-black border-2 border-gray-800 p-2 text-gray-800 text-[8px]">S2</button>
                        <button class="bg-black border-2 border-gray-800 p-2 text-gray-800 text-[8px]">S3</button>
                    </div>
                </div>
            </div>

            <!-- PADS DE SISTEMA -->
            <div class="grid grid-cols-4 gap-6 mt-10">
                <div class="mpc-pad" onclick="location.reload()"><span>ARENA</span></div>
                <div class="mpc-pad"><span>BPASS</span></div>
                <div id="admin-pad" class="mpc-pad hidden" onclick="window.location.href='admin.html'"><span class="text-red-500">ROOT</span></div>
                <div class="mpc-pad border-gold/40" onclick="toggleStore()"><span class="text-gold">MARKET</span></div>
            </div>
        </div>
    </div>

    <!-- LOJA FIVE M RP PIXELADA -->
    <div id="store-modal" class="fixed inset-0 z-[6000] bg-black/95 hidden items-center justify-center p-10">
        <div class="mpc-pixel-frame w-[1100px] h-[700px] flex flex-col">
            <div class="flex justify-between items-center border-b-4 border-black pb-4 mb-6">
                <h2 class="text-gold text-[12px]">MARKETPLACE_LEGACY</h2>
                <button onclick="toggleStore()" class="text-red-600 text-[10px]">FECHAR [X]</button>
            </div>
            <div class="flex gap-6 flex-grow overflow-hidden">
                <div class="w-64 space-y-3">
                    <button class="w-full text-left p-4 bg-gold text-black text-[8px] font-bold">👑 PREMIUM BC</button>
                    <button class="w-full text-left p-4 bg-[#222] text-gray-500 text-[8px]">👕 VESTUÁRIO BT</button>
                </div>
                <div class="flex-grow grid grid-cols-3 gap-4 overflow-y-auto pr-4" id="store-grid"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        let visual = { body: 1, hair: 1, tops: 1, bottoms: 1 };
        let currentCat = 'body';
        let isRegister = false;

        // 1. ENGINE DE CARREGAMENTO PIXEL
        window.onload = () => {
            const vu = document.getElementById('vu-meter');
            for(let i=0; i<25; i++) {
                const s = document.createElement('div');
                s.className = "vu-seg";
                vu.appendChild(s);
            }
            let p = 0;
            const segments = document.querySelectorAll('.vu-seg');
            const interval = setInterval(() => {
                p++;
                if(p <= segments.length) {
                    const s = segments[p-1];
                    if(p < 15) s.classList.add('vu-g');
                    else if(p < 22) s.classList.add('vu-y');
                    else s.classList.add('vu-r');
                }
                if(p >= segments.length + 5) {
                    clearInterval(interval);
                    document.getElementById('loading-screen').style.display = 'none';
                    checkSession();
                }
            }, 100);
        };

        // 2. ENGINE AVATAR PIXELADO
        function updateRender() {
            const seed = JSON.stringify(visual);
            const url = `https://api.dicebear.com/7.x/pixel-art/svg?seed=${seed}&backgroundColor=transparent`;
            document.getElementById('av-render').src = url;
            document.getElementById('hud-av').src = url;
            document.getElementById('side-av').src = url;
        }

        window.setCat = (c) => { 
            currentCat = c; 
            renderItems(); 
        };

        function renderItems() {
            const g = document.getElementById('pixel-grid'); g.innerHTML = '';
            for(let i=1; i<=30; i++) {
                const d = document.createElement('div');
                d.className = "bg-[#111] border-2 border-black p-2 cursor-pointer hover:border-gold aspect-square";
                d.innerHTML = `<img src="https://api.dicebear.com/7.x/pixel-art/svg?seed=${currentCat}${i}&backgroundColor=transparent">`;
                d.onclick = () => { visual[currentCat] = i; updateRender(); };
                g.appendChild(d);
            }
        }

        // 3. AUTH & SESSION
        function checkSession() {
            onAuthStateChanged(auth, (user) => {
                document.getElementById('game-view').style.display = 'flex';
                scaleUI();
                if (user) {
                    document.getElementById('auth-screen').classList.add('hidden');
                    document.getElementById('app').classList.remove('hidden');
                    document.getElementById('user-display').innerText = user.email.split('@')[0].toUpperCase();
                    if(user.email === 'eahprovideo1@gmail.com') document.getElementById('admin-pad').classList.remove('hidden');
                    updateRender();
                } else {
                    document.getElementById('auth-screen').classList.remove('hidden');
                    renderItems(); updateRender();
                }
            });
        }

        window.handleAuth = async () => {
            const e = document.getElementById('u-email').value;
            const p = document.getElementById('u-pass').value;
            try {
                if(isRegister) await createUserWithEmailAndPassword(auth, e, p);
                else await signInWithEmailAndPassword(auth, e, p);
            } catch (err) { alert(err.message); }
        };

        window.toggleRegMode = () => {
            isRegister = !isRegister;
            document.getElementById('btn-auth-main').innerText = isRegister ? "CADASTRAR" : "CONECTAR";
        };

        window.handleLogout = () => { signOut(auth).then(() => location.reload()); };

        window.toggleStore = () => {
            const m = document.getElementById('store-modal');
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
            renderStore();
        };

        function renderStore() {
            const g = document.getElementById('store-grid'); g.innerHTML = '';
            const mock = [
                { name: "GOLD CHAIN V1", price: "500 BC", rarity: "LENDARIO" },
                { name: "TECH MASK", price: "300 BC", rarity: "EPICO" },
                { name: "BASIC HOOD", price: "50 BT", rarity: "COMUM" }
            ];
            mock.forEach(item => {
                g.innerHTML += `
                    <div class="bg-[#111] p-6 border-4 border-black text-center hover:border-gold">
                        <span class="text-[6px] text-gold pixel">${item.rarity}</span>
                        <div class="w-full h-32 bg-black my-4 border-2 border-white/5"></div>
                        <h3 class="text-[8px] mb-2">${item.name}</h3>
                        <button class="w-full bg-white/5 py-2 text-gold text-[7px]">${item.price}</button>
                    </div>
                `;
            });
        }

        function scaleUI() {
            const c = document.getElementById('game-view');
            const s = Math.min(window.innerWidth / 1300, window.innerHeight / 850);
            c.style.transform = `scale(${s})`;
        }
        window.addEventListener('resize', scaleUI);
        window.toggleEye = () => {
            const p = document.getElementById('u-pass');
            p.type = p.type === 'password' ? 'text' : 'password';
        }
    </script>
</body>
</html>
