<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfect Sample BR — Arena MPC v4.4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #D4A24C; --orange: #ff5500; --bg: #0d0d0d; --screen: #0d1b10; }
        
        /* FUNDO DE METAL ESCOVADO INDUSTRIAL */
        body { 
            background: #111;
            background-image: 
                linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
                url('https://www.transparenttextures.com/patterns/brushed-alum.png'); /* Textura de metal */
            color: #eee; font-family: 'Space Grotesk', sans-serif; overflow: hidden; 
        }

        .pixel { font-family: 'Press Start 2P', cursive; }

        /* CHASSI MPC COM TEXTURA DE FERRO */
        .mpc-chassi {
            background: linear-gradient(135deg, #2a2a2a 0%, #151515 100%);
            background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            border: 10px solid #222; border-radius: 60px; padding: 40px; position: relative;
            border-right: 30px solid #1a0f05; 
            box-shadow: 0 60px 120px rgba(0,0,0,0.9), inset 0 2px 10px rgba(255,255,255,0.05);
        }

        .lcd-display {
            background: var(--screen); border: 12px solid #050505; border-radius: 25px;
            position: relative; overflow: hidden; box-shadow: inset 0 0 80px #000;
        }

        /* EFEITO DE TELA CRT (SCANLINES) */
        .lcd-display::after {
            content: " "; display: absolute; inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.05));
            z-index: 10; pointer-events: none; background-size: 100% 3px, 3px 100%;
        }

        /* BOOT / LOGIN SCREEN */
        #auth-overlay { 
            position: fixed; inset: 0; 
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            background-image: url('https://www.transparenttextures.com/patterns/dark-matter.png');
            z-index: 1000; display: flex; align-items: center; justify-content: center; flex-direction: column;
            transition: transform 1s cubic-bezier(0.87, 0, 0.13, 1);
        }
        .boot-hidden { transform: translateY(-100%); }
        .login-card { background: rgba(10, 10, 10, 0.95); border: 2px solid var(--gold); padding: 50px; border-radius: 40px; width: 420px; text-align: center; backdrop-filter: blur(10px); }

        /* INPUT COM OLHO */
        .pass-container { position: relative; width: 100%; }
        .eye-btn { position: absolute; right: 15px; top: 18px; cursor: pointer; opacity: 0.5; transition: 0.3s; }
        .eye-btn:hover { opacity: 1; }

        .mpc-pad {
            background: #333; border-bottom: 6px solid #000; border-radius: 15px;
            height: 100px; cursor: pointer; transition: 0.1s;
            display: flex; flex-direction: column; items: center; justify-content: center;
        }
        .mpc-pad:active { transform: translateY(4px); border-bottom-width: 1px; background: var(--orange); }
    </style>
</head>
<body>

    <!-- TELA DE LOGIN -->
    <div id="auth-overlay">
        <div class="login-card">
            <h2 class="pixel text-gold text-[9px] mb-10 tracking-widest animate-pulse">BOOTING_PSBR_KERNEL_v4.4</h2>
            
            <input type="email" id="email" placeholder="EMAIL_PRODUTOR" class="w-full bg-black border border-white/10 p-4 rounded-xl mb-4 text-xs outline-none focus:border-gold text-white">
            
            <div class="pass-container">
                <input type="password" id="pass" placeholder="SENHA_ACESSO" class="w-full bg-black border border-white/10 p-4 rounded-xl mb-8 text-xs outline-none focus:border-gold text-white">
                <span class="eye-btn" onclick="togglePass()">
                    <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                </span>
            </div>

            <button onclick="handleAuth('login')" class="w-full bg-orange-600 text-white py-4 rounded-2xl font-bold text-xs mb-4 shadow-lg shadow-orange-900/40">CONECTAR AO KERNEL</button>
            <button onclick="handleAuth('register')" class="text-gray-600 text-[9px] pixel hover:text-white transition-colors">GERAR_NOVA_IDENTIDADE</button>
        </div>
    </div>

    <!-- SITE PRINCIPAL -->
    <div id="app" class="hidden mpc-chassi w-full max-w-6xl shadow-2xl relative">
        <!-- HUD -->
        <div class="flex justify-between items-center mb-10 bg-black/50 p-6 rounded-[35px] border border-white/5">
            <div class="flex items-center gap-5">
                <div class="w-14 h-14 bg-black border-2 border-orange-500/30 rounded-2xl flex items-center justify-center shadow-inner">
                    <span class="pixel text-gold text-lg" id="user-initial">?</span>
                </div>
                <div>
                    <h2 class="pixel text-[10px] text-orange-500" id="user-display">---</h2>
                    <span class="text-[9px] text-gray-500 uppercase font-bold tracking-widest">Patente: Legend Producer</span>
                </div>
            </div>
            <div class="flex gap-4">
                <div class="text-right">
                    <span class="block text-[8px] text-gray-600 uppercase">Beat_Coins</span>
                    <span class="text-gold font-bold text-lg">1.500 BC</span>
                </div>
                <div class="text-right border-l border-white/5 pl-6">
                    <span class="block text-[8px] text-gray-600 uppercase">Arena_Status</span>
                    <span class="text-green-500 font-bold text-[10px]" id="socket-status">CONNECTING...</span>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-12 gap-10">
            <!-- LCD -->
            <div class="col-span-12 lg:col-span-8">
                <div class="lcd-display h-[450px] p-10 font-mono text-emerald-500">
                    <div id="screen-arena" class="h-full flex flex-col justify-between">
                        <div class="flex justify-between border-b border-emerald-950 pb-3">
                            <span class="pixel text-[8px] text-gold uppercase">Kernel_v4.4_Active</span>
                            <span class="text-[10px]" id="queue-status">FILA: 0/10</span>
                        </div>
                        <div class="flex-grow flex flex-col items-center justify-center">
                            <h2 class="pixel text-[10px] mb-8 text-white">READY FOR THE NEXT BATTLE?</h2>
                            <button onclick="window.startArena('TRAP')" class="px-8 py-4 bg-emerald-900/20 border-2 border-emerald-500 rounded-2xl pixel text-[9px] hover:bg-emerald-500 hover:text-black transition-all">START_TRAP_ARENA</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- SIDEBAR -->
            <div class="col-span-4 flex flex-col gap-6">
                <div class="bg-black/60 rounded-[45px] p-8 border border-white/5 h-[300px] flex items-center justify-center">
                    <div class="avatar-box relative w-40 h-40 bg-black rounded-3xl border-2 border-white/5 overflow-hidden">
                        <div id="av-base" class="absolute inset-0 bg-[url('https://api.dicebear.com/7.x/pixel-art/svg?seed=Junior')] bg-contain"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- PADS -->
        <div class="grid grid-cols-4 gap-6 mt-12">
            <div class="mpc-pad" onclick="window.location.reload()"><span class="pixel text-[10px] text-white">ARENA</span></div>
            <div class="mpc-pad" onclick="alert('Battle Pass em breve!')"><span class="pixel text-[10px] text-white">PASS</span></div>
            <div class="mpc-pad" onclick="window.location.href='admin.html'"><span class="pixel text-[10px] text-red-600">ADMIN</span></div>
            <div class="mpc-pad border-gold/30"><span class="pixel text-[10px] text-gold">LOJA</span></div>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // CONEXÃO RENDER
        const socket = io("https://perfect-sample-br.onrender.com");

        socket.on('connect', () => {
            document.getElementById('socket-status').innerText = "LIVE_SERVER";
            document.getElementById('socket-status').className = "text-green-500 font-bold text-[10px]";
        });

        socket.on('queue_update', (data) => {
            document.getElementById('queue-status').innerText = `FILA: ${data.count}/10`;
        });

        // BOTÃO OLHO (PASSWORD TOGGLE)
        window.togglePass = () => {
            const passInput = document.getElementById('pass');
            const type = passInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passInput.setAttribute('type', type);
        };

        // AUTH LOGIC
        window.handleAuth = async (type) => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            try {
                let user;
                if(type === 'login') {
                    const cred = await signInWithEmailAndPassword(auth, email, pass);
                    user = cred.user;
                } else {
                    const cred = await createUserWithEmailAndPassword(auth, email, pass);
                    user = cred.user;
                }
                document.getElementById('auth-overlay').classList.add('boot-hidden');
                setTimeout(() => {
                    document.getElementById('auth-overlay').style.display = 'none';
                    document.getElementById('app').classList.remove('hidden');
                    document.getElementById('user-display').innerText = user.email.split('@')[0].toUpperCase();
                    document.getElementById('user-initial').innerText = user.email[0].toUpperCase();
                }, 1000);
            } catch (err) {
                alert("ERRO: " + err.message);
            }
        };

        window.startArena = (style) => {
            socket.emit('join_ranked_queue', { genre: style, username: document.getElementById('user-display').innerText });
        };
    </script>
</body>
</html>
