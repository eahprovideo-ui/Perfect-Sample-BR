<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>Perfect Sample BR — HD PIXEL HARDWARE v23</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --mpc-gray: #c0c0c0; --mpc-dark: #1a1a1a; --gold: #D4A24C; 
            --orange: #ff5500; --screen-green: #0d1b10; --neon-blue: #00f0ff;
        }
        
        /* 🕹️ SUPREME PIXEL ENGINE HD */
        * { 
            image-rendering: pixelated !important; 
            image-rendering: crisp-edges !important;
            font-smooth: never; -webkit-font-smoothing: none;
        }
        
        body { 
            background: #080808; color: #fff; font-family: 'Space Grotesk', sans-serif; 
            margin: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; min-height: 100vh;
            background-image: radial-gradient(#111 2px, transparent 2px); background-size: 32px 32px;
        }

        .pixel { font-family: 'Press Start 2P', cursive; }

        /* ESCALA FIXA GAME-BOY PRO */
        #viewport {
            width: 1280px; height: 850px;
            display: none; position: relative;
            transform-origin: center;
        }

        /* CHASSI MPC HD - METAL & RIVETS */
        .mpc-chassi-hd {
            background: var(--mpc-gray);
            border: 6px solid #444;
            box-shadow: 20px 20px 0 #000, inset 4px 4px 0 #eee, inset -4px -4px 0 #666;
            padding: 40px; position: relative; width: 1200px; height: 800px;
            background-image: url('https://www.transparenttextures.com/patterns/brushed-alum.png');
        }
        .mpc-side-red { position: absolute; left: -20px; top: 40px; bottom: 40px; width: 20px; background: #8b0000; border: 4px solid #000; border-radius: 10px 0 0 10px; }
        .mpc-side-wood { position: absolute; right: -30px; top: 0; bottom: 0; width: 30px; background: #2b1a0a; border: 4px solid #000; border-radius: 0 5px 5px 0; }

        /* LCD CRT HD */
        .lcd-supreme {
            background: var(--screen-green); border: 8px solid #000;
            box-shadow: inset 6px 6px 0 rgba(0,0,0,0.8), 0 0 40px rgba(0,255,102,0.1);
            position: relative; overflow: hidden; height: 380px;
        }
        .scanlines { position: absolute; inset: 0; background: repeating-linear-gradient(rgba(0,0,0,0.2) 0px, rgba(0,0,0,0.2) 1px, transparent 1px, transparent 3px); pointer-events: none; z-index: 5; }

        /* PADS GRID (4x4) */
        .pads-container {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px;
            width: 550px; padding: 20px; background: #111; border: 4px solid #000;
            box-shadow: inset 4px 4px 0 #000; border-radius: 10px;
        }
        .pad-pro {
            background: #333; border: 2px solid #444; border-bottom: 8px solid #000;
            aspect-ratio: 1; border-radius: 8px; cursor: pointer; transition: 0.05s;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-family: 'Press Start 2P', cursive; font-size: 8px; text-shadow: 2px 2px #000;
        }
        .pad-pro:active { transform: translateY(6px); border-bottom-width: 2px; background: var(--orange); }
        .pad-glow-gold { border-color: var(--gold) !important; color: var(--gold); }

        /* AVATAR IMAGER HD */
        .avatar-hardware-module {
            width: 320px; height: 480px; background: #000; border: 4px solid #333;
            box-shadow: inset 0 0 50px #000; position: relative;
            display: flex; align-items: center; justify-content: center;
        }
        .sprite-layer { position: absolute; width: 260px; height: 380px; background-size: contain; background-repeat: no-repeat; bottom: 40px; }

        /* KNOBS & SLIDERS */
        .fader-track { width: 15px; height: 200px; background: #000; border-radius: 10px; border: 2px solid #444; position: relative; }
        .fader-knob { width: 30px; height: 15px; background: #888; border: 2px solid #000; position: absolute; left: -8px; bottom: 50%; box-shadow: 2px 2px 0 #000; }

        .screw-hd { width: 14px; height: 14px; background: radial-gradient(circle, #888 20%, #444 80%); border: 2px solid #000; border-radius: 50%; position: absolute; }
    </style>
</head>
<body>

    <!-- LOADING SCREEN HD -->
    <div id="loading-screen" class="fixed inset-0 bg-[#050505] z-[9999] flex flex-col items-center justify-center">
        <img src="logo.png" style="width: 500px;" class="animate-pulse">
        <div class="pixel text-gold text-[12px] mt-10 uppercase tracking-[0.5em]">Initializing_Hardware_Unit...</div>
        <div class="flex gap-1 h-10 w-[600px] bg-[#111] p-1 border-4 border-[#333] mt-8" id="vu-meter"></div>
        <p class="text-gray-800 text-[9px] mt-8 tracking-[2em] font-bold">AKAI_INDUSTRIAL_SUPREME_V23</p>
    </div>

    <div id="viewport">
        
        <!-- IDENTITY LAB (LOGIN / WARDROBE) -->
        <div id="auth-screen" class="fixed inset-0 z-[5000] bg-black/98 flex items-center justify-center hidden p-10">
            <div class="mpc-chassi-hd w-[1150px] h-[780px] flex flex-col !bg-[#e1e1e1]">
                <div class="flex justify-between items-center border-b-4 border-black pb-4 mb-6">
                    <span class="pixel text-[9px] text-black">REGISTRO_PRODUTOR_#9920</span>
                    <button onclick="location.reload()" class="bg-red-600 text-white p-2 text-xs font-bold">[X]</button>
                </div>
                
                <div class="flex gap-10 flex-grow overflow-hidden">
                    <!-- AUTH -->
                    <div class="w-80 flex flex-col justify-between">
                        <div class="bg-gray-400 p-6 border-4 border-black shadow-inner">
                            <span class="pixel text-[7px] block mb-4 underline">SIGN_CONTRACT</span>
                            <input type="email" id="u-email" placeholder="EMAIL" class="w-full p-4 border-4 border-black mb-3 text-xs font-bold outline-none">
                            <input type="password" id="u-pass" placeholder="PASSWORD" class="w-full p-4 border-4 border-black text-xs font-bold outline-none">
                            <button onclick="handleAuth()" id="btn-auth-main" class="w-full bg-[#3d9a30] text-white py-5 border-b-[10px] border-[#1e4e18] font-bold text-sm mt-6">CONNECT</button>
                        </div>
                        <button onclick="toggleRegMode()" class="pixel text-[7px] text-black underline">NEW PRODUCER? REGISTER</button>
                    </div>

                    <!-- PREVIEW -->
                    <div class="flex-grow flex flex-col items-center justify-center bg-gray-600 border-4 border-black rounded shadow-2xl">
                        <div class="avatar-hardware-module">
                            <div id="l-body" class="sprite-layer"></div>
                            <div id="l-bottoms" class="sprite-layer"></div>
                            <div id="l-tops" class="sprite-layer"></div>
                            <div id="l-head" class="sprite-layer"></div>
                            <div id="l-acc" class="sprite-layer"></div>
                        </div>
                    </div>

                    <!-- WARDROBE -->
                    <div class="w-[420px] flex flex-col bg-gray-400 border-4 border-black p-4">
                        <div class="grid grid-cols-5 gap-1 mb-2">
                            <button class="bg-gray-200 border-2 border-black p-2 active" onclick="setCat('body')">👤</button>
                            <button class="bg-gray-200 border-2 border-black p-2" onclick="setCat('head')">💇</button>
                            <button class="bg-gray-200 border-2 border-black p-2" onclick="setCat('torso')">👕</button>
                            <button class="bg-gray-200 border-2 border-black p-2" onclick="setCat('legs')">👖</button>
                            <button class="bg-gray-200 border-2 border-black p-2" onclick="setCat('ice')">💎</button>
                        </div>
                        <div id="pixel-grid" class="grid grid-cols-3 gap-3 overflow-y-auto flex-grow bg-white border-4 border-black p-4"></div>
                        <button onclick="finishReg()" class="w-full bg-orange-600 text-white py-4 border-b-8 border-black font-bold text-sm mt-4">RECORD MASTER</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- APP PRINCIPAL (HARDWARE MODE) -->
        <div id="app" class="mpc-chassi-hd hidden">
            <div class="mpc-side-red"></div><div class="mpc-side-wood"></div>
            <div class="screw-hd top-4 left-4"></div><div class="screw-hd top-4 right-4"></div>
            <div class="screw-hd bottom-4 left-4"></div><div class="screw-hd bottom-4 right-4"></div>

            <!-- LCD MONITOR -->
            <div class="lcd-supreme mb-10 p-10">
                <div class="scanlines"></div>
                <div class="h-full flex flex-col justify-between font-mono text-emerald-400 relative z-10">
                    <div class="flex justify-between border-b border-emerald-900 pb-2 text-xs">
                        <span>SYSTEM_HW_V23_OMEGA</span>
                        <span id="socket-status" class="text-emerald-500 font-bold">STABLE</span>
                    </div>
                    <div class="flex flex-col items-center">
                        <h1 class="pixel text-white text-[18px] mb-8 text-center leading-loose">INITIALIZE SUPREME MATCHMAKING?</h1>
                        <button class="bg-[#003311] border-4 border-emerald-500 px-16 py-8 text-emerald-400 text-xs hover:bg-emerald-500 hover:text-black transition-all font-black">START_QUEUE</button>
                    </div>
                    <p class="text-[9px] text-center opacity-30 uppercase tracking-[1em]">Copyright Perfect Sample BR Legacy</p>
                </div>
            </div>

            <!-- LOWER HARDWARE PANEL -->
            <div class="flex justify-between gap-10">
                <!-- 16 PADS (4x4) -->
                <div class="pads-container">
                    <div class="pad-pro pad-glow-gold"><span>ARENA</span></div>
                    <div class="pad-pro"><span>PASS</span></div>
                    <div class="pad-pro" id="admin-pad" onclick="window.location.href='admin.html'"><span>ADMIN</span></div>
                    <div class="pad-pro" onclick="toggleStore()"><span>SHOP</span></div>
                    <!-- Outros 12 pads para expansão -->
                    <div class="pad-pro"><span>S_FX</span></div><div class="pad-pro"><span>MUTE</span></div><div class="pad-pro"><span>SOLO</span></div><div class="pad-pro"><span>BANK</span></div>
                    <div class="pad-pro"><span>A</span></div><div class="pad-pro"><span>B</span></div><div class="pad-pro"><span>C</span></div><div class="pad-pro"><span>D</span></div>
                    <div class="pad-pro"><span>REPLAY</span></div><div class="pad-pro"><span>VOTE</span></div><div class="pad-pro"><span>REC</span></div><div class="pad-pro" onclick="handleLogout()"><span>OFF</span></div>
                </div>

                <!-- SIDEBAR RENDER & FADERS -->
                <div class="flex-grow bg-black/40 border-4 border-black p-6 rounded-xl flex items-center justify-around">
                    <div class="avatar-hardware-module w-64 h-[350px] border-gold/20 overflow-hidden">
                        <div id="side-l-body" class="sprite-layer scale-75"></div>
                        <div id="side-l-torso" class="sprite-layer scale-75"></div>
                    </div>
                    <div class="flex gap-10">
                        <div class="flex flex-col items-center">
                            <span class="pixel text-[6px] mb-2">XP</span>
                            <div class="fader-track"><div class="fader-knob" style="bottom: 85%;"></div></div>
                        </div>
                        <div class="flex flex-col items-center">
                            <span class="pixel text-[6px] mb-2">COINS</span>
                            <div class="fader-track border-gold/30"><div class="fader-knob !bg-gold" style="bottom: 30%;"></div></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- LOGO HUD -->
            <img src="logo.png" class="absolute bottom-6 left-10 w-24 opacity-20">
        </div>

    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        let visual = { body: 1, head: 1, torso: 1, legs: 1, ice: 1 };
        let isRegister = false;

        // 1. ENGINE DE CARREGAMENTO VU-METER PRO
        window.onload = () => {
            const vu = document.getElementById('vu-meter');
            for(let i=0; i<36; i++) {
                const s = document.createElement('div');
                s.className = "flex-1 bg-[#1a1a1a]";
                vu.appendChild(s);
            }
            let p = 0;
            const bits = vu.children;
            const interval = setInterval(() => {
                p++;
                if(p <= bits.length) {
                    const b = bits[p-1];
                    if(p < 20) b.style.backgroundColor = "#00ff66";
                    else if(p < 30) b.style.backgroundColor = "#ffff00";
                    else b.style.backgroundColor = "#ff0000";
                }
                if(p >= bits.length + 15) {
                    clearInterval(interval);
                    document.getElementById('loading-screen').style.display = 'none';
                    checkSession();
                }
            }, 60);
        };

        // 2. STACKING ENGINE (HABBO EMULATION)
        function updateRender() {
            const baseUrl = `https://api.dicebear.com/7.x/adventurer/svg?backgroundColor=transparent&seed=`;
            document.getElementById('l-body').style.backgroundImage = `url('${baseUrl}body${visual.body}')`;
            document.getElementById('l-head').style.backgroundImage = `url('${baseUrl}hair${visual.head}')`;
            document.getElementById('l-torso').style.backgroundImage = `url('${baseUrl}tops${visual.torso}')`;
            document.getElementById('l-legs').style.backgroundImage = `url('${baseUrl}bottoms${visual.legs}')`;
            document.getElementById('l-ice').style.backgroundImage = `url('${baseUrl}acc${visual.ice}')`;
            
            document.getElementById('side-l-body').style.backgroundImage = `url('${baseUrl}body${visual.body}')`;
            document.getElementById('side-l-torso').style.backgroundImage = `url('${baseUrl}tops${visual.torso}')`;
        }

        window.setCat = (c) => { renderGrid(c); };

        function renderGrid(c) {
            const g = document.getElementById('pixel-grid'); g.innerHTML = '';
            for(let i=1; i<=30; i++) {
                if(i > 20) continue; // VIP Lock
                const d = document.createElement('div');
                d.className = "bg-gray-100 border-2 border-black p-1 cursor-pointer hover:bg-gold/20 aspect-square flex items-center justify-center";
                d.innerHTML = `<img src="https://api.dicebear.com/7.x/adventurer/svg?seed=${c}${i}&backgroundColor=transparent" class="w-12">`;
                d.onclick = () => { visual[c === 'head' ? 'head' : c === 'torso' ? 'torso' : c === 'legs' ? 'legs' : c === 'ice' ? 'ice' : 'body'] = i; updateRender(); };
                g.appendChild(d);
            }
        }

        // 3. AUTH & SCALE
        function checkSession() {
            onAuthStateChanged(auth, (user) => {
                document.getElementById('viewport').style.display = 'flex';
                scaleUI();
                if (user) {
                    document.getElementById('auth-screen').classList.add('hidden');
                    document.getElementById('app').classList.remove('hidden');
                    if(user.email === 'eahprovideo1@gmail.com') document.getElementById('admin-pad').classList.remove('hidden');
                    updateRender();
                } else {
                    document.getElementById('auth-screen').classList.remove('hidden');
                    renderGrid('body'); updateRender();
                }
            });
        }

        window.handleAuth = async () => {
            const e = document.getElementById('u-email').value;
            const p = document.getElementById('u-pass').value;
            try {
                if(isRegister) await createUserWithEmailAndPassword(auth, e, p);
                else await signInWithEmailAndPassword(auth, e, p);
            } catch (err) { alert("SISTEMA_ERRO: " + err.message); }
        };

        window.toggleRegMode = () => {
            isRegister = !isRegister;
            document.getElementById('btn-auth-main').innerText = isRegister ? "SIGN CONTRACT" : "CONNECT";
        };

        function scaleUI() {
            const v = document.getElementById('viewport');
            const s = Math.min(window.innerWidth / 1350, window.innerHeight / 900);
            v.style.transform = `scale(${s})`;
        }
        window.addEventListener('resize', scaleUI);
        window.handleLogout = () => { if(confirm("Terminate Session?")) signOut(auth).then(() => location.reload()); };
    </script>
</body>
</html>
