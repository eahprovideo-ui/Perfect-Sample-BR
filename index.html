<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfect Sample BR — Arena v12.0 LEGACY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #D4A24C; --orange: #ff5500; --neon-blue: #00f0ff; --bg: #000; }
        
        body { 
            background: #000; color: #fff; font-family: 'Space Grotesk', sans-serif; 
            margin: 0; padding: 0; display: flex; align-items: center; justify-content: center;
            min-height: 100vh; overflow: hidden;
            image-rendering: pixelated; /* Força o visual pixelado em tudo */
        }

        .pixel { font-family: 'Press Start 2P', cursive; }

        /* ENGINE DE DIMENSÃO FIXA (IMPEDE CORTE E ZOOM) */
        #game-container {
            width: 1280px; height: 800px;
            transform-origin: center;
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }

        /* TELA DE CARREGAMENTO ÉPICA */
        #loading-screen {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .logo-giant { width: 450px; animation: logoImpact 1s ease-out, logoFloating 3s infinite ease-in-out; }
        @keyframes logoImpact { 0% { transform: scale(3); opacity: 0; filter: blur(20px); } 100% { transform: scale(1); opacity: 1; filter: blur(0); } }
        @keyframes logoFloating { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        /* MPC TEXTURA REALISTA METAL/MADEIRA */
        .mpc-chassi {
            background: linear-gradient(145deg, #222 0%, #050505 100%);
            background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            border: 6px solid #333; border-radius: 40px; padding: 30px; position: relative;
            box-shadow: 0 0 0 12px #111, 0 40px 100px #000;
            border-right: 35px solid #1a0f05;
        }

        /* HABBO WINDOW STYLE (POP-UPS) */
        .habbo-window {
            background: #f0f0f0; border: 2px solid #000; border-radius: 10px;
            box-shadow: 4px 4px 0 rgba(0,0,0,0.5); color: #000;
        }
        .habbo-header { background: #004f5d; padding: 8px; color: #fff; display: flex; justify-content: space-between; border-radius: 8px 8px 0 0; }
        .habbo-tab { background: #ccc; border: 1px solid #999; padding: 8px 12px; cursor: pointer; border-bottom: 0; border-radius: 5px 5px 0 0; }
        .habbo-tab.active { background: #f0f0f0; border-color: #000; font-weight: bold; }

        /* AVATAR RENDER PIXELADO (ISOMÉTRICO) */
        .avatar-pedestal {
            width: 280px; height: 380px;
            background: url('https://www.transparenttextures.com/patterns/dark-leather.png'), radial-gradient(circle, #333 0%, #000 80%);
            border: 4px solid #111; border-radius: 20px; position: relative;
            display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        .pixel-boneco { 
            width: 220px; height: 320px; 
            image-rendering: pixelated; 
            filter: drop-shadow(0 15px 5px rgba(0,0,0,0.5));
            transition: transform 0.3s;
        }

        /* BOTÕES MPC (PADS) */
        .mpc-pad {
            background: linear-gradient(180deg, #333 0%, #1a1a1a 100%);
            border: 2px solid #444; border-bottom: 8px solid #000; border-radius: 12px;
            height: 85px; cursor: pointer; transition: 0.05s;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .mpc-pad:active { transform: translateY(4px); border-bottom-width: 2px; background: var(--orange); box-shadow: 0 0 30px var(--orange); }

        .bc-symbol { color: var(--gold); animation: pulseCoin 1.5s infinite; font-weight: bold; }
        @keyframes pulseCoin { 0%, 100% { text-shadow: 0 0 5px var(--gold); } 50% { text-shadow: 0 0 20px var(--gold); } }

        .screw { width: 12px; height: 12px; background: #444; border-radius: 50%; border: 1px solid #000; position: absolute; box-shadow: inset 1px 1px 1px #fff; }
    </style>
</head>
<body>

    <!-- TELA DE CARREGAMENTO -->
    <div id="loading-screen">
        <img src="logo.png" class="logo-giant">
        <div class="pixel text-gold text-[10px] mt-10 animate-pulse">SCANNING_HARDWARE_UNIT_01</div>
        <div class="loading-bar-container bg-gray-900 w-80 h-2 mt-4 rounded-full overflow-hidden">
            <div id="load-bar" class="bg-gold h-full w-0 transition-all duration-300"></div>
        </div>
    </div>

    <!-- SITE WRAPPER -->
    <div id="game-container">
        
        <!-- LOGIN / REGISTRO / GUARDA-ROUPA -->
        <div id="auth-overlay" class="fixed inset-0 z-[5000] bg-black flex items-center justify-center p-10 hidden">
            <div class="habbo-window w-[1100px] h-[750px] flex flex-col">
                <div class="habbo-header">
                    <span class="pixel text-[9px]">Perfect Sample Identity Lab v12</span>
                    <button onclick="checkSession()">✖</button>
                </div>
                
                <div class="flex flex-grow p-6 gap-6">
                    <!-- ESQUERDA: LOGIN/CADASTRO -->
                    <div class="w-80 space-y-6 flex flex-col justify-between">
                        <div id="auth-form-box">
                            <div class="mb-6">
                                <h3 class="font-bold border-b border-gray-400 mb-4">IDENTIFICAÇÃO</h3>
                                <input type="email" id="u-email" placeholder="E-MAIL" class="w-full p-3 border-2 border-gray-400 bg-white mb-3 text-xs outline-none">
                                <div class="relative">
                                    <input type="password" id="u-pass" placeholder="SENHA" class="w-full p-3 border-2 border-gray-400 bg-white text-xs outline-none">
                                    <span onclick="toggleEye('u-pass')" class="absolute right-3 top-3 cursor-pointer">👁️</span>
                                </div>
                            </div>
                            <div id="reg-extra" class="hidden">
                                <input type="text" id="u-nick" placeholder="NICKNAME" class="w-full p-3 border-2 border-gray-400 bg-white mb-3 text-xs outline-none">
                            </div>
                        </div>
                        <div class="space-y-2">
                            <button id="btn-auth-main" onclick="handleAuth()" class="w-full bg-[#3d9a30] text-white py-4 border-b-4 border-[#1e4e18] font-bold text-sm">CONECTAR</button>
                            <button onclick="toggleRegMode()" id="btn-toggle-mode" class="w-full text-[10px] text-gray-600 underline">Ainda não sou produtor</button>
                        </div>
                    </div>

                    <!-- MEIO: PEDESTAL 3D -->
                    <div class="flex-grow flex flex-col items-center justify-center">
                        <div class="avatar-pedestal">
                            <img id="avatar-render" src="" class="pixel-boneco">
                        </div>
                        <div class="flex gap-4 mt-6">
                            <button onclick="rotateBoneco(45)" class="bg-gray-300 p-3 border-2 border-black rounded-lg">◀</button>
                            <button onclick="rotateBoneco(-45)" class="bg-gray-300 p-3 border-2 border-black rounded-lg">▶</button>
                        </div>
                    </div>

                    <!-- DIREITA: ABAS E GRADE -->
                    <div class="w-96 flex flex-col">
                        <div class="flex gap-1 mb-2">
                            <div class="habbo-tab active" onclick="setCat('body')">👤</div>
                            <div class="habbo-tab" onclick="setCat('hair')">💇</div>
                            <div class="habbo-tab" onclick="setCat('tops')">👕</div>
                            <div class="habbo-tab" onclick="setCat('bottoms')">👖</div>
                        </div>
                        <div class="bg-white border-2 border-gray-400 flex-grow p-4 overflow-y-auto" id="items-grid">
                            <!-- Itens Habbo via JS -->
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- APP PRINCIPAL (MPC HARDWARE) -->
        <div id="app" class="hidden mpc-chassi w-full h-full relative">
            <div class="screw top-5 left-5"></div><div class="screw top-5 right-5"></div>
            <div class="screw bottom-5 left-5"></div><div class="screw bottom-5 right-5"></div>

            <!-- HUD SUPERIOR -->
            <div class="flex justify-between items-center mb-10 bg-black/40 p-6 rounded-[35px] border border-white/5 shadow-2xl">
                <div class="flex items-center gap-6">
                    <div class="w-20 h-20 bg-black border-4 border-orange-500/30 rounded-3xl flex items-center justify-center overflow-hidden">
                        <img id="hud-avatar" src="" class="w-full h-full scale-150">
                    </div>
                    <div>
                        <h2 class="text-3xl font-black text-orange-500 uppercase tracking-tighter" id="user-display">NOME</h2>
                        <span class="pixel text-[9px] text-emerald-500">LEVEL 99 // LEGEND</span>
                    </div>
                </div>
                <div class="text-right">
                    <span class="bc-symbol text-2xl" id="balance">1.500 BC</span>
                    <button onclick="handleLogout()" class="block text-[8px] pixel text-red-500 mt-2 hover:underline ml-auto">TERMINAR_SESSÃO</button>
                </div>
            </div>

            <!-- GRID CENTRAL -->
            <div class="grid grid-cols-12 gap-8">
                <div class="col-span-8">
                    <div class="bg-[#050a05] border-[15px] border-[#000] rounded-[30px] h-[480px] p-10 relative overflow-hidden shadow-2xl">
                        <div class="h-full flex flex-col justify-between font-mono text-emerald-500">
                             <div class="flex justify-between border-b border-white/5 pb-2 text-[10px]">
                                <span class="pixel text-[8px] text-gold">Master_Kernel_v12</span>
                                <span id="queue-status">FILA: 0/10</span>
                             </div>
                             <div class="flex flex-col items-center">
                                <h1 class="pixel text-white text-[16px] mb-10 text-center leading-loose">INITIALIZE ARENA<br>MATCHMAKING?</h1>
                                <button onclick="startMatch()" class="px-14 py-6 bg-emerald-950/20 border-2 border-emerald-500 rounded-[35px] pixel text-[11px] hover:bg-emerald-500 hover:text-black transition-all">START_ARENA</button>
                             </div>
                             <p class="text-[9px] opacity-30 text-center">Copyright PSBR Legacy 2030 // Physically Based Audio</p>
                        </div>
                    </div>
                </div>
                <!-- SIDEBAR PERFIL -->
                <div class="col-span-4 bg-black/40 rounded-[50px] border border-white/5 p-8 flex flex-col items-center justify-between">
                    <div class="avatar-pedestal w-full h-64 shadow-2xl">
                         <img id="side-avatar" src="" class="pixel-boneco scale-75">
                         <button onclick="openWardrobe()" class="absolute bottom-2 right-2 bg-gold text-black p-2 rounded-lg text-[10px] font-bold">👕 EDIT</button>
                    </div>
                    <div class="w-full mt-6 space-y-4">
                        <div class="grid grid-cols-3 gap-2">
                            <button class="bg-black border border-gold p-3 rounded-xl pixel text-[9px] text-gold" onclick="saveSlot(1)">S1</button>
                            <button class="bg-black border border-white/10 p-3 rounded-xl pixel text-[9px] text-gray-700" onclick="saveSlot(2)">S2</button>
                            <button class="bg-black border border-white/10 p-3 rounded-xl pixel text-[9px] text-gray-700" onclick="saveSlot(3)">S3</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- PADS -->
            <div class="grid grid-cols-4 gap-8 mt-14">
                <div class="mpc-pad"><span class="pixel text-[10px] text-white">ARENA</span></div>
                <div class="mpc-pad"><span class="pixel text-[10px] text-white">BATTLE_PASS</span></div>
                <div id="admin-pad" class="mpc-pad hidden" onclick="window.location.href='admin.html'"><span class="pixel text-[10px] text-red-600">ADMIN</span></div>
                <div class="mpc-pad border-gold/40" onclick="toggleStore()"><span class="pixel text-[10px] text-gold">MARKET</span></div>
            </div>
        </div>

    </div>

    <!-- LOJA FIVE M STYLE (MODAL) -->
    <div id="store-modal" class="fixed inset-0 z-[6000] bg-black/95 hidden items-center justify-center">
        <div class="habbo-window w-[1100px] h-[750px] bg-[#111] border-white/10 p-10 flex flex-col">
            <div class="flex justify-between items-center mb-10">
                 <h2 class="display-font text-white text-3xl font-black">MARKETPLACE <span class="text-gold">PRO</span></h2>
                 <button onclick="toggleStore()" class="pixel text-[10px] text-red-500">FECHAR [ESC]</button>
            </div>
            <div class="grid grid-cols-12 gap-8 flex-grow">
                 <div class="col-span-3 space-y-3">
                    <button class="w-full text-left p-4 bg-gold text-black font-bold rounded-xl">👑 ITENS VIP</button>
                    <button class="w-full text-left p-4 bg-white/5 text-gray-500 rounded-xl">👕 VESTUÁRIO BT</button>
                 </div>
                 <div class="col-span-9 grid grid-cols-3 gap-6 overflow-y-auto pr-4" id="store-grid">
                    <!-- Itens via JS -->
                 </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        let visual = { body: 1, hair: 1, tops: 1, bottoms: 1, acc: 1 };
        let currentCat = 'body';
        let rotation = 0;
        let isRegister = false;

        // 1. TELA DE LOADING
        window.onload = () => {
            let p = 0;
            const interval = setInterval(() => {
                p += Math.random() * 15;
                if(p >= 100) {
                    p = 100; clearInterval(interval);
                    setTimeout(() => {
                        document.getElementById('loading-screen').style.display = 'none';
                        checkSession();
                    }, 800);
                }
                document.getElementById('load-bar').style.width = p + "%";
            }, 100);
        };

        // 2. ENGINE AVATAR (HABBO RENDER)
        function updateRender() {
            const seed = JSON.stringify(visual);
            const url = `https://api.dicebear.com/7.x/adventurer/svg?seed=${seed}&backgroundColor=transparent`;
            document.getElementById('avatar-render').src = url;
            document.getElementById('hud-avatar').src = url;
            document.getElementById('side-avatar').src = url;
            document.getElementById('avatar-render').style.transform = `rotateY(${rotation}deg)`;
        }

        window.rotateBoneco = (deg) => { rotation += deg; updateRender(); };

        window.setCat = (c) => {
            currentCat = c;
            document.querySelectorAll('.habbo-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            renderItems();
        };

        function renderItems() {
            const g = document.getElementById('items-grid'); g.innerHTML = '';
            for(let i=1; i<=25; i++) {
                const item = document.createElement('div');
                item.className = "bg-gray-200 border-2 border-gray-400 p-2 rounded cursor-pointer hover:border-black aspect-square";
                item.innerHTML = `<img src="https://api.dicebear.com/7.x/adventurer/svg?seed=${currentCat}${i}&backgroundColor=transparent">`;
                item.onclick = () => { visual[currentCat] = i; updateRender(); };
                g.appendChild(item);
            }
        }

        // 3. AUTH & DIMENSÕES
        window.toggleRegMode = () => {
            isRegister = !isRegister;
            document.getElementById('reg-extra').classList.toggle('hidden', !isRegister);
            document.getElementById('btn-auth-main').innerText = isRegister ? "REGISTRAR" : "CONECTAR";
            document.getElementById('btn-toggle-mode').innerText = isRegister ? "Já tenho conta" : "Ainda não sou produtor";
        };

        window.handleAuth = async () => {
            const e = document.getElementById('u-email').value;
            const p = document.getElementById('u-pass').value;
            try {
                if(isRegister) await createUserWithEmailAndPassword(auth, e, p);
                else await signInWithEmailAndPassword(auth, e, p);
            } catch (err) { alert(err.message); }
        };

        function checkSession() {
            onAuthStateChanged(auth, (u) => {
                if (user) {
                    document.getElementById('auth-overlay').classList.add('hidden');
                    document.getElementById('app').classList.remove('hidden');
                    document.getElementById('user-display').innerText = u.email.split('@')[0].toUpperCase();
                    if(u.email === 'eahprovideo1@gmail.com') document.getElementById('admin-pad').classList.remove('hidden');
                } else {
                    document.getElementById('auth-overlay').classList.remove('hidden');
                    renderItems();
                    updateRender();
                }
            });
        }

        window.handleLogout = () => { if(confirm("Desconectar?")) signOut(auth).then(() => location.reload()); };

        window.toggleStore = () => {
            const m = document.getElementById('store-modal');
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        };

        // ESCALA INTELIGENTE (SEM CORTES)
        function scaleUI() {
            const container = document.getElementById('game-container');
            const scale = Math.min(window.innerWidth / 1350, window.innerHeight / 850);
            container.style.transform = `scale(${scale})`;
        }
        window.addEventListener('resize', scaleUI); scaleUI();
    </script>
</body>
</html>
