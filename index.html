<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>Perfect Sample BR — THE MACHINE v29</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root { --orange: #ff5500; --gold: #D4A24C; }
        * { image-rendering: pixelated; user-select: none; }
        
        body { 
            background: #000; margin: 0; overflow: hidden; 
            display: flex; align-items: center; justify-content: center; min-height: 100vh;
        }

        /* 🖼️ CONTAINER BASEADO NA IMAGEM (1200x800) */
        #mpc-master {
            width: 1200px; height: 800px;
            background-image: url('mpc_bg.png');
            background-size: cover;
            position: relative;
            transform-origin: center;
        }

        /* 📟 VISOR LCD (MAPA SOBRE A TELA VERDE) */
        .visor-area {
            position: absolute; top: 100px; left: 512px;
            width: 215px; height: 95px;
            display: flex; flex-direction: column;
            overflow: hidden; font-family: 'Press Start 2P'; color: #00ff66;
            text-shadow: 0 0 5px #00ff66; font-size: 6px;
        }

        /* 👕 IDENTITY LAB (MAPA SOBRE O PAINEL PRETO DIREITO) */
        .sidebar-module {
            position: absolute; top: 25px; left: 745px;
            width: 420px; height: 750px;
            padding: 20px; display: flex; flex-direction: column;
        }

        /* 🕹️ GRID DE PADS INVISÍVEIS (SOBRE OS BOTÕES DA FOTO) */
        .pads-overlay {
            position: absolute; top: 295px; left: 135px;
            width: 320px; height: 300px;
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
        }
        .invisible-pad {
            background: transparent; cursor: pointer; border-radius: 5px;
            transition: background 0.1s;
        }
        .invisible-pad:active { background: rgba(255, 85, 0, 0.4); box-shadow: 0 0 20px var(--orange); }

        /* ESTILO HABBO DENTRO DA SIDEBAR */
        .habbo-mini-ui {
            background: #e1e1e1; border: 2px solid #000; color: #000;
            display: flex; flex-direction: column; height: 100%;
        }
        .avatar-preview-box {
            background: #adadad; border: 3px solid #fff; height: 280px;
            display: flex; align-items: center; justify-content: center; position: relative;
        }
        .layer { position: absolute; width: 150px; height: 250px; background-size: contain; background-repeat: no-repeat; bottom: 20px; }

        /* MARQUEE DO VISOR */
        .visor-marquee {
            white-space: nowrap; position: absolute; bottom: 5px;
            animation: scroll 8s linear infinite; color: #00ff66;
        }
        @keyframes scroll { from { left: 100%; } to { left: -100%; } }

        .input-dark { background: #000; border: 1px solid #333; color: var(--gold); padding: 10px; font-size: 8px; width: 100%; outline: none; }
    </style>
</head>
<body>

    <div id="mpc-master">
        
        <!-- 📟 VISOR LCD (O "CÉREBRO" TEXTUAL) -->
        <div class="visor-area">
            <div class="p-2 border-b border-emerald-900 mb-1">OS_V29_ACTIVE</div>
            <div id="visor-status" class="px-2">FILA: 0/10<br>READY_UNIT</div>
            <div class="visor-marquee">SEJA BEM VINDO AO PERFECT SAMPLE BR — SUPREME ENGINE ACTIVE</div>
        </div>

        <!-- 🕹️ PADS INVISÍVEIS (MAPA DE CLIQUES) -->
        <div class="pads-overlay">
            <div class="invisible-pad" onclick="alert('Arena Iniciada')"></div>
            <div class="invisible-pad" onclick="alert('Passe de Batalha')"></div>
            <div class="invisible-pad" onclick="window.location.href='admin.html'"></div>
            <div class="invisible-pad" onclick="handleLogout()"></div>
            <!-- Gerando o resto dos 16 pads -->
            <script>for(let i=0; i<12; i++) document.write('<div class="invisible-pad"></div>');</script>
        </div>

        <!-- 👕 IDENTITY LAB (PAINEL DIREITO) -->
        <div class="sidebar-module">
            
            <!-- ESTADO: LOGIN -->
            <div id="auth-box" class="habbo-mini-ui p-6 rounded-lg">
                <span class="text-[10px] font-black uppercase mb-4 block" style="font-family: 'Syncopate';">Contrato_Acesso</span>
                <input type="email" id="u-email" placeholder="EMAIL_PRODUTOR" class="input-dark mb-2">
                <input type="password" id="u-pass" placeholder="CHAVE_DNA" class="input-dark">
                <button onclick="handleAuth()" class="bg-[#fde047] border-b-4 border-[#7c2d12] py-3 mt-4 font-black text-[9px] uppercase text-black">Conectar</button>
                <button onclick="toggleRegMode()" id="btn-reg-mode" class="text-[8px] text-gray-600 mt-4 underline uppercase">Criar Novo Contrato</button>
            </div>

            <!-- ESTADO: APP (PÓS-LOGIN) -->
            <div id="app-box" class="hidden habbo-mini-ui">
                <div class="bg-[#004f5d] p-2 text-white text-[9px] font-bold flex justify-between">
                    <span>PERFIL_PRODUTOR</span>
                    <span id="user-display">---</span>
                </div>
                
                <div class="avatar-preview-box">
                    <div id="l-body" class="layer"></div>
                    <div id="l-tops" class="layer"></div>
                    <div id="l-hair" class="layer"></div>
                    <div style="position: absolute; bottom: 20px; width: 80px; height: 5px; background: rgba(0,0,0,0.3); border-radius: 50%;"></div>
                </div>

                <div class="p-4 bg-white flex-grow overflow-y-auto" id="item-grid">
                    <!-- Grade de itens habbo -->
                </div>
                
                <div class="p-4 bg-gray-300 border-t-2 border-black flex justify-between items-center">
                    <span class="text-[14px] font-bold text-gold">1.500 BC</span>
                    <button onclick="alert('Loja')" class="bg-orange-600 text-white px-4 py-2 text-[9px] font-bold">SHOP</button>
                </div>
            </div>

        </div>

    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        let isRegister = false;
        let figure = { hr: '115-42', hd: '180-1', ch: '215-62' };

        // CONEXÃO
        onAuthStateChanged(auth, (user) => {
            document.getElementById('mpc-master').style.display = 'block';
            scaleUI();
            if (user) {
                document.getElementById('auth-box').classList.add('hidden');
                document.getElementById('app-box').classList.remove('hidden');
                document.getElementById('user-display').innerText = user.email.split('@')[0].toUpperCase();
                updateRender();
                renderGrid();
            }
        });

        function updateRender() {
            const baseUrl = `https://www.habbo.com.br/habbo-imaging/avatarimage?figure=hr-${figure.hr}.hd-${figure.hd}.ch-${figure.ch}&size=l&direction=4&head_direction=4&gesture=sml&action=std`;
            document.getElementById('l-body').style.backgroundImage = `url('https://www.habbo.com.br/habbo-imaging/avatarimage?figure=hd-${figure.hd}&size=l&direction=4')`;
            document.getElementById('l-tops').style.backgroundImage = `url('https://www.habbo.com.br/habbo-imaging/avatarimage?figure=ch-${figure.ch}&size=l&direction=4')`;
            document.getElementById('l-hair').style.backgroundImage = `url('https://www.habbo.com.br/habbo-imaging/avatarimage?figure=hr-${figure.hr}&size=l&direction=4')`;
        }

        function renderGrid() {
            const g = document.getElementById('item-grid'); g.innerHTML = '';
            [1, 5, 10, 20, 60, 100].forEach(id => {
                const d = document.createElement('div');
                d.className = "w-16 h-16 border-2 border-black m-1 inline-block cursor-pointer bg-gray-100";
                d.innerHTML = `<img src="https://www.habbo.com.br/habbo-imaging/avatarimage?figure=ch-${id}-1&headonly=1&size=m">`;
                d.onclick = () => { figure.ch = id + "-1"; updateRender(); };
                g.appendChild(d);
            });
        }

        window.handleAuth = async () => {
            const e = document.getElementById('u-email').value;
            const p = document.getElementById('u-pass').value;
            try {
                if(isRegister) await createUserWithEmailAndPassword(auth, e, p);
                else await signInWithEmailAndPassword(auth, e, p);
            } catch (err) { alert("ERRO: " + err.message); }
        };

        window.toggleRegMode = () => {
            isRegister = !isRegister;
            document.getElementById('btn-reg-mode').innerText = isRegister ? "JÁ TENHO CONTA" : "CRIAR NOVO CONTRATO";
        };

        function scaleUI() {
            const v = document.getElementById('mpc-master');
            const s = Math.min(window.innerWidth / 1250, window.innerHeight / 850);
            v.style.transform = `scale(${s})`;
        }
        window.addEventListener('resize', scaleUI);
        window.handleLogout = () => { if(confirm("Deseja deslogar?")) signOut(auth).then(() => location.reload()); };
    </script>
</body>
</html>
