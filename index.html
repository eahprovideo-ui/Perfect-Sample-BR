<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfect Sample BR — Arena v13.0 PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #D4A24C; --orange: #ff5500; --neon-blue: #00f0ff; --bg: #000; }
        
        body { 
            background: #000; color: #fff; font-family: 'Space Grotesk', sans-serif; 
            margin: 0; padding: 0; display: flex; align-items: center; justify-content: center;
            min-height: 100vh; overflow: hidden;
        }

        .pixel { font-family: 'Press Start 2P', cursive; }

        /* ENGINE DE DIMENSÃO (RESOLVE O PROBLEMA DO ZOOM) */
        #game-container {
            width: 1280px; height: 800px;
            display: none; /* Começa oculto e o JS mostra */
            flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 1s ease;
        }

        /* TELA DE CARREGAMENTO ESTILO VU METER */
        #loading-screen {
            position: fixed; inset: 0; background: #050505; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .vu-meter-container {
            width: 500px; height: 30px; background: #111; border: 3px solid #333;
            padding: 4px; display: flex; gap: 4px; margin-top: 30px; border-radius: 5px;
        }
        .vu-segment { flex: 1; height: 100%; background: #1a1a1a; transition: 0.1s; }
        .vu-active-green { background: #00ff66; box-shadow: 0 0 10px #00ff66; }
        .vu-active-yellow { background: #ffff00; box-shadow: 0 0 10px #ffff00; }
        .vu-active-red { background: #ff0000; box-shadow: 0 0 15px #ff0000; }

        /* MPC TEXTURA METALIZADA REALISTA */
        .mpc-chassi {
            background: linear-gradient(145deg, #1f1f1f 0%, #050505 100%);
            background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            border: 6px solid #2a2a2a; border-radius: 50px; padding: 40px; position: relative;
            box-shadow: 0 0 0 15px #111, 0 50px 100px #000;
            border-right: 40px solid #1a0f05; /* Madeira de estúdio */
        }

        /* HABBO WINDOW (THEMED) */
        .habbo-window {
            background: #e1e1e1; border: 2px solid #000; border-radius: 10px;
            box-shadow: 6px 6px 0 rgba(0,0,0,0.8); color: #000;
        }
        .habbo-header { background: #004f5d; padding: 10px; color: #fff; font-weight: bold; }

        /* PADS DA MPC (SISTEMA) */
        .mpc-pad {
            background: linear-gradient(180deg, #333 0%, #111 100%);
            border: 2px solid #444; border-bottom: 8px solid #000; border-radius: 15px;
            height: 95px; cursor: pointer; transition: 0.1s;
            display: flex; flex-direction: column; items: center; justify-content: center;
        }
        .mpc-pad:active { transform: translateY(4px); border-bottom-width: 2px; background: var(--orange); }

        .avatar-render { 
            width: 220px; height: 320px; image-rendering: pixelated; 
            filter: drop-shadow(0 15px 10px rgba(0,0,0,0.6));
        }

        .screw { width: 14px; height: 14px; background: #333; border-radius: 50%; border: 1px solid #000; position: absolute; }
    </style>
</head>
<body>

    <!-- TELA DE CARREGAMENTO PRO (VU METER) -->
    <div id="loading-screen">
        <img src="logo.png" style="width: 350px;" class="animate-pulse">
        <div class="pixel text-gold text-[8px] mt-10" id="load-status">SISTEMA: INICIALIZANDO KERNEL...</div>
        
        <div class="vu-meter-container" id="vu-meter">
            <!-- 20 segmentos gerados por JS -->
        </div>
        <p class="pixel text-[6px] text-gray-700 mt-6 tracking-[1em]">PERFECT SAMPLE BR // HARDWARE EMULATION</p>
    </div>

    <!-- CONTAINER DO JOGO (COM ESCALA DINÂMICA) -->
    <div id="game-container">
        
        <!-- LABORATÓRIO HABBO (LOGIN / REGISTER) -->
        <div id="auth-overlay" class="fixed inset-0 z-[5000] bg-black/90 flex items-center justify-center p-10 hidden">
            <div class="habbo-window w-[1100px] h-[750px] flex flex-col overflow-hidden">
                <div class="habbo-header flex justify-between">
                    <span class="pixel text-[9px] uppercase">Identity_Lab_v13</span>
                    <span class="cursor-pointer" onclick="location.reload()">✖</span>
                </div>
                
                <div class="flex flex-grow p-8 gap-8">
                    <!-- LOGIN/CADASTRO -->
                    <div class="w-80 flex flex-col justify-between">
                        <div class="bg-white/50 p-6 rounded-xl border-2 border-gray-400">
                            <h3 class="pixel text-[7px] mb-6">PRODUCER_AUTH</h3>
                            <input type="email" id="u-email" placeholder="EMAIL" class="w-full p-4 border-2 border-black bg-white mb-4 text-xs font-bold outline-none">
                            <input type="password" id="u-pass" placeholder="PASSWORD" class="w-full p-4 border-2 border-black bg-white text-xs font-bold outline-none">
                            <button id="btn-auth-main" onclick="handleAuth()" class="w-full mt-6 bg-[#3d9a30] text-white py-4 border-b-8 border-[#1e4e18] font-bold uppercase hover:brightness-110">ENTRAR NA ARENA</button>
                        </div>
                        <button onclick="toggleRegMode()" id="btn-toggle-mode" class="text-xs text-gray-600 font-bold underline">Não tenho conta / Registrar</button>
                    </div>

                    <!-- PERSONAGEM -->
                    <div class="flex-grow flex flex-col items-center justify-center bg-gray-300 rounded-3xl border-4 border-white shadow-inner">
                        <img id="avatar-render" src="" class="avatar-render">
                    </div>

                    <!-- GUARDA ROUPA -->
                    <div class="w-96 flex flex-col bg-gray-200 border-2 border-gray-400 p-4 rounded-xl">
                        <div class="flex gap-1 mb-4" id="tabs">
                            <button class="bg-gray-400 p-3 rounded font-bold" onclick="setCat('body')">👤</button>
                            <button class="bg-gray-400 p-3 rounded font-bold" onclick="setCat('hair')">💇</button>
                            <button class="bg-gray-400 p-3 rounded font-bold" onclick="setCat('tops')">👕</button>
                        </div>
                        <div id="items-grid" class="grid grid-cols-3 gap-3 overflow-y-auto pr-2"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- APP PRINCIPAL (MPC HARDWARE) -->
        <div id="app" class="mpc-chassi w-full h-full relative hidden">
            <!-- HUD -->
            <div class="flex justify-between items-center mb-8 bg-black/60 p-8 rounded-[40px] border border-white/5 shadow-2xl">
                <div class="flex items-center gap-6">
                    <div class="w-20 h-20 bg-black border-4 border-orange-500/20 rounded-3xl overflow-hidden">
                        <img id="hud-avatar" src="" class="w-full h-full scale-150">
                    </div>
                    <div>
                        <h2 class="text-3xl font-black text-orange-500 uppercase tracking-tighter" id="user-display">---</h2>
                        <span class="pixel text-[8px] text-emerald-400 animate-pulse">SYSTEM_ACTIVE // LIVE</span>
                    </div>
                </div>
                <div class="text-right">
                    <span class="pixel text-gold text-2xl" id="balance">1.500 BC</span>
                    <button onclick="handleLogout()" class="block text-[7px] pixel text-red-500 mt-2 ml-auto">LOGOUT</button>
                </div>
            </div>

            <!-- TELA LCD -->
            <div class="grid grid-cols-12 gap-8">
                <div class="col-span-8">
                    <div class="bg-[#050a05] border-[15px] border-[#000] rounded-[30px] h-[500px] p-10 relative overflow-hidden shadow-2xl">
                        <div class="h-full flex flex-col justify-between font-mono text-emerald-500">
                            <div class="flex justify-between border-b border-white/5 pb-2 uppercase text-[10px]">
                                <span>ARENA_KERNEL_V13</span>
                                <span id="socket-status">READY</span>
                            </div>
                            <div class="flex flex-col items-center">
                                <h1 class="pixel text-white text-[16px] mb-12 text-center leading-loose">INITIALIZE SUPREME<br>MATCHMAKING?</h1>
                                <button onclick="alert('Buscando Arena...')" class="px-16 py-8 bg-emerald-950/20 border-2 border-emerald-500 rounded-[40px] pixel text-[11px] hover:bg-emerald-500 hover:text-black transition-all">ENTER_ARENA</button>
                            </div>
                            <div class="text-[9px] opacity-20 text-center uppercase tracking-[0.5em]">Copyright Perfect Sample BR 2030</div>
                        </div>
                    </div>
                </div>

                <!-- SIDEBAR -->
                <div class="col-span-4 bg-black/40 rounded-[60px] border border-white/5 p-10 flex flex-col items-center justify-between shadow-inner">
                    <div class="w-full h-72 bg-black rounded-[40px] border-2 border-gold/10 flex items-center justify-center overflow-hidden relative">
                        <img id="side-avatar" src="" class="avatar-render scale-75">
                    </div>
                    <div class="grid grid-cols-3 gap-2 w-full mt-6">
                        <button class="bg-black border border-gold p-3 rounded-xl pixel text-[8px] text-gold">S1</button>
                        <button class="bg-black border border-white/10 p-3 rounded-xl pixel text-[8px] text-gray-700">S2</button>
                        <button class="bg-black border border-white/10 p-3 rounded-xl pixel text-[8px] text-gray-700">S3</button>
                    </div>
                </div>
            </div>

            <!-- PADS INFERIORES -->
            <div class="grid grid-cols-4 gap-8 mt-14">
                <div class="mpc-pad"><span class="pixel text-[10px] text-white">ARENA</span></div>
                <div class="mpc-pad"><span class="pixel text-[10px] text-white">BPASS</span></div>
                <div id="admin-pad" class="mpc-pad hidden" onclick="window.location.href='admin.html'"><span class="pixel text-[10px] text-red-500">ROOT</span></div>
                <div class="mpc-pad border-gold/30"><span class="pixel text-[10px] text-gold">MARKET</span></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        let visual = { body: 1, hair: 1, tops: 1, bottoms: 1 };
        let isRegister = false;

        // 1. MOTOR DE CARREGAMENTO VU METER
        window.onload = () => {
            const vu = document.getElementById('vu-meter');
            const status = document.getElementById('load-status');
            const msg = ["SCANNING HARDWARE...", "CARREGANDO SAMPLES...", "SINTETIZANDO OSCILADORES...", "ESTABILIZANDO ARENA..."];
            
            // Criar 25 segmentos de VU Meter
            for(let i=0; i<25; i++) {
                const seg = document.createElement('div');
                seg.className = "vu-segment";
                vu.appendChild(seg);
            }

            let p = 0;
            const segments = document.querySelectorAll('.vu-segment');
            const interval = setInterval(() => {
                p++;
                if(p <= segments.length) {
                    const seg = segments[p-1];
                    if(p < 15) seg.className = "vu-segment vu-active-green";
                    else if(p < 22) seg.className = "vu-segment vu-active-yellow";
                    else seg.className = "vu-segment vu-active-red";
                    
                    if(p % 6 === 0) status.innerText = `SISTEMA: ${msg[Math.floor(p/7)]}`;
                }

                if(p >= segments.length + 5) {
                    clearInterval(interval);
                    document.getElementById('loading-screen').style.display = 'none';
                    checkSession();
                }
            }, 150);
        };

        // 2. ENGINE DE RENDER
        function updateRender() {
            const seed = JSON.stringify(visual);
            const url = `https://api.dicebear.com/7.x/adventurer/svg?seed=${seed}&backgroundColor=transparent`;
            document.getElementById('avatar-render').src = url;
            document.getElementById('hud-avatar').src = url;
            document.getElementById('side-avatar').src = url;
        }

        window.setCat = (c) => { renderGrid(c); };

        function renderGrid(c) {
            const g = document.getElementById('items-grid'); g.innerHTML = '';
            for(let i=1; i<=15; i++) {
                const item = document.createElement('div');
                item.className = "bg-white border-2 border-black p-1 rounded cursor-pointer aspect-square hover:bg-gold/20";
                item.innerHTML = `<img src="https://api.dicebear.com/7.x/adventurer/svg?seed=${c}${i}&backgroundColor=transparent">`;
                item.onclick = () => { visual[c] = i; updateRender(); };
                g.appendChild(item);
            }
        }

        // 3. AUTH & SESSION (A CORREÇÃO DO ERRO ESTÁ AQUI)
        function checkSession() {
            onAuthStateChanged(auth, (user) => { // Corrigido u para user
                const container = document.getElementById('game-container');
                container.style.display = 'flex';
                scaleUI();

                if (user) {
                    document.getElementById('auth-overlay').classList.add('hidden');
                    document.getElementById('app').classList.remove('hidden');
                    document.getElementById('user-display').innerText = user.email.split('@')[0].toUpperCase();
                    if(user.email === 'eahprovideo1@gmail.com') document.getElementById('admin-pad').classList.remove('hidden');
                } else {
                    document.getElementById('auth-overlay').classList.remove('hidden');
                    renderGrid('body');
                    updateRender();
                }
            });
        }

        window.handleAuth = async () => {
            const e = document.getElementById('u-email').value;
            const p = document.getElementById('u-pass').value;
            try {
                if(isRegister) await createUserWithEmailAndPassword(auth, e, p);
                else await signInWithEmailAndPassword(auth, e, p);
            } catch (err) { alert("ERRO: " + err.message); }
        };

        window.toggleRegMode = () => {
            isRegister = !isRegister;
            document.getElementById('btn-auth-main').innerText = isRegister ? "CRIAR CONTA" : "ENTRAR NA ARENA";
        };

        window.handleLogout = () => { signOut(auth).then(() => location.reload()); };

        // 4. ESCALA INTELIGENTE
        function scaleUI() {
            const container = document.getElementById('game-container');
            const scale = Math.min(window.innerWidth / 1350, window.innerHeight / 850);
            container.style.transform = `scale(${scale})`;
        }
        window.addEventListener('resize', scaleUI);
    </script>
</body>
</html>
