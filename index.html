<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfect Sample BR — Arena MPC v4.6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #D4A24C; --orange: #ff5500; --bg: #0d0d0d; --screen: #0d1b10; }
        body { 
            background: #111;
            background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://www.transparenttextures.com/patterns/brushed-alum.png');
            color: #eee; font-family: 'Space Grotesk', sans-serif; overflow: hidden; 
        }
        .pixel { font-family: 'Press Start 2P', cursive; }

        /* CHASSI MPC METAL */
        .mpc-chassi {
            background: linear-gradient(135deg, #2a2a2a 0%, #151515 100%);
            background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            border: 10px solid #222; border-radius: 60px; padding: 40px; position: relative;
            border-right: 30px solid #1a0f05; 
            box-shadow: 0 60px 120px rgba(0,0,0,0.9), inset 0 2px 10px rgba(255,255,255,0.05);
        }

        /* TELA CRT */
        .lcd-display {
            background: var(--screen); border: 12px solid #050505; border-radius: 25px;
            position: relative; overflow: hidden; box-shadow: inset 0 0 80px #000;
        }
        .lcd-display::after {
            content: " "; display: absolute; inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.05));
            z-index: 10; pointer-events: none; background-size: 100% 3px, 3px 100%;
        }

        /* BOOT SCREEN */
        #auth-overlay { 
            position: fixed; inset: 0; background: #000; z-index: 1000; 
            display: flex; align-items: center; justify-content: center; flex-direction: column;
            transition: transform 0.8s cubic-bezier(0.87, 0, 0.13, 1);
        }
        .boot-hidden { transform: translateY(-100%); }
        .login-card { background: rgba(10, 10, 10, 0.95); border: 2px solid var(--gold); padding: 50px; border-radius: 40px; width: 420px; text-align: center; }

        /* PADS */
        .mpc-pad {
            background: #333; border-bottom: 6px solid #000; border-radius: 15px; height: 100px; cursor: pointer; transition: 0.1s;
            display: flex; flex-direction: column; items: center; justify-content: center;
        }
        .mpc-pad:active { transform: translateY(4px); border-bottom-width: 1px; background: var(--orange); }

        /* AVATAR ENGINE */
        .avatar-viewport { 
            width: 160px; height: 160px; background: #000; border-radius: 20px; 
            position: relative; overflow: hidden; border: 2px solid #333; 
        }
        .avatar-layer { 
            position: absolute; inset: 0; width: 100%; height: 100%; 
            background-size: contain; background-repeat: no-repeat; image-rendering: pixelated;
        }
        
        #particle-canvas { position: fixed; inset: 0; z-index: -1; opacity: 0.3; }

        /* OLHO DA SENHA */
        .eye-icon { position: absolute; right: 15px; top: 15px; cursor: pointer; color: #555; }
        .eye-icon.active { color: var(--gold); }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <!-- TELA DE LOGIN -->
    <div id="auth-overlay">
        <div class="login-card">
            <h2 class="pixel text-gold text-[9px] mb-10 tracking-widest">BOOTING_PSBR_v4.6</h2>
            <input type="email" id="email" placeholder="EMAIL_PRODUTOR" class="w-full bg-black border border-white/10 p-4 rounded-xl mb-4 text-xs outline-none focus:border-gold text-white">
            
            <div class="relative w-full">
                <input type="password" id="pass" placeholder="SENHA_ACESSO" class="w-full bg-black border border-white/10 p-4 rounded-xl mb-8 text-xs outline-none focus:border-gold text-white">
                <div id="toggle-eye" class="eye-icon">
                    <!-- ÍCONE DO OLHO (SVG) -->
                    <svg id="eye-svg" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path id="eye-path" d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                        <line id="eye-slash" x1="1" y1="1" x2="23" y2="23" style="display:none"></line>
                    </svg>
                </div>
            </div>

            <button id="btn-login" class="w-full bg-orange-600 text-white py-4 rounded-2xl font-bold text-xs mb-4 shadow-lg shadow-orange-900/40 hover:bg-orange-500 transition-all">CONECTAR AO KERNEL</button>
            <button id="btn-register" class="text-gray-600 text-[9px] pixel hover:text-white transition-colors">REGISTRAR_NOVA_IDENTIDADE</button>
        </div>
    </div>

    <!-- SITE PRINCIPAL -->
    <div id="app" class="hidden mpc-chassi w-full max-w-6xl shadow-2xl relative mx-auto my-10">
        <!-- HUD -->
        <div class="flex justify-between items-center mb-10 bg-black/50 p-6 rounded-[35px] border border-white/5">
            <div class="flex items-center gap-5">
                <div class="w-14 h-14 bg-black border-2 border-orange-500/30 rounded-2xl flex items-center justify-center">
                    <span class="pixel text-gold text-lg" id="user-initial">?</span>
                </div>
                <div>
                    <h2 class="pixel text-[10px] text-orange-500" id="user-display">---</h2>
                    <span class="text-[9px] text-gray-500 uppercase font-bold tracking-widest">Patente: Legend Producer</span>
                </div>
            </div>
            <div class="flex gap-4 font-mono text-[10px]">
                <div class="text-right"><span class="block text-gray-600 uppercase">Coins</span><span class="text-gold font-bold text-lg">1.500 BC</span></div>
                <div class="text-right border-l border-white/5 pl-6"><span class="block text-gray-600 uppercase">Arena</span><span class="text-green-500 font-bold" id="socket-status">CONNECTING...</span></div>
            </div>
        </div>

        <div class="grid grid-cols-12 gap-10">
            <!-- LCD SCREEN -->
            <div class="col-span-12 lg:col-span-8">
                <div class="lcd-display h-[450px] p-10 font-mono text-emerald-500">
                    <div id="screen-arena" class="h-full flex flex-col justify-between">
                        <div class="flex justify-between border-b border-emerald-950 pb-3">
                            <span class="pixel text-[8px] text-gold uppercase">Kernel_Active</span>
                            <span class="text-[10px]" id="queue-status">FILA: 0/10</span>
                        </div>
                        <div class="flex-grow flex flex-col items-center justify-center">
                            <h2 class="pixel text-[10px] mb-8 text-white">READY FOR THE NEXT BATTLE?</h2>
                            <button id="btn-start-arena" class="px-8 py-4 bg-emerald-900/20 border-2 border-emerald-500 rounded-2xl pixel text-[9px] hover:bg-emerald-500 hover:text-black transition-all">START_TRAP_ARENA</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- SIDEBAR AVATAR -->
            <div class="col-span-4 flex flex-col gap-4">
                <div class="bg-black/60 rounded-[45px] p-6 border border-white/5 flex flex-col items-center">
                    <span class="pixel text-[7px] text-gold mb-4 uppercase">Identity_Preview</span>
                    <div class="avatar-viewport">
                        <div id="av-skin" class="avatar-layer" style="background-image: url('https://api.dicebear.com/7.x/pixel-art/svg?seed=body&skinColor=d09a6a')"></div>
                        <div id="av-hair" class="avatar-layer"></div>
                        <div id="av-clothes" class="avatar-layer"></div>
                        <div id="av-acc" class="avatar-layer"></div>
                    </div>
                    <div class="grid grid-cols-2 gap-2 mt-4 w-full">
                        <button onclick="window.changeStyle('hair')" class="bg-white/5 p-2 rounded text-[8px] pixel hover:bg-white/10">CABELO</button>
                        <button onclick="window.changeStyle('clothes')" class="bg-white/5 p-2 rounded text-[8px] pixel hover:bg-white/10">ROUPA</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- PADS -->
        <div class="grid grid-cols-4 gap-6 mt-12">
            <div class="mpc-pad" onclick="location.reload()"><span class="pixel text-[10px] text-white">ARENA</span></div>
            <div class="mpc-pad" onclick="alert('Season 1 em breve!')"><span class="pixel text-[10px] text-white">PASS</span></div>
            <div class="mpc-pad" onclick="window.location.href='admin.html'"><span class="pixel text-[10px] text-red-600">ADMIN</span></div>
            <div class="mpc-pad border-gold/30"><span class="pixel text-[10px] text-gold">LOJA</span></div>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // 1. CONEXÃO SOCKET (RENDER)
        const socket = io("https://perfect-sample-br.onrender.com");

        socket.on('connect', () => {
            const status = document.getElementById('socket-status');
            if(status) {
                status.innerText = "LIVE_SERVER";
                status.className = "text-green-500 font-bold";
            }
        });

        socket.on('queue_update', (data) => {
            const q = document.getElementById('queue-status');
            if(q) q.innerText = `FILA: ${data.count}/10`;
        });

        // 2. TOGGLE OLHO DA SENHA (RISCADO)
        const toggleEye = document.getElementById('toggle-eye');
        const passInput = document.getElementById('pass');
        const eyeSlash = document.getElementById('eye-slash');

        toggleEye.addEventListener('click', () => {
            const isPass = passInput.type === 'password';
            passInput.type = isPass ? 'text' : 'password';
            eyeSlash.style.display = isPass ? 'block' : 'none';
            toggleEye.classList.toggle('active', isPass);
        });

        // 3. LÓGICA DE AUTH (LOGIN / REGISTRO)
        async function handleAuth(type) {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;

            if(!email || !pass) return alert("Preencha todos os campos!");

            try {
                let userCred;
                if(type === 'login') {
                    userCred = await signInWithEmailAndPassword(auth, email, pass);
                } else {
                    userCred = await createUserWithEmailAndPassword(auth, email, pass);
                }
                
                // Sucesso
                window.playSound('boot');
                document.getElementById('auth-overlay').classList.add('boot-hidden');
                setTimeout(() => {
                    document.getElementById('auth-overlay').style.display = 'none';
                    document.getElementById('app').classList.remove('hidden');
                    document.getElementById('user-display').innerText = userCred.user.email.split('@')[0].toUpperCase();
                    document.getElementById('user-initial').innerText = userCred.user.email[0].toUpperCase();
                }, 800);

            } catch (err) {
                window.playSound('error');
                console.error(err.code);
                // Tradução simples de erros comuns
                if(err.code === 'auth/invalid-credential') alert("E-mail ou Senha incorretos!");
                else if(err.code === 'auth/email-already-in-use') alert("Este e-mail já está cadastrado!");
                else if(err.code === 'auth/weak-password') alert("A senha deve ter pelo menos 6 caracteres!");
                else alert("Erro: " + err.message);
            }
        }

        // Vincular funções aos botões de forma manual (para evitar erro de módulo)
        document.getElementById('btn-login').addEventListener('click', () => handleAuth('login'));
        document.getElementById('btn-register').addEventListener('click', () => handleAuth('register'));
        
        const startBtn = document.getElementById('btn-start-arena');
        if(startBtn) {
            startBtn.addEventListener('click', () => {
                const user = document.getElementById('user-display').innerText;
                socket.emit('join_ranked_queue', { genre: 'TRAP', username: user });
            });
        }

        // 4. AVATAR STYLE
        window.changeStyle = (type) => {
            const seeds = ['hair', 'beard', 'shaved', 'long'];
            const randomSeed = seeds[Math.floor(Math.random() * seeds.length)];
            const url = `https://api.dicebear.com/7.x/pixel-art/svg?seed=${randomSeed}`;
            document.getElementById(`av-${type}`).style.backgroundImage = `url('${url}')`;
            window.playSound('click');
        };

        // 5. AUDIO ENGINE
        const aCtx = new (window.AudioContext
