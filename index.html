<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>Perfect Sample BR — SUPREME ARENA v26</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --gold: #D4A24C; --orange: #ff5500; --bg: #000;
            --mpc-metal: #1a1a1a; --screen-green: #0d1b10;
        }

        /* 🕹️ MOTOR PIXEL ART HD */
        * { image-rendering: pixelated; image-rendering: crisp-edges; }
        
        body { 
            background: #000; color: #fff; font-family: 'Space Grotesk', sans-serif;
            margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh;
            background-image: radial-gradient(circle, #1a1a1a 0%, #000 100%);
        }

        /* CHASSI MPC X SUPREME */
        .mpc-chassi {
            width: 1200px; height: 780px;
            background: #111;
            background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            border: 6px solid #333; border-radius: 40px;
            padding: 30px; position: relative;
            box-shadow: 0 50px 100px #000, inset 4px 4px 0 #444, inset -4px -4px 0 #000;
        }

        /* TELA LCD GLOW */
        .lcd-screen {
            background: var(--screen-green); border: 10px solid #000;
            border-radius: 15px; position: relative; overflow: hidden;
            box-shadow: inset 0 0 60px #000, 0 0 20px rgba(0, 255, 102, 0.1);
        }
        .scanlines {
            position: absolute; inset: 0; pointer-events: none;
            background: repeating-linear-gradient(rgba(0,0,0,0.1) 0 1px, transparent 1px 3px);
            z-index: 10;
        }

        /* GUARDA-ROUPA PIXEL HABBO */
        .wardrobe-box {
            background: #f0f0f0; border: 3px solid #000;
            box-shadow: 6px 6px 0 rgba(0,0,0,0.5); color: #000;
        }
        .habbo-tab {
            background: #adadad; border: 2px solid #000; padding: 10px; cursor: pointer;
            border-bottom: 0; margin-right: 2px; font-size: 18px;
        }
        .habbo-tab.active { background: #f0f0f0; border-color: #000; padding-top: 14px; margin-top: -4px; }

        .item-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px;
            height: 380px; overflow-y: auto; padding: 10px; background: #fff; border: 2px solid #000;
        }
        .item-slot {
            background: #e3e3e1; border: 2px solid #ccc; aspect-ratio: 1;
            display: flex; items: center; justify: center; cursor: pointer;
        }
        .item-slot:hover { border-color: #000; background: #fff; }

        /* BONECO 9:16 ISOMETRICO */
        .pedestal {
            width: 280px; height: 440px; background: rgba(0,0,0,0.4);
            border: 2px solid rgba(255,255,255,0.1); border-radius: 15px;
            position: relative; display: flex; align-items: center; justify-content: center;
        }
        .avatar-layer { position: absolute; width: 240px; height: 380px; background-size: contain; background-repeat: no-repeat; bottom: 30px; }

        /* PADS INTERATIVOS COM LED */
        .pad {
            background: linear-gradient(180deg, #2a2a2a 0%, #111 100%);
            border: 2px solid #333; border-bottom: 8px solid #000; border-radius: 10px;
            cursor: pointer; transition: 0.1s; display: flex; items-center; justify-content: center;
            font-family: 'Press Start 2P'; font-size: 7px; color: #555;
        }
        .pad.active { color: #fff; border-color: var(--orange); box-shadow: 0 0 15px var(--orange); }
        .pad:active { transform: translateY(4px); border-bottom-width: 2px; }

        .screw { width: 12px; height: 12px; background: #444; border-radius: 50%; position: absolute; border: 1px solid #000; box-shadow: inset 1px 1px 1px #888; }
    </style>
</head>
<body>

    <div class="mpc-chassi">
        <!-- Detalhes de Hardware -->
        <div class="screw top-6 left-6"></div><div class="screw top-6 right-6"></div>
        <div class="screw bottom-6 left-6"></div><div class="screw bottom-6 right-6"></div>
        <div style="position:absolute; left:-20px; top:100px; bottom:100px; width:20px; background:#8b0000; border-radius:10px 0 0 10px; border:4px solid #000;"></div>

        <!-- TELA LCD - O LABORATÓRIO DE CRIAÇÃO -->
        <div class="grid grid-cols-12 gap-6">
            <div class="col-span-12">
                <div class="lcd-screen h-[500px] p-8 flex gap-8">
                    <div class="scanlines"></div>
                    
                    <!-- LADO ESQUERDO: BONECO -->
                    <div class="w-1/3 flex flex-col items-center justify-center relative z-20">
                        <div class="pedestal">
                            <div id="l-body" class="avatar-layer"></div>
                            <div id="l-bottoms" class="avatar-layer"></div>
                            <div id="l-tops" class="avatar-layer"></div>
                            <div id="l-hair" class="avatar-layer"></div>
                            <div id="l-acc" class="avatar-layer"></div>
                        </div>
                        <div class="flex gap-4 mt-4">
                            <button onclick="rotate(-1)" class="bg-black/60 p-2 border border-white/20 text-white">◀</button>
                            <button onclick="rotate(1)" class="bg-black/60 p-2 border border-white/20 text-white">▶</button>
                        </div>
                    </div>

                    <!-- LADO DIREITO: GUARDA-ROUPA -->
                    <div class="flex-grow wardrobe-box flex flex-col relative z-20">
                        <div class="flex" id="tabs">
                            <div class="habbo-tab active" onclick="setCat('hd')">👤</div>
                            <div class="habbo-tab" onclick="setCat('hr')">💇</div>
                            <div class="habbo-tab" onclick="setCat('ch')">👕</div>
                            <div class="habbo-tab" onclick="setCat('lg')">👖</div>
                            <div class="habbo-tab" onclick="setCat('ha')">💎</div>
                        </div>
                        <div id="item-grid" class="item-grid custom-scrollbar"></div>
                        <div class="p-4 bg-gray-200 border-t-4 border-black flex justify-between items-center">
                            <span class="text-[9px] font-bold">DNA_ID: <span id="look-id" class="text-orange-600">---</span></span>
                            <button onclick="alert('Contrato Assinado!')" class="bg-orange-600 text-white px-6 py-2 text-[10px] border-b-4 border-orange-900 font-bold hover:bg-orange-500">ASSINAR CONTRATO</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- PADS DE COMANDO (4x4) -->
        <div class="flex justify-between items-end mt-8">
            <div class="grid grid-cols-4 gap-4 w-[600px]">
                <div class="pad active aspect-square"><span>ARENA</span></div>
                <div class="pad aspect-square"><span>PASS</span></div>
                <div class="pad aspect-square"><span>ROOT</span></div>
                <div class="pad aspect-square"><span>MARKET</span></div>
                <script>
                    for(let i=0; i<12; i++) document.write('<div class="pad aspect-square"></div>');
                </script>
            </div>

            <!-- HUD LATERAL -->
            <div class="w-80 space-y-4">
                <div class="bg-black/90 p-6 border-4 border-orange-500 rounded-2xl shadow-[0_0_20px_rgba(255,85,0,0.2)]">
                    <div class="flex justify-between text-[8px] text-white mb-2">
                        <span>LEVEL 99</span>
                        <span class="text-orange-500">1.500 BC</span>
                    </div>
                    <div class="w-full h-3 bg-gray-900 rounded-full overflow-hidden border border-white/10">
                        <div class="h-full bg-orange-600 w-[92%] shadow-[0_0_10px_#ff5500]"></div>
                    </div>
                    <p class="text-[7px] text-emerald-500 mt-4 animate-pulse">SISTEMA_V26_STABLE_ONLINE</p>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        // LÓGICA DO IMAGER (Sincronizada com o Habbo)
        let figure = { hr: '115-42', hd: '180-1', ch: '215-62', lg: '270-92', sh: '300-64', ha: '0' };
        let currentCat = 'hd';
        let direction = 4;

        function updateRender() {
            const figureString = `hr-${figure.hr}.hd-${figure.hd}.ch-${figure.ch}.lg-${figure.lg}.sh-${figure.sh}.ha-${figure.ha}`;
            const baseUrl = `https://www.habbo.com.br/habbo-imaging/avatarimage?figure=${figureString}&size=l&direction=${direction}&head_direction=${direction}&gesture=sml&action=std`;
            
            document.getElementById('l-body').style.backgroundImage = `url('https://www.habbo.com.br/habbo-imaging/avatarimage?figure=hd-${figure.hd}&size=l&direction=${direction}&headonly=0')`;
            document.getElementById('l-hair').style.backgroundImage = `url('https://www.habbo.com.br/habbo-imaging/avatarimage?figure=hr-${figure.hr}&size=l&direction=${direction}')`;
            document.getElementById('l-tops').style.backgroundImage = `url('https://www.habbo.com.br/habbo-imaging/avatarimage?figure=ch-${figure.ch}&size=l&direction=${direction}')`;
            document.getElementById('l-bottoms').style.backgroundImage = `url('https://www.habbo.com.br/habbo-imaging/avatarimage?figure=lg-${figure.lg}.sh-${figure.sh}&size=l&direction=${direction}')`;
            document.getElementById('l-acc').style.backgroundImage = `url('https://www.habbo.com.br/habbo-imaging/avatarimage?figure=ha-${figure.ha}&size=l&direction=${direction}')`;
        }

        window.setCat = (c) => {
            currentCat = c;
            document.querySelectorAll('.habbo-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            renderItems();
        }

        function renderItems() {
            const grid = document.getElementById('item-grid');
            grid.innerHTML = '';
            // IDs de exemplo que funcionam na API do Habbo
            const ids = [1, 2, 5, 10, 20, 30, 45, 60, 85, 100, 115, 150, 180, 215, 500];
            ids.forEach(id => {
                const slot = document.createElement('div');
                slot.className = 'item-slot';
                slot.innerHTML = `<img src="https://www.habbo.com.br/habbo-imaging/avatarimage?figure=${currentCat}-${id}-1&headonly=1&size=m">`;
                slot.onclick = () => {
                    figure[currentCat] = id + "-1";
                    document.getElementById('look-id').innerText = id;
                    updateRender();
                };
                grid.appendChild(slot);
            });
        }

        window.rotate = (dir) => {
            direction += dir;
            if(direction > 7) direction = 0;
            if(direction < 0) direction = 7;
            updateRender();
        }

        // Início
        updateRender();
        renderItems();
    </script>
</body>
</html>
