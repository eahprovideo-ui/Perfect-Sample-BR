<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfect Sample BR — Arena v15.0 APEX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #D4A24C; --orange: #ff5500; --neon-green: #00ff66; --bg: #000; }
        
        /* FORÇA O ESTILO PIXELADO EM TUDO */
        * { image-rendering: pixelated; image-rendering: crisp-edges; font-smooth: never; }
        
        body { 
            background: #000; color: #fff; font-family: 'Press Start 2P', cursive; 
            margin: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; min-height: 100vh;
        }

        /* RESOLUÇÃO DE JOGO (16:9 ESCALONÁVEL) */
        #game-viewport {
            width: 1280px; height: 720px;
            display: none; position: relative;
            transform-origin: center;
            flex-direction: column; align-items: center; justify-content: center;
        }

        /* CHASSI MPC METAL PESADO */
        .mpc-iron-frame {
            background: #111;
            background-image: 
                linear-gradient(135deg, #222 0%, #050505 100%),
                url('https://www.transparenttextures.com/patterns/black-linen.png');
            border: 6px solid #333; border-radius: 40px; padding: 25px; position: relative;
            box-shadow: 0 40px 80px #000, inset 4px 4px 0 #444, inset -4px -4px 0 #000;
        }
        .wood-end { position: absolute; right: -25px; top: 20px; bottom: 20px; width: 25px; background: #1a0f05; border: 4px solid #000; border-radius: 0 10px 10px 0; }

        /* MONITOR CRT NEON */
        .lcd-screen-pixel {
            background: #050a05; border: 8px solid #000; position: relative; overflow: hidden;
            box-shadow: inset 0 0 40px #000, 0 0 15px rgba(0,255,102,0.1);
        }
        .scanlines { position: absolute; inset: 0; background: repeating-linear-gradient(rgba(0,0,0,0.1) 0 1px, transparent 1px 2px); pointer-events: none; z-index: 5; }

        /* BONECO 9:16 PRO (FULL BODY) */
        .avatar-pedestal {
            width: 260px; height: 420px; background: #000; border: 4px solid #222;
            position: relative; display: flex; align-items: center; justify-content: center;
            box-shadow: inset 0 0 30px #111;
        }
        .avatar-shadow { position: absolute; bottom: 20px; width: 100px; height: 10px; background: rgba(0,0,0,0.6); border-radius: 50%; filter: blur(5px); }
        .pixel-layer { position: absolute; width: 200px; height: 350px; background-size: contain; background-repeat: no-repeat; }

        /* PADS DE BORRACHA MPC */
        .mpc-pad {
            background: #252525; border: 4px solid #000; border-bottom-width: 8px;
            cursor: pointer; transition: 0.05s; display: flex; align-items: center; justify-content: center;
            font-size: 8px; color: #fff; text-shadow: 2px 2px #000;
        }
        .mpc-pad:active { transform: translateY(4px); border-bottom-width: 4px; background: var(--orange); }

        /* POP-UP PIXEL THEMED */
        .pixel-modal {
            background: #111; border: 4px solid var(--gold); padding: 30px;
            box-shadow: 10px 10px 0 #000; text-align: center;
        }

        /* STORE UI (RP STYLE) */
        #store-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 6000; display: none; align-items: center; justify-content: center; padding: 40px; }
        .store-panel { width: 1100px; height: 650px; background: #1a1a1a; border: 4px solid #333; display: grid; grid-template-columns: 280px 1fr; }
        .store-sidebar { background: #111; border-right: 4px solid #000; padding: 20px; }
        .store-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; padding: 20px; overflow-y: auto; }
        .store-card { background: #000; border: 3px solid #222; padding: 15px; text-align: center; transition: 0.2s; cursor: pointer; }
        .store-card:hover { border-color: var(--gold); transform: translateY(-5px); }

        /* LOGIN INPUTS */
        .pixel-input { background: #000; border: 4px solid #333; padding: 12px; width: 100%; color: var(--gold); outline: none; font-size: 10px; margin-bottom: 10px; }
        .pixel-input:focus { border-color: var(--gold); }
    </style>
</head>
<body>

    <!-- LOADING SCREEN VU METER -->
    <div id="loading-screen" class="fixed inset-0 bg-[#050505] z-[9999] flex flex-col items-center justify-center">
        <img src="logo.png" style="width: 400px;" class="animate-bounce">
        <div class="pixel text-gold text-[10px] mt-10" id="load-msg">SINTETIZANDO ARENA...</div>
        <div class="flex gap-2 h-6 w-96 mt-6 bg-[#111] p-1 border-2 border-[#333]" id="vu-meter"></div>
        <p class="text-gray-800 text-[7px] mt-4 tracking-[1.2em]">PSBR_INDUSTRIAL_UNIT_READY</p>
    </div>

    <!-- MAIN VIEWPORT -->
    <div id="game-viewport">
        
        <!-- LABORATÓRIO DE IDENTIDADE (REGISTRO) -->
        <div id="auth-screen" class="fixed inset-0 z-[5000] bg-[#050505] flex items-center justify-center hidden">
            <div class="mpc-iron-frame w-[1150px] grid grid-cols-12 gap-6 p-8">
                <!-- LOGIN / DADOS -->
                <div class="col-span-4 flex flex-col justify-between">
                    <div class="bg-black/40 p-6 border-4 border-black">
                        <span class="text-gold text-[8px] block mb-4 underline">ASSINATURA DO PRODUTOR</span>
                        <input type="email" id="u-email" placeholder="EMAIL" class="pixel-input">
                        <div class="relative">
                            <input type="password" id="u-pass" placeholder="CHAVE" class="pixel-input">
                            <span onclick="toggleEye()" class="absolute right-3 top-3 cursor-pointer text-[12px]">👁️</span>
                        </div>
                        <div id="reg-extra" class="hidden">
                            <input type="text" id="u-nick" placeholder="NICKNAME" class="pixel-input">
                        </div>
                        <button onclick="handleAuth()" id="btn-auth-main" class="w-full bg-[#3d9a30] border-b-8 border-black py-4 mt-6 text-[10px] font-bold">CONECTAR</button>
                    </div>
                    <button onclick="toggleRegMode()" id="btn-reg-mode" class="text-[7px] text-gray-500 hover:text-white uppercase">Novo por aqui? Criar conta</button>
                </div>

                <!-- PREVIEW AVATAR 9:16 -->
                <div class="col-span-4 flex flex-col items-center">
                    <div class="avatar-pedestal">
                        <div class="avatar-shadow"></div>
                        <img id="av-render" src="" class="pixel-layer scale-110">
                    </div>
                    <div class="flex gap-4 mt-4">
                        <button class="bg-[#222] p-4 border-4 border-black" onclick="rotate(-45)">◀</button>
                        <button class="bg-[#222] p-4 border-4 border-black" onclick="rotate(45)">▶</button>
                    </div>
                </div>

                <!-- GUARDA-ROUPA RP STYLE -->
                <div class="col-span-4 bg-black/40 border-4 border-black p-6">
                    <div class="flex justify-between border-b-4 border-black pb-2 mb-4">
                        <button onclick="setCat('hair')" class="text-[15px]">💇</button>
                        <button onclick="setCat('tops')" class="text-[15px]">👕</button>
                        <button onclick="setCat('bottoms')" class="text-[15px]">👖</button>
                        <button onclick="setCat('acc')" class="text-[15px]">💎</button>
                    </div>
                    <div id="pixel-grid" class="grid grid-cols-3 gap-2 h-80 overflow-y-auto pr-2"></div>
                    <button onclick="finishReg()" class="w-full bg-orange-600 border-b-8 border-black py-4 mt-6 text-[8px]">GRAVAR IDENTIDADE</button>
                </div>
            </div>
        </div>

        <!-- ARENA MPC (MAIN APP) -->
        <div id="app" class="mpc-iron-frame w-full h-full hidden">
            <div class="wood-end"></div>
            <!-- HUD -->
            <div class="flex justify-between items-center mb-6 bg-black/80 p-6 border-4 border-black">
                <div class="flex items-center gap-6">
                    <div class="w-20 h-20 bg-black border-4 border-[#333] overflow-hidden">
                        <img id="hud-av" src="" class="w-full h-full scale-150">
                    </div>
                    <div>
                        <h2 class="text-orange-500 text-[14px]" id="user-display">NOME</h2>
                        <span class="text-emerald-500 text-[8px]">PRODUTOR LEGENDÁRIO // #001</span>
                    </div>
                </div>
                <div class="flex gap-10">
                    <div class="text-right">
                        <span class="text-[8px] text-gray-600 block">BEAT_COINS</span>
                        <span class="text-gold text-[16px] bc-symbol">1.500</span>
                    </div>
                    <button onclick="handleLogout()" class="text-red-600 text-[8px] underline">SAIR</button>
                </div>
            </div>

            <!-- TELA LCD CENTRAL -->
            <div class="grid grid-cols-12 gap-8">
                <div class="col-span-8">
                    <div class="lcd-screen-pixel h-[460px] p-8">
                        <div class="scanlines"></div>
                        <div class="h-full flex flex-col justify-between text-emerald-500 relative z-10">
                            <div class="flex justify-between border-b border-emerald-900 pb-2 text-[9px]">
                                <span>KERNEL_STABLE_V15</span>
                                <span id="socket-status" class="animate-ping">●</span>
                            </div>
                            <div class="flex flex-col items-center">
                                <h1 class="text-white text-[12px] mb-10 text-center leading-loose tracking-widest">INICIAR BUSCA DE ARENA COMPETITIVA?</h1>
                                <button onclick="startArena()" class="bg-[#003311] border-4 border-emerald-500 px-12 py-8 text-emerald-400 text-[12px] hover:bg-emerald-500 hover:text-black transition-all">START_MATCHMAKING</button>
                            </div>
                            <p class="text-[8px] text-center opacity-40 uppercase tracking-[0.5em]">Perfect Sample BR Industrial unit</p>
                        </div>
                    </div>
                </div>

                <!-- SIDEBAR PERFIL -->
                <div class="col-span-4 bg-black/40 border-4 border-black p-6 flex flex-col items-center justify-between">
                    <div class="avatar-pedestal w-full h-64 border-gold/10">
                        <img id="side-av" src="" class="scale-75">
                        <button onclick="openWardrobe()" class="absolute bottom-3 right-3 bg-gold text-black p-2 text-[8px] font-bold border-2 border-black">VESTUÁRIO</button>
                    </div>
                    <div class="grid grid-cols-3 gap-2 w-full mt-4">
                        <button class="bg-black border-2 border-gold p-3 text-gold text-[9px]">S1</button>
                        <button class="bg-black border-2 border-gray-800 p-3 text-gray-800 text-[9px]">S2</button>
                        <button class="bg-black border-2 border-gray-800 p-3 text-gray-800 text-[9px]">S3</button>
                    </div>
                </div>
            </div>

            <!-- PADS DE COMANDO -->
            <div class="grid grid-cols-4 gap-6 mt-10">
                <div class="mpc-pad"><span>BATALHAS</span></div>
                <div class="mpc-pad"><span>BATTLE_PASS</span></div>
                <div id="admin-pad" class="mpc-pad hidden" onclick="window.location.href='admin.html'"><span class="text-red-500">PAINEL_ROOT</span></div>
                <div class="mpc-pad border-gold/40" onclick="toggleStore()"><span class="text-gold font-bold">LOJA_BC</span></div>
            </div>
        </div>
    </div>

    <!-- MARKETPLACE OVERLAY (RP STYLE) -->
    <div id="store-overlay">
        <div class="store-panel">
            <div class="store-sidebar">
                <h2 class="pixel text-[10px] text-gold mb-10">CATEGORIAS</h2>
                <div class="space-y-4">
                    <button class="w-full bg-gold text-black p-4 text-[8px] font-bold">💎 ITENS VIP</button>
                    <button class="w-full bg-[#222] text-gray-500 p-4 text-[8px]">👕 ROUPAS BT</button>
                    <button class="w-full bg-[#222] text-gray-500 p-4 text-[8px]">🎹 DRUM KITS</button>
                </div>
                <button onclick="toggleStore()" class="mt-20 w-full text-red-500 text-[8px] underline">FECHAR_LOJA</button>
            </div>
            <div class="store-grid" id="store-items">
                <!-- Itens VIP Hype aqui -->
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        let visual = { body: 1, hair: 1, tops: 1, bottoms: 1, acc: 1 };
        let currentCat = 'body';
        let isRegister = false;

        // 1. LOADING VU METER
        window.onload = () => {
            const vu = document.getElementById('vu-meter');
            for(let i=0; i<30; i++) {
                const s = document.createElement('div');
                s.className = "flex-1 bg-[#222]";
                vu.appendChild(s);
            }
            let p = 0;
            const segments = vu.children;
            const interval = setInterval(() => {
                p++;
                if(p <= segments.length) {
                    const s = segments[p-1];
                    if(p < 15) s.style.backgroundColor = "#00ff66";
                    else if(p < 25) s.style.backgroundColor = "#ffff00";
                    else s.style.backgroundColor = "#ff0000";
                }
                if(p >= segments.length + 10) {
                    clearInterval(interval);
                    document.getElementById('loading-screen').style.display = 'none';
                    checkSession();
                }
            }, 100);
        };

        // 2. PIXEL AVATAR RENDER (FULL BODY 9:16)
        function updateRender() {
            const seed = JSON.stringify(visual);
            // Dicebear 'adventurer' fornece um corpo completo pixelado se forçado no estilo
            const url = `https://api.dicebear.com/7.x/adventurer/svg?seed=${seed}&backgroundColor=transparent`;
            document.getElementById('av-render').src = url;
            document.getElementById('hud-av').src = url;
            document.getElementById('side-av').src = url;
        }

        window.setCat = (c) => { currentCat = c; renderGrid(); };

        function renderGrid() {
            const g = document.getElementById('pixel-grid'); g.innerHTML = '';
            for(let i=1; i<=30; i++) {
                const isVip = i > 25;
                const d = document.createElement('div');
                d.className = `bg-[#111] border-2 border-black p-2 cursor-pointer hover:border-gold aspect-square relative`;
                d.innerHTML = `
                    ${isVip ? '<span class="absolute top-0 right-0 text-[5px] bg-gold text-black px-1">VIP</span>' : ''}
                    <img src="https://api.dicebear.com/7.x/adventurer/svg?seed=${currentCat}${i}&backgroundColor=transparent">
                `;
                d.onclick = () => { visual[currentCat] = i; updateRender(); };
                g.appendChild(d);
            }
        }

        // 3. AUTH & STORE LOGIC
        function checkSession() {
            onAuthStateChanged(auth, (user) => {
                document.getElementById('game-viewport').style.display = 'flex';
                scaleUI();
                if (user) {
                    document.getElementById('auth-screen').classList.add('hidden');
                    document.getElementById('app').classList.remove('hidden');
                    document.getElementById('user-display').innerText = user.email.split('@')[0].toUpperCase();
                    if(user.email === 'eahprovideo1@gmail.com') document.getElementById('admin-pad').classList.remove('hidden');
                    updateRender();
                } else {
                    document.getElementById('auth-screen').classList.remove('hidden');
                    renderGrid(); updateRender();
                }
            });
        }

        window.handleAuth = async () => {
            const e = document.getElementById('u-email').value;
            const p = document.getElementById('u-pass').value;
            try {
                if(isRegister) await createUserWithEmailAndPassword(auth, e, p);
                else await signInWithEmailAndPassword(auth, e, p);
            } catch (err) { alert("ERRO_IDENTIDADE: " + err.message); }
        };

        window.toggleRegMode = () => {
            isRegister = !isRegister;
            document.getElementById('reg-extra').classList.toggle('hidden', !isRegister);
            document.getElementById('btn-auth-main').innerText = isRegister ? "ASSINAR CONTRATO" : "CONECTAR";
        };

        window.toggleStore = () => {
            const s = document.getElementById('store-overlay');
            const isVisible = s.style.display === 'flex';
            s.style.display = isVisible ? 'none' : 'flex';
            if(!isVisible) populateStore();
        };

        function populateStore() {
            const g = document.getElementById('store-items'); g.innerHTML = '';
            const mock = [
                { name: "ICE CHAIN VVS", price: "1200 BC", class: "HYPE" },
                { name: "BALACLAVA NEON", price: "600 BC", class: "CRIME" },
                { name: "BOOMBOX GOLD", price: "2500 BC", class: "LEGEND" }
            ];
            mock.forEach(item => {
                g.innerHTML += `
                    <div class="store-card">
                        <span class="text-[6px] text-gray-500 pixel">${item.class}</span>
                        <div class="w-full h-32 bg-black my-4 border-2 border-white/5 shadow-inner"></div>
                        <h3 class="text-[8px] mb-2 font-bold">${item.name}</h3>
                        <button class="w-full bg-gold text-black py-2 text-[8px] font-black">${item.price}</button>
                    </div>
                `;
            });
        }

        function scaleUI() {
            const v = document.getElementById('game-viewport');
            const s = Math.min(window.innerWidth / 1300, window.innerHeight / 750);
            v.style.transform = `scale(${s})`;
        }
        window.addEventListener('resize', scaleUI);
        window.handleLogout = () => { signOut(auth).then(() => location.reload()); };
        window.toggleEye = () => { const p = document.getElementById('u-pass'); p.type = p.type === 'password' ? 'text' : 'password'; };
    </script>
</body>
</html>
