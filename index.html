<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfect Sample BR — Arena MPC v4.7</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #D4A24C; --orange: #ff5500; --bg: #0d0d0d; --screen: #0d1b10; }
        body { background: #111; background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://www.transparenttextures.com/patterns/brushed-alum.png'); color: #eee; font-family: 'Space Grotesk', sans-serif; overflow: hidden; }
        .pixel { font-family: 'Press Start 2P', cursive; }
        .mpc-chassi { background: linear-gradient(135deg, #2a2a2a 0%, #151515 100%); background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png'); border: 10px solid #222; border-radius: 60px; padding: 40px; position: relative; border-right: 30px solid #1a0f05; box-shadow: 0 60px 120px rgba(0,0,0,0.9); }
        .lcd-display { background: var(--screen); border: 12px solid #050505; border-radius: 25px; position: relative; overflow: hidden; box-shadow: inset 0 0 80px #000; }
        .lcd-display::after { content: " "; display: absolute; inset: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.05)); z-index: 10; pointer-events: none; background-size: 100% 3px, 3px 100%; }
        #auth-overlay { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; flex-direction: column; transition: transform 0.6s cubic-bezier(0.87, 0, 0.13, 1); }
        .boot-hidden { transform: translateY(-100%); }
        .login-card { background: rgba(10, 10, 10, 0.95); border: 2px solid var(--gold); padding: 50px; border-radius: 40px; width: 420px; text-align: center; }
        .mpc-pad { background: #333; border-bottom: 6px solid #000; border-radius: 15px; height: 100px; cursor: pointer; transition: 0.1s; display: flex; align-items: center; justify-content: center; }
        .mpc-pad:active { transform: translateY(4px); border-bottom-width: 1px; background: var(--orange); }
        .avatar-viewport { width: 160px; height: 160px; background: #000; border-radius: 20px; position: relative; overflow: hidden; border: 2px solid #333; }
        .avatar-layer { position: absolute; inset: 0; width: 100%; height: 100%; background-size: contain; background-repeat: no-repeat; image-rendering: pixelated; }
        #particle-canvas { position: fixed; inset: 0; z-index: -1; opacity: 0.3; }
        .eye-icon { position: absolute; right: 15px; top: 15px; cursor: pointer; color: #555; font-size: 18px; user-select: none; }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <!-- TELA DE LOGIN -->
    <div id="auth-overlay">
        <div class="login-card">
            <h2 class="pixel text-gold text-[9px] mb-10 tracking-widest uppercase">Booting_Kernel_v4.7</h2>
            
            <input type="email" id="email" placeholder="EMAIL_PRODUTOR" class="w-full bg-black border border-white/10 p-4 rounded-xl mb-4 text-xs outline-none focus:border-gold text-white">
            
            <div class="relative w-full">
                <input type="password" id="pass" placeholder="SENHA_ACESSO" class="w-full bg-black border border-white/10 p-4 rounded-xl mb-8 text-xs outline-none focus:border-gold text-white">
                <div id="toggle-eye" class="eye-icon">👁️</div>
            </div>

            <button id="btn-login" class="w-full bg-orange-600 text-white py-4 rounded-2xl font-bold text-xs mb-4 shadow-lg shadow-orange-900/40 hover:bg-orange-500 transition-all">CONECTAR AO KERNEL</button>
            <button id="btn-register" class="text-gray-600 text-[9px] pixel hover:text-white transition-colors">GERAR_NOVA_IDENTIDADE</button>
        </div>
    </div>

    <!-- SITE PRINCIPAL (MPC) -->
    <div id="app" class="hidden mpc-chassi w-full max-w-6xl shadow-2xl relative mx-auto my-10">
        <div class="flex justify-between items-center mb-10 bg-black/50 p-6 rounded-[35px] border border-white/5">
            <div class="flex items-center gap-5">
                <div class="w-14 h-14 bg-black border-2 border-orange-500/30 rounded-2xl flex items-center justify-center">
                    <span class="pixel text-gold text-lg" id="user-initial">?</span>
                </div>
                <div>
                    <h2 class="pixel text-[10px] text-orange-500" id="user-display">---</h2>
                    <span class="text-[9px] text-gray-500 uppercase font-bold tracking-widest">Patente: Legend Producer</span>
                </div>
            </div>
            <div class="flex gap-4 font-mono text-[10px]">
                <div class="text-right"><span class="block text-gray-600 uppercase">Coins</span><span class="text-gold font-bold text-lg">1.500 BC</span></div>
                <div class="text-right border-l border-white/5 pl-6"><span class="block text-gray-600 uppercase">Arena</span><span class="text-green-500 font-bold" id="socket-status">CONNECTING...</span></div>
            </div>
        </div>

        <div class="grid grid-cols-12 gap-10">
            <div class="col-span-8">
                <div class="lcd-display h-[450px] p-10 font-mono text-emerald-500">
                    <div id="screen-arena" class="h-full flex flex-col justify-between">
                        <div class="flex justify-between border-b border-emerald-950 pb-3 uppercase text-[10px]">
                            <span class="pixel text-[8px] text-gold">System_Ready</span>
                            <span id="queue-status">FILA: 0/10</span>
                        </div>
                        <div class="flex-grow flex flex-col items-center justify-center">
                            <h2 class="pixel text-[10px] mb-8 text-white">READY FOR THE NEXT BATTLE?</h2>
                            <button id="btn-start-arena" class="px-8 py-4 bg-emerald-900/20 border-2 border-emerald-500 rounded-2xl pixel text-[9px] hover:bg-emerald-500 hover:text-black">START_TRAP_ARENA</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-span-4 bg-black/60 rounded-[45px] p-6 border border-white/5 flex flex-col items-center">
                <span class="pixel text-[7px] text-gold mb-4 uppercase">Identity_Preview</span>
                <div class="avatar-viewport">
                    <div id="av-skin" class="avatar-layer" style="background-image: url('https://api.dicebear.com/7.x/pixel-art/svg?seed=body&skinColor=d09a6a')"></div>
                    <div id="av-hair" class="avatar-layer"></div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-4 gap-6 mt-12">
            <div class="mpc-pad" onclick="location.reload()"><span class="pixel text-[10px] text-white">ARENA</span></div>
            <div class="mpc-pad"><span class="pixel text-[10px] text-white">PASS</span></div>
            <div class="mpc-pad" onclick="window.location.href='admin.html'"><span class="pixel text-[10px] text-red-600">ADMIN</span></div>
            <div class="mpc-pad border-gold/30"><span class="pixel text-[10px] text-gold">LOJA</span></div>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // 1. AUDIO ENGINE FIXED (CORREÇÃO DO ERRO DO CONSOLE)
        const aCtx = new (window.AudioContext || window.webkitAudioContext)();
        window.playSound = (type) => {
            if (aCtx.state === 'suspended') aCtx.resume();
            const osc = aCtx.createOscillator();
            const g = aCtx.createGain();
            osc.connect(g); g.connect(aCtx.destination);
            
            osc.start(); // Inicia primeiro
            if(type === 'boot') {
                osc.frequency.setValueAtTime(100, aCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(800, aCtx.currentTime + 0.8);
                osc.stop(aCtx.currentTime + 0.8);
            } else if(type === 'click') {
                osc.frequency.setValueAtTime(400, aCtx.currentTime);
                osc.stop(aCtx.currentTime + 0.1);
            } else if(type === 'error') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(60, aCtx.currentTime);
                osc.stop(aCtx.currentTime + 0.3);
            }
        };

        // 2. CONEXÃO RENDER
        const socket = io("https://perfect-sample-br.onrender.com");
        socket.on('connect', () => {
            const st = document.getElementById('socket-status');
            if(st) { st.innerText = "LIVE_SERVER"; st.className = "text-green-500 font-bold"; }
        });
        socket.on('queue_update', (data) => {
            document.getElementById('queue-status').innerText = `FILA: ${data.count}/10`;
        });

        // 3. TOGGLE EYE (FIXED)
        const eye = document.getElementById('toggle-eye');
        const pass = document.getElementById('pass');
        eye.addEventListener('click', () => {
            const isPass = pass.type === 'password';
            pass.type = isPass ? 'text' : 'password';
            eye.innerText = isPass ? '🔒' : '👁️';
        });

        // 4. AUTH LOGIC (LOGIN / REGISTER)
        async function handleAuth(type) {
            const email = document.getElementById('email').value;
            const password = document.getElementById('pass').value;

            if(!email || !password) {
                alert("Preencha e-mail e senha!");
                return;
            }

            try {
                let userCred;
                if(type === 'login') {
                    userCred = await signInWithEmailAndPassword(auth, email, password);
                } else {
                    userCred = await createUserWithEmailAndPassword(auth, email, password);
                }

                window.playSound('boot');
                document.getElementById('auth-overlay').classList.add('boot-hidden');
                setTimeout(() => {
                    document.getElementById('auth-overlay').style.display = 'none';
                    document.getElementById('app').classList.remove('hidden');
                    document.getElementById('user-display').innerText = userCred.user.email.split('@')[0].toUpperCase();
                    document.getElementById('user-initial').innerText = userCred.user.email[0].toUpperCase();
                }, 700);

            } catch (err) {
                window.playSound('error');
                console.error("Erro Firebase:", err.code);
                if(err.code === 'auth/invalid-credential') alert("E-mail ou Senha incorretos!");
                else if(err.code === 'auth/email-already-in-use') alert("E-mail já cadastrado!");
                else alert("Erro: " + err.message);
            }
        }

        document.getElementById('btn-login').addEventListener('click', () => handleAuth('login'));
        document.getElementById('btn-register').addEventListener('click', () => handleAuth('register'));
        
        document.getElementById('btn-start-arena').addEventListener('click', () => {
            socket.emit('join_ranked_queue', { genre: 'TRAP', username: document.getElementById('user-display').innerText });
        });

        // 5. PARTICLES
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let particles = [];
        for(let i=0; i<40; i++) particles.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: Math.random()*2, speed: Math.random()*0.4});
        function animate() {
            ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle = '#ff5500';
            particles.forEach(p => {
                p.y -= p.speed; if(p.y < 0) p.y = canvas.height;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
