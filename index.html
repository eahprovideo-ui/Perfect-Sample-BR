<!-- MANTENHA O TOPO DO HTML, SUBSTITUA O BODY -->
<body>
    <div id="game-viewport" class="scale-90">
        <div class="mpc-chassi">
            
            <!-- TELA LCD - DESIGN BY HABBO NEWS -->
            <div class="lcd-screen">
                <div class="flex flex-col items-center w-1/3 p-4 bg-black/40 rounded-xl">
                    <img id="avatar-preview" src="" style="width: 220px;">
                    <div class="mt-4 bg-black/60 p-2 rounded border border-orange-500/50">
                        <span class="text-[7px] text-orange-500 pixel">DNA_SEQUENCE_OK</span>
                    </div>
                </div>

                <div class="wardrobe-container">
                    <div class="habbo-tabs">
                        <div class="tab active" onclick="changeTab(this, 'hr')">💇</div>
                        <div class="tab" onclick="changeTab(this, 'ch')">👕</div>
                        <div class="tab" onclick="changeTab(this, 'lg')">👖</div>
                        <div class="tab" onclick="changeTab(this, 'acc')">💎</div>
                    </div>
                    <div id="wardrobe-grid" class="item-grid"></div>
                    <div class="p-3 bg-black border-t-2 border-orange-500 flex justify-between items-center">
                        <span class="text-[7px] text-gray-500">CONTRATO_V25</span>
                        <button onclick="saveContract()" class="bg-orange-600 text-white px-6 py-2 text-[9px] border-b-4 border-orange-900 font-bold">ASSINAR CONTRATO</button>
                    </div>
                </div>
            </div>

            <!-- PAINEL DE CONTROLE -->
            <div class="flex justify-between mt-10">
                <div class="pads-grid">
                    <div class="pad active"><span>ARENA</span></div>
                    <div class="pad"><span>SHOP</span></div>
                    <div class="pad"><span>PASS</span></div>
                    <div class="pad pad-matte"></div>
                    <!-- Outros pads pretos foscos -->
                    <script>
                        for(let i=0; i<12; i++) document.write('<div class="pad pad-matte"></div>');
                    </script>
                </div>

                <!-- HUD DE PROGRESSÃO -->
                <div class="w-72 hud-side-panel">
                    <div class="rank-badge">RANK: BRONZE I</div>
                    <img id="avatar-preview-hud" src="" class="w-32 mx-auto mb-4 scale-125">
                    <div class="space-y-3">
                        <div class="flex justify-between text-[7px] text-white">
                            <span>LEVEL 01</span>
                            <span class="text-orange-500">850 / 1000 XP</span>
                        </div>
                        <div class="w-full h-3 bg-black border border-white/10 rounded-full overflow-hidden">
                            <div class="h-full bg-orange-600 w-[85%] shadow-[0_0_10px_#ff5500]"></div>
                        </div>
                        <div class="flex justify-between mt-4">
                            <div class="text-center">
                                <span class="block text-[6px] text-gray-500">TOKENS</span>
                                <span class="text-white text-[10px]">🪙 500</span>
                            </div>
                            <div class="text-center">
                                <span class="block text-[6px] text-gray-500">COINS</span>
                                <span class="text-gold text-[10px]">💎 150</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { updateAvatar, setPart, catalog, vipItems } from './pixel-engine.js';

        window.changeTab = (el, cat) => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            renderGrid(cat);
        };

        function renderGrid(cat) {
            const grid = document.getElementById('wardrobe-grid');
            grid.innerHTML = '';
            catalog[cat].forEach(id => {
                const isVip = vipItems.includes(id);
                const slot = document.createElement('div');
                slot.className = `item-slot ${isVip ? 'is-vip' : ''}`;
                slot.innerHTML = `<img src="https://www.habbo.com.br/habbo-imaging/avatarimage?figure=${cat}-${id}&headonly=1&size=m" ${isVip ? 'style="filter: grayscale(1) opacity(0.5)"' : ''}>`;
                
                slot.onclick = () => {
                    if(isVip) return alert("ITEM BLOQUEADO: Requer Conta VIP!");
                    setPart(cat, id);
                };
                grid.appendChild(slot);
            });
        }

        updateAvatar();
        renderGrid('hr');
    </script>
</body>
