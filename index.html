<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfect Sample BR — Arena v7.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #D4A24C; --orange: #ff5500; --neon-green: #00ff66; --bg: #080808; }
        body { background: var(--bg); color: #f5f5f5; font-family: 'Space Grotesk', sans-serif; margin: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .pixel { font-family: 'Press Start 2P', cursive; }
        #main-wrapper { transform-origin: center; display: flex; align-items: center; justify-content: center; }

        /* TEXTURA METALIZADA MPC */
        .mpc-chassi {
            background: linear-gradient(145deg, #2a2a2a 0%, #111 100%);
            border: 10px solid #222; border-radius: 60px; padding: 40px; position: relative;
            box-shadow: 0 50px 100px #000, inset 0 2px 5px rgba(255,255,255,0.1);
            border-right: 30px solid #1a0f05;
        }

        /* DISPLAY LCD */
        .lcd-display {
            background: #050a05; border: 12px solid #050505; border-radius: 25px;
            position: relative; overflow: hidden; box-shadow: inset 0 0 60px #000;
        }

        /* PAD ESTILIZADO */
        .mpc-pad {
            background: #2a2a2a; border-bottom: 8px solid #000; border-radius: 15px;
            height: 95px; cursor: pointer; transition: 0.1s;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .mpc-pad:active { transform: translateY(4px); border-bottom-width: 2px; background: var(--orange); }

        /* WARDROBE UI */
        .wardrobe-selector { background: rgba(0,0,0,0.4); border: 1px solid #333; padding: 10px; border-radius: 15px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .arrow-btn { background: #222; color: var(--gold); width: 30px; height: 30px; border-radius: 5px; cursor: pointer; display: flex; items-center; justify-content: center; font-weight: bold; }
        .arrow-btn:hover { background: var(--gold); color: #000; }

        .auth-overlay { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: #111; border: 2px solid #333; padding: 40px; border-radius: 50px; width: 500px; text-align: center; }
        
        .neon-input { background: #000; border: 1px solid #333; padding: 15px; border-radius: 15px; width: 100%; color: #fff; outline: none; margin-bottom: 15px; }
        .rarity-tag { font-size: 8px; padding: 2px 6px; border-radius: 4px; margin-top: 5px; text-transform: uppercase; }
        .tag-common { background: #555; color: #eee; }
        .tag-vip { background: var(--gold); color: #000; font-weight: bold; }
        .tag-legend { background: linear-gradient(90deg, #ff0000, #ff5500); color: #fff; animation: pulse 1s infinite; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="auth-overlay" class="auth-overlay">
        <!-- LOGIN -->
        <div id="step-login" class="auth-card">
            <h2 class="pixel text-orange-500 text-[10px] mb-10 tracking-widest">PERFECT SAMPLE BR</h2>
            <input type="email" id="login-email" placeholder="EMAIL_PRODUTOR" class="neon-input">
            <input type="password" id="login-pass" placeholder="SENHA_ACESSO" class="neon-input">
            <button onclick="handleLogin()" class="w-full bg-orange-600 text-white py-4 rounded-2xl font-bold mb-4 shadow-lg">CONECTAR</button>
            <button onclick="showStep('register')" class="text-gold text-[9px] pixel uppercase">Cadastre-se</button>
        </div>

        <!-- CADASTRO -->
        <div id="step-register" class="auth-card hidden">
            <h2 class="pixel text-gold text-[10px] mb-10">NOVO_CADASTRO</h2>
            <input type="email" id="reg-email" placeholder="E-MAIL" class="neon-input">
            <input type="password" id="reg-pass" placeholder="SENHA (MÍN 6)" class="neon-input">
            <input type="password" id="reg-pass-confirm" placeholder="CONFIRME A SENHA" class="neon-input">
            <button onclick="handleRegister()" class="w-full bg-gold text-black py-4 rounded-2xl font-bold mb-4">PRÓXIMO: ARMARIO</button>
            <button onclick="showStep('login')" class="text-gray-500 text-[9px] pixel uppercase">Voltar</button>
        </div>

        <!-- GUARDA-ROUPA INICIAL -->
        <div id="step-avatar" class="auth-card hidden w-[700px]">
            <h2 class="pixel text-gold text-[10px] mb-8">GUARDA-ROUPAS DIGITAL</h2>
            <div class="flex gap-8">
                <div class="bg-black p-4 rounded-[40px] border-4 border-white/5">
                    <img id="avatar-preview" src="" class="w-56 h-56 scale-125">
                </div>
                <div class="flex-grow space-y-3">
                    <!-- Seletores via Cliques -->
                    <div class="wardrobe-selector">
                        <span class="text-[10px] pixel text-gray-500">CABELO</span>
                        <div class="flex gap-2">
                            <button onclick="cycleItem('hair', -1)" class="arrow-btn"><</button>
                            <span id="label-hair" class="text-xs font-mono w-20">Item 1</span>
                            <button onclick="cycleItem('hair', 1)" class="arrow-btn">></button>
                        </div>
                    </div>
                    <div class="wardrobe-selector">
                        <span class="text-[10px] pixel text-gray-500">ROUPA</span>
                        <div class="flex gap-2">
                            <button onclick="cycleItem('clothing', -1)" class="arrow-btn"><</button>
                            <span id="label-clothing" class="text-xs font-mono w-20">Item 1</span>
                            <button onclick="cycleItem('clothing', 1)" class="arrow-btn">></button>
                        </div>
                    </div>
                    <div class="wardrobe-selector">
                        <span class="text-[10px] pixel text-gray-500">ACESSÓRIO</span>
                        <div class="flex gap-2">
                            <button onclick="cycleItem('accessory', -1)" class="arrow-btn"><</button>
                            <span id="label-accessory" class="text-xs font-mono w-20">Item 1</span>
                            <button onclick="cycleItem('accessory', 1)" class="arrow-btn">></button>
                        </div>
                    </div>
                    <div id="item-rarity" class="rarity-tag tag-common">Comum</div>
                    <button onclick="finishRegistration()" class="w-full bg-emerald-600 text-white py-4 rounded-2xl pixel text-[9px] mt-4 shadow-lg shadow-emerald-900/20">FINALIZAR E ENTRAR</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ARENA MPC HARDWARE -->
    <div id="main-wrapper">
        <div id="app" class="hidden mpc-chassi w-full max-w-6xl relative">
            <div class="flex justify-between items-center mb-8 bg-black/60 p-6 rounded-[40px] border border-white/5 shadow-2xl">
                <div class="flex items-center gap-6">
                    <div class="w-20 h-20 bg-black border-2 border-orange-500/20 rounded-full flex items-center justify-center overflow-hidden">
                        <img id="user-avatar-hud" src="" class="w-full h-full scale-125">
                    </div>
                    <div>
                        <h2 class="pixel text-[14px] text-orange-500" id="user-display">---</h2>
                        <span class="text-[10px] text-emerald-500 font-bold tracking-widest animate-pulse">STATUS: ONLINE</span>
                    </div>
                </div>
                <div class="text-right">
                    <span class="block text-gray-600 uppercase text-[9px]">Beat_Coins</span>
                    <span class="text-gold font-bold text-xl" id="coin-balance">1.500 BC</span>
                </div>
            </div>

            <div class="grid grid-cols-12 gap-10">
                <div class="col-span-8">
                    <div class="lcd-display h-[480px] p-10">
                        <div id="screen-content" class="h-full flex flex-col justify-between text-emerald-500 font-mono">
                            <div class="flex justify-between border-b border-emerald-900 pb-3 uppercase text-[10px]">
                                <span>Master_Kernel_v7.0</span>
                                <span id="socket-status" class="text-red-500">CONNECTING...</span>
                            </div>
                            <div class="flex flex-col items-center justify-center flex-grow">
                                <h2 class="pixel text-[12px] text-white mb-10 tracking-widest leading-loose text-center">QUAL ARENA VOCÊ VAI<br>DOMINAR HOJE?</h2>
                                <button onclick="startMatchmaking()" class="px-12 py-6 bg-emerald-950/30 border-2 border-emerald-400 rounded-3xl pixel text-[10px] hover:bg-emerald-400 hover:text-black transition-all shadow-[0_0_30px_rgba(0,255,102,0.2)]">START_MATCHMAKING</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-span-4 bg-black/40 rounded-[50px] border border-white/5 p-8 flex flex-col items-center justify-between">
                    <div class="avatar-box w-full h-64 bg-black rounded-3xl border-2 border-gold/10 overflow-hidden relative">
                        <img id="user-avatar-side" src="" class="w-full h-full scale-125">
                        <button onclick="showStep('avatar')" class="absolute bottom-2 right-2 bg-gold/80 p-2 rounded-full text-black text-xs" title="Editar Visual">👕</button>
                    </div>
                    <div class="w-full space-y-2 mt-4">
                        <span class="pixel text-[8px] text-gold uppercase block text-center">Outfit Slots</span>
                        <div class="grid grid-cols-3 gap-2">
                            <button class="bg-white/5 p-1 rounded text-[7px] pixel hover:bg-gold/20">S1</button>
                            <button class="bg-white/5 p-1 rounded text-[7px] pixel hover:bg-gold/20">S2</button>
                            <button class="bg-white/5 p-1 rounded text-[7px] pixel hover:bg-gold/20">S3</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-4 gap-8 mt-14">
                <div class="mpc-pad"><span class="pixel text-[10px] text-white">ARENA</span></div>
                <div class="mpc-pad"><span class="pixel text-[10px] text-white">PASS</span></div>
                <!-- ADMIN PAD: SOMENTE MESTRE -->
                <div id="admin-pad" class="mpc-pad hidden" onclick="window.location.href='admin.html'"><span class="pixel text-[10px] text-red-500">ADMIN</span></div>
                <div class="mpc-pad border-gold/40" onclick="alert('Mercado Aberto!')"><span class="pixel text-[10px] text-gold">MARKET</span></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // MASTER MAIL
        const MASTER = "eahprovideo1@gmail.com";

        // CONFIGURAÇÕES DO GUARDA-ROUPA
        let outfit = { hair: 1, clothing: 1, accessory: 1 };
        const itemsCount = 50;

        window.cycleItem = (category, direction) => {
            outfit[category] += direction;
            if(outfit[category] > itemsCount) outfit[category] = 1;
            if(outfit[category] < 1) outfit[category] = itemsCount;
            updateAvatarUI();
        };

        window.updateAvatarUI = () => {
            const seed = `h${outfit.hair}c${outfit.clothing}a${outfit.accessory}`;
            const url = `https://api.dicebear.com/7.x/adventurer/svg?seed=${seed}&backgroundColor=transparent`;
            document.getElementById('avatar-preview').src = url;
            document.getElementById('label-hair').innerText = "Style " + outfit.hair;
            document.getElementById('label-clothing').innerText = "Style " + outfit.clothing;
            document.getElementById('label-accessory').innerText = "Style " + outfit.accessory;
            
            // Lógica de Raridade Simbolica
            const rarity = document.getElementById('item-rarity');
            if(outfit.hair > 40) { rarity.innerText = "LENDÁRIO"; rarity.className = "rarity-tag tag-legend"; }
            else if(outfit.hair > 25) { rarity.innerText = "VIP ITEM"; rarity.className = "rarity-tag tag-vip"; }
            else { rarity.innerText = "Comum"; rarity.className = "rarity-tag tag-common"; }
        };

        // AUTH
        window.handleLogin = async () => {
            try {
                const cred = await signInWithEmailAndPassword(auth, document.getElementById('login-email').value, document.getElementById('login-pass').value);
                enterApp(cred.user);
            } catch (e) { alert("Credenciais Incorretas."); }
        };

        window.handleRegister = () => {
            const p = document.getElementById('reg-pass').value;
            if(p !== document.getElementById('reg-pass-confirm').value) return alert("As senhas não conferem!");
            showStep('avatar');
            updateAvatarUI();
        };

        window.finishRegistration = async () => {
            try {
                const cred = await createUserWithEmailAndPassword(auth, document.getElementById('reg-email').value, document.getElementById('reg-pass').value);
                enterApp(cred.user);
            } catch (e) { alert("Erro ao criar conta."); }
        };

        function enterApp(user) {
            document.getElementById('auth-overlay').style.display = 'none';
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('user-display').innerText = user.email.split('@')[0].toUpperCase();
            
            const seed = `h${outfit.hair}c${outfit.clothing}a${outfit.accessory}`;
            const url = `https://api.dicebear.com/7.x/adventurer/svg?seed=${seed}`;
            document.getElementById('user-avatar-hud').src = url;
            document.getElementById('user-avatar-side').src = url;

            // MOSTRAR ADMIN SE FOR O MESTRE
            if(user.email === MASTER) {
                document.getElementById('admin-pad').classList.remove('hidden');
            }
        }

        window.showStep = (s) => {
            document.querySelectorAll('.auth-card').forEach(c => c.classList.add('hidden'));
            document.getElementById('step-' + s).classList.remove('hidden');
        };

        // SOCKET
        const socket = io("https://perfect-sample-br.onrender.com");
        socket.on('connect', () => {
            document.getElementById('socket-status').innerText = "LIVE_SERVER";
            document.getElementById('socket-status').className = "text-emerald-500 font-bold";
        });
    </script>
</body>
</html>
