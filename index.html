<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>Perfect Sample BR — SUPREME ARENA v28.4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Grotesk:wght@700&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #D4A24C; --orange: #ff5500; --bg: #000; --screen-green: #0d1b10; }
        * { image-rendering: pixelated; font-smooth: never; -webkit-font-smoothing: none; }
        
        body { 
            background: #111; 
            background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png'), radial-gradient(circle at center, #222 0%, #000 100%);
            color: #fff; font-family: 'Space Grotesk', sans-serif;
            margin: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; min-height: 100vh;
        }

        /* 🛡️ ENGINE DE ESCALA BLINDADA */
        #master-viewport {
            width: 1280px; height: 800px;
            position: relative; transform-origin: center;
            display: none; 
        }

        .mpc-frame {
            background: #151515;
            border: 6px solid #333; border-radius: 50px;
            padding: 30px; position: relative; width: 1200px; height: 760px;
            box-shadow: 0 50px 150px #000, inset 4px 4px 0 #444;
        }
        .wood-side { position: absolute; right: -30px; top: 15px; bottom: 15px; width: 30px; background: #1a0f05; border: 4px solid #000; border-radius: 0 10px 10px 0; }

        /* 🟠 PAINEL LED RESTAURADO */
        .led-panel {
            background: #1a0a00; border-bottom: 3px solid #000;
            height: 35px; overflow: hidden; position: relative; display: flex; align-items: center;
        }
        .marquee {
            white-space: nowrap; position: absolute;
            animation: marquee-scroll 8s linear infinite;
            font-family: 'Press Start 2P'; font-size: 9px;
            color: var(--orange); text-shadow: 0 0 10px var(--orange);
        }
        @keyframes marquee-scroll { 0% { left: 100%; } 100% { left: -100%; } }

        /* 📦 GUARDA-ROUPA COMPACTO V2 */
        .compact-habbo-ui {
            background: #e1e1e1; border: 3px solid #000; width: 100%; height: 100%;
            display: flex; flex-direction: column;
        }
        .wardrobe-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px;
            padding: 8px; overflow-y: auto; background: #fff; border: 2px solid #000;
            height: 280px;
        }
        .item-slot {
            background: #f0f0f0; border: 1px solid #999; aspect-ratio: 1;
            cursor: pointer; display: flex; items: center; justify-content: center;
        }
        .item-slot:hover { border-color: #000; background: var(--gold); }

        /* ÍCONES CATEGORIA V2 */
        .cat-tab { background: #adadad; border: 2px solid #000; padding: 6px; cursor: pointer; border-bottom: 0; flex: 1; text-align: center; font-size: 14px; }
        .cat-tab.active { background: #e1e1e1; border-color: #000; padding-top: 10px; margin-top: -4px; }

        /* AVATAR DISPLAY */
        .avatar-box {
            width: 260px; height: 380px; background: rgba(0,0,0,0.4);
            border: 2px solid rgba(255,255,255,0.1); border-radius: 15px;
            position: relative; display: flex; align-items: center; justify-content: center;
        }
        .layer { position: absolute; width: 220px; height: 350px; background-size: contain; background-repeat: no-repeat; bottom: 20px; }

        /* PADS (OCULTOS NO LOGIN) */
        .mpc-pad {
            background: linear-gradient(180deg, #2a2a2a 0%, #111 100%);
            border: 3px solid #333; border-bottom: 10px solid #000; border-radius: 12px;
            cursor: pointer; display: flex; items-center; justify-content: center;
            font-family: 'Press Start 2P'; font-size: 7px; color: #444;
        }
        .mpc-pad.active { color: #fff; border-color: var(--orange); }

        .input-matte { 
            background: #0a0a0a; border: 2px solid #333; padding: 12px; 
            width: 100%; color: var(--gold); outline: none; font-size: 10px; border-radius: 4px;
        }
    </style>
</head>
<body>

    <!-- LOADING VU METER -->
    <div id="loading-screen" class="fixed inset-0 bg-[#050505] z-[9999] flex flex-col items-center justify-center">
        <img src="logo.png" style="width: 350px;" class="animate-pulse mb-8">
        <div class="flex gap-1 h-6 w-80 bg-[#111] p-1 border-2 border-[#333]" id="vu-meter"></div>
        <p class="pixel text-gold text-[8px] mt-6">SINTETIZANDO_KERNEL_V28.4</p>
    </div>

    <div id="master-viewport">
        <div class="mpc-frame">
            <div class="wood-side"></div>

            <!-- LCD MONITOR VISOR -->
            <div class="bg-[#0d1b10] border-[12px] border-[#000] rounded-[20px] h-[480px] relative overflow-hidden shadow-inner">
                
                <!-- LOGIN / WARDROBE COMPACT MODULE -->
                <div id="auth-screen" class="absolute inset-0 z-[50] flex flex-col">
                    <div class="led-panel">
                        <div class="marquee">SEJA BEM VINDO AO PERFECT SAMPLE BR</div>
                    </div>
                    
                    <div class="flex flex-grow p-6 gap-6 bg-[#e1e1e1] text-black">
                        <!-- LOGIN BOX -->
                        <div class="w-64 flex flex-col justify-between">
                            <div class="bg-gray-300 border-2 border-gray-500 p-4 rounded">
                                <span class="text-[10px] font-black uppercase mb-4 block" style="font-family: 'Syncopate';">Contrato_Acesso</span>
                                <input type="email" id="u-email" placeholder="EMAIL" class="input-matte mb-2">
                                <input type="password" id="u-pass" placeholder="CHAVE_DNA" class="input-matte">
                                <button onclick="handleAuth()" id="btn-auth-main" class="w-full bg-[#fde047] border-b-8 border-[#7c2d12] py-3 mt-4 font-black text-[9px] uppercase">Conectar</button>
                            </div>
                            <button onclick="toggleRegMode()" id="btn-reg-mode" class="text-[9px] text-orange-600 font-bold uppercase underline">Novo Produtor?</button>
                        </div>

                        <!-- AVATAR CENTER -->
                        <div class="flex-grow flex flex-col items-center justify-center bg-[#adadad] border-4 border-white rounded shadow-inner">
                            <div class="avatar-box scale-75">
                                <div id="l-body" class="layer"></div>
                                <div id="l-bottoms" class="layer"></div>
                                <div id="l-tops" class="layer"></div>
                                <div id="l-hair" class="layer"></div>
                                <div id="l-acc" class="layer"></div>
                            </div>
                            <div class="flex gap-2 -mt-10">
                                <button class="bg-gray-400 p-2 border-2 border-black" onclick="rotate(-1)">◀</button>
                                <button class="bg-gray-400 p-2 border-2 border-black" onclick="rotate(1)">▶</button>
                            </div>
                        </div>

                        <!-- COMPACT WARDROBE V2 -->
                        <div class="w-80 flex flex-col bg-gray-200 border-2 border-gray-400">
                            <div class="flex" id="tabs">
                                <div class="cat-tab active" onclick="setCat('hd')">👤</div>
                                <div class="cat-tab" onclick="setCat('hr')">💇</div>
                                <div class="cat-tab" onclick="setCat('ch')">👕</div>
                                <div class="cat-tab" onclick="setCat('lg')">👖</div>
                                <div class="cat-tab" onclick="setCat('ha')">💎</div>
                            </div>
                            <div id="item-grid" class="wardrobe-grid"></div>
                        </div>
                    </div>
                </div>

                <!-- HOME DASHBOARD -->
                <div id="app" class="hidden absolute inset-0 z-[10] flex flex-col p-10 font-mono text-emerald-500">
                    <div class="flex justify-between border-b border-white/5 pb-2 text-[10px]">
                        <span>ARENA_KERNEL_V28.4</span>
                        <span class="text-green-500 font-bold">● ONLINE</span>
                    </div>
                    <div class="flex-grow flex flex-col items-center justify-center">
                        <h1 class="pixel text-white text-[14px] mb-8 text-center">INITIALIZE MATCHMAKING?</h1>
                        <button class="bg-[#003311] border-4 border-emerald-500 px-12 py-6 text-emerald-400 text-[10px] hover:bg-emerald-500 hover:text-black">START_ARENA</button>
                    </div>
                    <div class="flex justify-between items-center bg-black/40 p-4 rounded-xl border border-white/5">
                        <div class="flex items-center gap-4">
                            <img id="hud-av" src="" class="w-10 h-10 bg-black border border-white/10 rounded">
                            <span class="pixel text-[7px] text-orange-500" id="user-display">---</span>
                        </div>
                        <span class="text-gold font-bold text-sm">1.500 BC</span>
                    </div>
                </div>
            </div>

            <!-- PADS (CONTROLE DO HARDWARE) - OCULTOS VIA CSS NO LOGIN -->
            <div id="pads-section" class="grid grid-cols-4 gap-6 mt-10 opacity-20 pointer-events-none">
                <div class="mpc-pad active h-20"><span>ARENA</span></div>
                <div class="mpc-pad h-20"><span>PASS</span></div>
                <div class="mpc-pad h-20" onclick="window.location.href='admin.html'"><span>ROOT</span></div>
                <div class="mpc-pad h-20" onclick="handleLogout()"><span>OFF</span></div>
                <script>for(let i=0; i<12; i++) document.write('<div class="mpc-pad h-20"></div>');</script>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        let figure = { hr: '115-42', hd: '180-1', ch: '215-62', lg: '270-92', sh: '300-64', ha: '0' };
        let currentCat = 'hd';
        let direction = 4;
        let isRegister = false;

        window.onload = () => {
            const vu = document.getElementById('vu-meter');
            for(let i=0; i<32; i++) {
                const s = document.createElement('div');
                s.className = "flex-1 bg-[#1a1a1a]";
                vu.appendChild(s);
            }
            let p = 0;
            const interval = setInterval(() => {
                p++;
                if(p <= 32) {
                    const b = vu.children[p-1];
                    if(p < 20) b.style.backgroundColor = "#00ff66";
                    else if(p < 28) b.style.backgroundColor = "#ffff00";
                    else b.style.backgroundColor = "#ff0000";
                }
                if(p >= 40) {
                    clearInterval(interval);
                    document.getElementById('loading-screen').style.display = 'none';
                    checkSession();
                }
            }, 40);
        };

        function checkSession() {
            onAuthStateChanged(auth, (user) => {
                const vp = document.getElementById('master-viewport');
                vp.style.display = 'block';
                scaleUI();
                if (user) {
                    document.getElementById('auth-screen').style.display = 'none';
                    document.getElementById('app').classList.remove('hidden');
                    document.getElementById('pads-section').style.opacity = "1";
                    document.getElementById('pads-section').style.pointerEvents = "auto";
                    document.getElementById('user-display').innerText = user.email.split('@')[0].toUpperCase();
                    updateRender();
                } else {
                    updateRender();
                    renderGrid();
                }
            });
        }

        function updateRender() {
            const figureString = `hr-${figure.hr}.hd-${figure.hd}.ch-${figure.ch}.lg-${figure.lg}.sh-${figure.sh}.ha-${figure.ha}`;
            const baseUrl = `https://www.habbo.com.br/habbo-imaging/avatarimage?figure=${figureString}&size=l&direction=${direction}&head_direction=${direction}&gesture=sml&action=std`;
            document.getElementById('l-body').style.backgroundImage = `url('https://www.habbo.com.br/habbo-imaging/avatarimage?figure=hd-${figure.hd}&size=l&direction=${direction}&headonly=0')`;
            document.getElementById('l-hair').style.backgroundImage = `url('https://www.habbo.com.br/habbo-imaging/avatarimage?figure=hr-${figure.hr}&size=l&direction=${direction}')`;
            document.getElementById('l-tops').style.backgroundImage = `url('https://www.habbo.com.br/habbo-imaging/avatarimage?figure=ch-${figure.ch}&size=l&direction=${direction}')`;
            document.getElementById('l-bottoms').style.backgroundImage = `url('https://www.habbo.com.br/habbo-imaging/avatarimage?figure=lg-${figure.lg}.sh-${figure.sh}&size=l&direction=${direction}')`;
            document.getElementById('l-acc').style.backgroundImage = `url('https://www.habbo.com.br/habbo-imaging/avatarimage?figure=ha-${figure.ha}&size=l&direction=${direction}')`;
            document.getElementById('hud-av').src = baseUrl;
        }

        window.setCat = (c) => { 
            currentCat = c; 
            document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            renderGrid(); 
        };

        function renderGrid() {
            const g = document.getElementById('item-grid'); g.innerHTML = '';
            const ids = [1, 5, 10, 20, 30, 45, 60, 100, 115];
            ids.forEach(id => {
                const d = document.createElement('div');
                d.className = "item-slot";
                d.innerHTML = `<img src="https://www.habbo.com.br/habbo-imaging/avatarimage?figure=${currentCat}-${id}-1&headonly=1&size=m">`;
                d.onclick = () => { figure[currentCat] = id + "-1"; updateRender(); };
                g.appendChild(d);
            });
        }

        window.handleAuth = async () => {
            const e = document.getElementById('u-email').value;
            const p = document.getElementById('u-pass').value;
            try {
                if(isRegister) await createUserWithEmailAndPassword(auth, e, p);
                else await signInWithEmailAndPassword(auth, e, p);
            } catch (err) { alert("ERRO: " + err.message); }
        };

        window.toggleRegMode = () => {
            isRegister = !isRegister;
            document.getElementById('btn-auth-main').innerText = isRegister ? "CADASTRAR" : "CONECTAR";
            document.getElementById('reg-extra').classList.toggle('hidden', !isRegister);
        };

        function scaleUI() {
            const v = document.getElementById('master-viewport');
            const s = Math.min(window.innerWidth / 1350, window.innerHeight / 850);
            v.style.transform = `scale(${s})`;
        }
        window.addEventListener('resize', scaleUI);
        window.handleLogout = () => { if(confirm("Deslogar?")) signOut(auth).then(() => location.reload()); };
        window.rotate = (dir) => { direction = (direction + dir + 8) % 8; updateRender(); };
    </script>
</body>
</html>
