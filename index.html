<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfect Sample BR — Arena v6.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --gold: #D4A24C; 
            --orange: #ff5500; 
            --neon-green: #00ff66;
            --screen-bg: #050a05;
        }
        
        body { 
            background: #080808; 
            color: #fff; 
            font-family: 'Space Grotesk', sans-serif; 
            margin: 0; padding: 0;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; overflow: hidden;
            /* Textura de fundo de estúdio */
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
        }

        .pixel { font-family: 'Press Start 2P', cursive; }

        /* ESCALONAMENTO DO HARDWARE */
        #main-wrapper {
            transform-origin: center;
            display: flex; align-items: center; justify-content: center;
        }

        /* CHASSI MPC COM TEXTURA METALIZADA */
        .mpc-chassi {
            background: linear-gradient(145deg, #222 0%, #111 100%);
            border: 10px solid #2a2a2a;
            border-radius: 60px;
            padding: 40px;
            position: relative;
            box-shadow: 0 50px 100px #000, inset 0 2px 5px rgba(255,255,255,0.1);
            border-right: 30px solid #1a0f05; /* Lateral de Madeira */
        }

        /* TELA LCD NEON */
        .lcd-display {
            background: var(--screen-bg);
            border: 12px solid #050505;
            border-radius: 25px;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 60px #000;
        }
        .lcd-display::after {
            content: ""; display: block; position: absolute; inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%), 
                        linear-gradient(90deg, rgba(0, 255, 102, 0.03), rgba(0, 0, 0, 0), rgba(0, 255, 102, 0.03));
            z-index: 10; pointer-events: none; background-size: 100% 4px, 4px 100%;
        }

        /* BOTÕES ESTILO PAD MPC */
        .mpc-pad {
            background: #2a2a2a;
            border: 2px solid #333;
            border-bottom: 8px solid #000;
            border-radius: 15px;
            height: 95px;
            cursor: pointer;
            transition: all 0.1s ease-in-out;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-shadow: 0 0 5px rgba(255,255,255,0.2);
        }
        .mpc-pad:active {
            transform: translateY(4px);
            border-bottom-width: 2px;
            background: var(--orange);
            box-shadow: 0 0 30px var(--orange);
        }
        .mpc-pad span { color: #fff; text-transform: uppercase; font-weight: bold; }

        /* AVATAR CONTAINER */
        .avatar-frame {
            width: 200px; height: 200px;
            background: radial-gradient(circle, #111 0%, #000 100%);
            border-radius: 40px;
            border: 2px solid #333;
            box-shadow: inset 0 0 20px #000;
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        /* LOGIN CARD */
        .auth-overlay { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .auth-card { 
            background: #111; border: 2px solid #333; padding: 50px; border-radius: 50px; width: 450px; text-align: center;
            box-shadow: 0 0 40px rgba(212, 162, 76, 0.1);
        }
        
        .neon-input {
            background: #000; border: 1px solid #222; padding: 18px; border-radius: 15px;
            width: 100%; color: var(--gold); font-family: monospace; outline: none; margin-bottom: 20px;
            transition: 0.3s;
        }
        .neon-input:focus { border-color: var(--gold); box-shadow: 0 0 15px rgba(212, 162, 76, 0.2); }

        .screw { width: 14px; height: 14px; background: #333; border-radius: 50%; position: absolute; border: 1px solid #111; box-shadow: inset 0 2px 2px rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <!-- OVERLAY DE LOGIN / REGISTRO -->
    <div id="auth-overlay" class="auth-overlay">
        <div id="step-login" class="auth-card">
            <h2 class="pixel text-orange-500 text-[10px] mb-12 tracking-widest">PERFECT SAMPLE BR</h2>
            <input type="email" id="login-email" placeholder="EMAIL_PRODUTOR" class="neon-input">
            <input type="password" id="login-pass" placeholder="SENHA_ACESSO" class="neon-input">
            <button onclick="handleLogin()" class="w-full bg-orange-600 text-white py-4 rounded-2xl font-bold mb-4 hover:bg-orange-500 transition-all">CONECTAR</button>
            <button onclick="showStep('register')" class="text-gray-500 text-[9px] pixel hover:text-white uppercase tracking-tighter">Criar Nova Identidade</button>
        </div>

        <div id="step-register" class="auth-card hidden">
            <h2 class="pixel text-gold text-[10px] mb-10">NOVO_CADASTRO</h2>
            <input type="email" id="reg-email" placeholder="E-MAIL" class="neon-input">
            <input type="password" id="reg-pass" placeholder="SENHA" class="neon-input">
            <input type="password" id="reg-pass-confirm" placeholder="CONFIRMAR SENHA" class="neon-input">
            <button onclick="handleRegister()" class="w-full bg-gold text-black py-4 rounded-2xl font-bold mb-4">PRÓXIMO: AVATAR</button>
            <button onclick="showStep('login')" class="text-gray-500 text-[9px] pixel uppercase">Voltar</button>
        </div>

        <div id="step-avatar" class="auth-card hidden w-[550px]">
            <h2 class="pixel text-gold text-[10px] mb-8 uppercase">Customize sua Identidade</h2>
            <div class="flex gap-8 items-center">
                <div class="avatar-frame">
                    <img id="avatar-preview" src="https://api.dicebear.com/7.x/big-ears/svg?seed=Junior" class="w-full h-full scale-110">
                </div>
                <div class="flex-grow text-left space-y-4">
                    <input type="text" id="avatar-seed" oninput="updateAvatarPreview()" placeholder="NOME DO AVATAR" class="neon-input !mb-0">
                    <button onclick="finishRegistration()" class="w-full bg-emerald-600 text-white py-4 rounded-2xl pixel text-[8px] font-bold">FINALIZAR_E_ENTRAR</button>
                </div>
            </div>
        </div>
    </div>

    <!-- HARDWARE MPC COMPLETO -->
    <div id="main-wrapper">
        <div id="app" class="hidden mpc-chassi w-full max-w-6xl relative">
            <!-- Parafusos -->
            <div class="screw top-8 left-8"></div><div class="screw top-8 right-8"></div>
            <div class="screw bottom-8 left-8"></div><div class="screw bottom-8 right-8"></div>

            <!-- HUD SUPERIOR NEON -->
            <div class="flex justify-between items-center mb-10 bg-black/60 p-8 rounded-[40px] border border-white/5">
                <div class="flex items-center gap-6">
                    <div class="w-20 h-20 bg-black border-2 border-orange-500/20 rounded-[30px] flex items-center justify-center overflow-hidden shadow-2xl">
                        <img id="user-avatar-hud" src="" class="w-full h-full scale-125">
                    </div>
                    <div>
                        <h2 class="pixel text-[14px] text-orange-500 uppercase tracking-tighter" id="user-display">---</h2>
                        <span class="text-[11px] text-emerald-500 font-bold tracking-[0.2em] animate-pulse">RANK: PRODUCER</span>
                    </div>
                </div>
                <div class="flex gap-10">
                    <div class="text-right">
                        <span class="block text-gray-600 uppercase text-[9px] mb-1">Status_Rede</span>
                        <span class="text-emerald-400 font-bold text-[12px] pixel" id="socket-status">OFFLINE</span>
                    </div>
                </div>
            </div>

            <!-- GRID CENTRAL -->
            <div class="grid grid-cols-12 gap-10">
                <!-- TELA LCD -->
                <div class="col-span-12 lg:col-span-8">
                    <div class="lcd-display h-[480px] p-12 font-mono">
                        <div id="screen-arena" class="h-full flex flex-col justify-between text-emerald-500">
                            <div class="flex justify-between border-b border-emerald-900 pb-4">
                                <span class="pixel text-[9px] text-gold uppercase tracking-widest">Master_Kernel_v6.0</span>
                                <span id="queue-status" class="pixel text-[9px]">SESSÃO: OK</span>
                            </div>
                            <div class="flex flex-col items-center justify-center flex-grow">
                                <h2 class="pixel text-[13px] text-white mb-10 tracking-widest">START NEW BATTLE?</h2>
                                <button onclick="startMatchmaking()" class="px-12 py-6 bg-emerald-950/30 border-2 border-emerald-400 rounded-[30px] pixel text-[11px] text-emerald-400 hover:bg-emerald-400 hover:text-black transition-all shadow-[0_0_30px_rgba(0,255,102,0.2)]">INITIALIZE_ARENA</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- SIDEBAR PERFIL -->
                <div class="col-span-4 bg-black/40 rounded-[50px] border border-white/5 p-8 flex flex-col items-center justify-center">
                    <div class="avatar-frame w-full h-56 mb-8">
                        <img id="user-avatar-side" src="" class="w-full h-full scale-125">
                    </div>
                    <div class="w-full space-y-4">
                        <div class="flex justify-between text-[11px] uppercase text-gray-500 border-b border-white/5 pb-2"><span>Beat_Coins</span><span class="text-gold font-bold">1.500</span></div>
                        <div class="flex justify-between text-[11px] uppercase text-gray-500"><span>Progress</span><span class="text-emerald-500 font-bold">85%</span></div>
                    </div>
                </div>
            </div>

            <!-- PADS DE COMANDO (CORRIGIDOS) -->
            <div class="grid grid-cols-4 gap-8 mt-14">
                <div class="mpc-pad" onclick="location.reload()"><span class="pixel text-[10px]">ARENA</span></div>
                <div class="mpc-pad"><span class="pixel text-[10px]">BATTLE_PASS</span></div>
                <div class="mpc-pad" onclick="window.location.href='admin.html'"><span class="pixel text-[10px] text-red-500">ADMIN</span></div>
                <div class="mpc-pad border-gold/40"><span class="pixel text-[10px] text-gold">MARKET</span></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // ESCALA INTELIGENTE
        function adjustScale() {
            const wrapper = document.getElementById('main-wrapper');
            const scale = Math.min(window.innerWidth / 1400, window.innerHeight / 950);
            wrapper.style.transform = `scale(${scale})`;
        }
        window.addEventListener('resize', adjustScale);
        adjustScale();

        // NAVEGAÇÃO
        window.showStep = (s) => {
            document.querySelectorAll('.auth-card').forEach(c => c.classList.add('hidden'));
            document.getElementById('step-' + s).classList.remove('hidden');
        };

        // AVATAR ENGINE (REALISTA SVG)
        window.updateAvatarPreview = () => {
            const seed = document.getElementById('avatar-seed').value || 'Junior';
            // Usando Big-Ears para um visual mais "3D/Estilizado"
            document.getElementById('avatar-preview').src = `https://api.dicebear.com/7.x/big-ears/svg?seed=${seed}&backgroundColor=transparent`;
        };

        // AUTH
        window.handleLogin = async () => {
            const e = document.getElementById('login-email').value;
            const p = document.getElementById('login-pass').value;
            try {
                const cred = await signInWithEmailAndPassword(auth, e, p);
                enterApp(cred.user);
            } catch (err) { alert("Acesso Negado."); }
        };

        window.handleRegister = () => {
            const p = document.getElementById('reg-pass').value;
            const pc = document.getElementById('reg-pass-confirm').value;
            if(p !== pc) return alert("As senhas não conferem!");
            showStep('avatar');
        };

        window.finishRegistration = async () => {
            const e = document.getElementById('reg-email').value;
            const p = document.getElementById('reg-pass').value;
            const s = document.getElementById('avatar-seed').value;
            try {
                const cred = await createUserWithEmailAndPassword(auth, e, p);
                enterApp(cred.user, s);
            } catch (err) { alert("Erro ao cadastrar."); }
        };

        function enterApp(user, seed = "Junior") {
            document.getElementById('auth-overlay').style.display = 'none';
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('user-display').innerText = user.email.split('@')[0];
            const url = `https://api.dicebear.com/7.x/big-ears/svg?seed=${seed}&backgroundColor=transparent`;
            document.getElementById('user-avatar-hud').src = url;
            document.getElementById('user-avatar-side').src = url;
        }

        // SOCKET
        const socket = io("https://perfect-sample-br.onrender.com");
        socket.on('connect', () => {
            document.getElementById('socket-status').innerText = "ONLINE";
        });
    </script>
</body>
</html>
