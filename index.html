<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>Perfect Sample BR — SUPREME ARENA v28.3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Grotesk:wght@700&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #D4A24C; --orange: #ff5500; --bg: #000; --screen-green: #0d1b10; }
        * { image-rendering: pixelated; font-smooth: never; -webkit-font-smoothing: none; }
        
        body { 
            background: #111; 
            /* 🔩 NOVO BACKGROUND METÁLICO PIXELADO */
            background-image: 
                url('https://www.transparenttextures.com/patterns/brushed-alum.png'),
                radial-gradient(circle at center, rgba(255,85,0,0.1) 0%, #000 100%);
            color: #fff; font-family: 'Space Grotesk', sans-serif;
            margin: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; min-height: 100vh;
        }

        /* 🛡️ ENGINE DE ESCALA E ZOOM CINEMATOGRÁFICO */
        #master-viewport {
            width: 1280px; height: 800px;
            position: relative; 
            transform: scale(1.6) translateY(10%); /* Começa com Zoom no Visor */
            transition: transform 1s cubic-bezier(0.87, 0, 0.13, 1);
            display: none; 
        }
        #master-viewport.is-home { transform: scale(1) translateY(0); }

        /* IMPACTO DE CÂMERA (BOUNCE) */
        .camera-impact { animation: impact 0.4s ease-out; }
        @keyframes impact {
            0% { transform: scale(1.6) translateX(0); }
            30% { transform: scale(1.55) translateX(-30px) rotate(-1deg); }
            60% { transform: scale(1.62) translateX(15px) rotate(0.5deg); }
            100% { transform: scale(1) translateX(0); }
        }

        .mpc-frame {
            background: #151515;
            background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            border: 6px solid #333; border-radius: 50px;
            padding: 30px; position: relative; width: 1200px; height: 760px;
            box-shadow: 0 50px 150px #000, inset 4px 4px 0 #444, inset -4px -4px 0 #000;
        }
        .wood-side { position: absolute; right: -30px; top: 15px; bottom: 15px; width: 30px; background: #1a0f05; border: 4px solid #000; border-radius: 0 10px 10px 0; }

        .led-panel {
            background: #1a0a00; border-bottom: 3px solid #000;
            height: 40px; overflow: hidden; position: relative;
            display: flex; align-items: center;
        }
        .marquee {
            white-space: nowrap; position: absolute;
            animation: marquee-scroll 10s linear infinite;
            font-family: 'Press Start 2P'; font-size: 10px;
            color: var(--orange); text-shadow: 0 0 10px var(--orange);
        }
        @keyframes marquee-scroll { 0% { left: 100%; } 100% { left: -100%; } }

        /* BONECO E GUARDA-ROUPA (FIX VISIBILITY) */
        .avatar-podium {
            width: 320px; height: 480px; background: rgba(0,0,0,0.8);
            border: 2px solid rgba(212,162,76,0.2); border-radius: 20px;
            position: relative; display: flex; align-items: center; justify-content: center;
        }
        .avatar-layer { position: absolute; width: 250px; height: 400px; background-size: contain; background-repeat: no-repeat; bottom: 30px; z-index: 10; }

        .mpc-pad {
            background: linear-gradient(180deg, #2a2a2a 0%, #111 100%);
            border: 3px solid #333; border-bottom: 10px solid #000; border-radius: 12px;
            cursor: pointer; transition: 0.1s; display: flex; items-center; justify-content: center;
            font-family: 'Press Start 2P'; font-size: 7px; color: #555;
        }
        .mpc-pad.active { color: #fff; border-color: var(--orange); box-shadow: 0 0 15px var(--orange); }

        .habbo-ui { background: #e1e1e1; border: 3px solid #000; box-shadow: 6px 6px 0 rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <!-- 1. LOADING -->
    <div id="loading-screen" class="fixed inset-0 bg-[#050505] z-[9999] flex flex-col items-center justify-center">
        <img src="logo.png" style="width: 450px;" class="animate-pulse mb-8">
        <div class="flex gap-1 h-6 w-96 bg-[#111] p-1 border-2 border-[#333]" id="vu-meter"></div>
        <p class="pixel text-gold text-[8px] mt-6 tracking-[0.5em]">SYSTEM_V28.3_BOOTING</p>
    </div>

    <div id="master-viewport">
        <div class="mpc-frame">
            <div class="wood-side"></div>

            <!-- LCD MONITOR (Onde tudo acontece) -->
            <div class="bg-[#0d1b10] border-[12px] border-[#000] rounded-[20px] h-[520px] relative overflow-hidden shadow-inner">
                
                <!-- ESTADO: LOGIN / CADASTRO -->
                <div id="auth-screen" class="absolute inset-0 z-[50] flex flex-col">
                    <div class="led-panel">
                        <div class="marquee">SEJA BEM VINDO AO PSBR — SEJA BEM VINDO AO PSBR</div>
                    </div>
                    
                    <div class="flex flex-grow p-6 gap-6 bg-[#e1e1e1] text-black">
                        <!-- FORMULARIO -->
                        <div class="w-72 flex flex-col justify-between">
                            <div class="bg-gray-300 border-2 border-gray-500 p-5 rounded shadow-inner">
                                <span class="text-[12px] font-black uppercase mb-4 block text-black" style="font-family: 'Syncopate';">Contrato_Acesso</span>
                                <input type="email" id="u-email" placeholder="EMAIL" class="w-full p-3 border-2 border-black mb-2 text-xs outline-none">
                                <input type="password" id="u-pass" placeholder="CHAVE_DNA" class="w-full p-3 border-2 border-black text-xs outline-none">
                                
                                <div id="reg-extra" class="hidden mt-2">
                                    <input type="text" id="u-nick" placeholder="NICKNAME" class="w-full p-3 border-2 border-black text-xs outline-none">
                                </div>
                                <button onclick="handleAuth()" id="btn-auth-main" class="w-full bg-[#fde047] border-b-8 border-[#7c2d12] py-3 mt-4 font-black text-[10px]">CONECTAR</button>
                            </div>
                            <button onclick="toggleRegMode()" id="btn-reg-mode" class="text-[10px] text-orange-600 font-bold uppercase underline">Novo Produtor?</button>
                        </div>

                        <!-- BONECO (CENTRO) -->
                        <div class="flex-grow flex flex-col items-center justify-center bg-[#adadad] border-4 border-white rounded-xl shadow-2xl overflow-hidden">
                            <div class="avatar-podium">
                                <div id="l-body" class="avatar-layer"></div>
                                <div id="l-bottoms" class="avatar-layer"></div>
                                <div id="l-tops" class="avatar-layer"></div>
                                <div id="l-hair" class="avatar-layer"></div>
                                <div id="l-acc" class="avatar-layer"></div>
                            </div>
                            <div class="flex gap-2 mt-4">
                                <button class="bg-gray-400 p-2 border-2 border-black" onclick="rotate(-1)">◀</button>
                                <button class="bg-gray-400 p-2 border-2 border-black" onclick="rotate(1)">▶</button>
                            </div>
                        </div>

                        <!-- GUARDA-ROUPA (DIREITA) -->
                        <div class="w-72 flex flex-col bg-gray-200 border-2 border-gray-400 p-3">
                            <div id="item-grid" class="grid grid-cols-3 gap-2 overflow-y-auto flex-grow bg-white border-2 border-black p-2"></div>
                        </div>
                    </div>
                </div>

                <!-- ESTADO: HOME (DASHBOARD) -->
                <div id="app" class="hidden absolute inset-0 z-[10] flex flex-col p-10 font-mono text-emerald-500">
                    <div class="flex justify-between border-b border-white/5 pb-2 text-[10px]">
                        <span>KERNEL_SUPREME_V28.3</span>
                        <span class="text-green-500 font-bold">● SESSÃO_ATIVA</span>
                    </div>
                    <div class="flex-grow flex flex-col items-center justify-center">
                        <h1 class="pixel text-white text-[16px] mb-8 text-center leading-loose">START COMPETITIVE MATCHMAKING?</h1>
                        <button class="bg-[#003311] border-4 border-emerald-500 px-16 py-8 text-emerald-400 text-[12px] hover:bg-emerald-500 hover:text-black">START_ARENA</button>
                    </div>
                    <div class="flex justify-between items-center bg-black/40 p-4 rounded-xl border border-white/5">
                        <div class="flex items-center gap-4">
                            <img id="hud-av" src="" class="w-12 h-12 bg-black border border-white/10 rounded">
                            <span class="pixel text-[8px] text-orange-500" id="user-display">---</span>
                        </div>
                        <span class="text-gold font-bold">1.500 BC</span>
                    </div>
                </div>

            </div>

            <!-- PADS (CONTROLE DO HARDWARE) -->
            <div class="grid grid-cols-4 gap-6 mt-10">
                <div class="mpc-pad active h-20"><span>ARENA</span></div>
                <div class="mpc-pad h-20"><span>PASS</span></div>
                <div class="mpc-pad h-20" onclick="window.location.href='admin.html'"><span>ROOT</span></div>
                <div class="mpc-pad h-20" onclick="handleLogout()"><span>OFF</span></div>
                <script>for(let i=0; i<12; i++) document.write('<div class="mpc-pad h-20"></div>');</script>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        let figure = { hr: '115-42', hd: '180-1', ch: '215-62', lg: '270-92', sh: '300-64', ha: '0' };
        let direction = 4;
        let isRegister = false;

        window.onload = () => {
            const vu = document.getElementById('vu-meter');
            for(let i=0; i<32; i++) {
                const s = document.createElement('div');
                s.className = "flex-1 bg-[#1a1a1a]";
                vu.appendChild(s);
            }
            let p = 0;
            const interval = setInterval(() => {
                p++;
                if(p <= 32) {
                    const b = vu.children[p-1];
                    if(p < 20) b.style.backgroundColor = "#00ff66";
                    else if(p < 28) b.style.backgroundColor = "#ffff00";
                    else b.style.backgroundColor = "#ff0000";
                }
                if(p >= 40) {
                    clearInterval(interval);
                    document.getElementById('loading-screen').style.display = 'none';
                    checkSession();
                }
            }, 40);
        };

        function checkSession() {
            onAuthStateChanged(auth, (user) => {
                const vp = document.getElementById('master-viewport');
                vp.style.display = 'block';
                if (user) transitionToApp(user);
                else {
                    updateRender();
                    renderGrid();
                }
            });
        }

        // 🎬 EFEITO DE CÂMERA AO LOGAR
        function transitionToApp(user) {
            const vp = document.getElementById('master-viewport');
            const authScr = document.getElementById('auth-screen');
            const appScr = document.getElementById('app');

            vp.classList.add('camera-impact'); // Solavanco da câmera
            
            setTimeout(() => {
                vp.classList.add('is-home'); // Zoom out para ver a MPC toda
                authScr.style.display = 'none';
                appScr.classList.remove('hidden');
                document.getElementById('user-display').innerText = user.email.split('@')[0].toUpperCase();
            }, 400);
        }

        function updateRender() {
            const figureString = `hr-${figure.hr}.hd-${figure.hd}.ch-${figure.ch}.lg-${figure.lg}.sh-${figure.sh}.ha-${figure.ha}`;
            const baseUrl = `https://www.habbo.com.br/habbo-imaging/avatarimage?figure=${figureString}&size=l&direction=${direction}&head_direction=${direction}&gesture=sml&action=std`;
            document.getElementById('l-body').style.backgroundImage = `url('https://www.habbo.com.br/habbo-imaging/avatarimage?figure=hd-${figure.hd}&size=l&direction=${direction}&headonly=0')`;
            document.getElementById('l-hair').style.backgroundImage = `url('https://www.habbo.com.br/habbo-imaging/avatarimage?figure=hr-${figure.hr}&size=l&direction=${direction}')`;
            document.getElementById('l-tops').style.backgroundImage = `url('https://www.habbo.com.br/habbo-imaging/avatarimage?figure=ch-${figure.ch}&size=l&direction=${direction}')`;
            document.getElementById('l-bottoms').style.backgroundImage = `url('https://www.habbo.com.br/habbo-imaging/avatarimage?figure=lg-${figure.lg}.sh-${figure.sh}&size=l&direction=${direction}')`;
            document.getElementById('l-acc').style.backgroundImage = `url('https://www.habbo.com.br/habbo-imaging/avatarimage?figure=ha-${figure.ha}&size=l&direction=${direction}')`;
            document.getElementById('hud-av').src = baseUrl;
        }

        function renderGrid() {
            const g = document.getElementById('item-grid'); g.innerHTML = '';
            const ids = [1, 2, 5, 10, 20, 45, 60, 100];
            ids.forEach(id => {
                const d = document.createElement('div');
                d.className = "bg-gray-100 border-2 border-black p-1 cursor-pointer hover:bg-gold/20 aspect-square flex items-center justify-center";
                d.innerHTML = `<img src="https://www.habbo.com.br/habbo-imaging/avatarimage?figure=ch-${id}-1&headonly=1&size=m">`;
                d.onclick = () => { figure.ch = id + "-1"; updateRender(); };
                g.appendChild(d);
            });
        }

        window.handleAuth = async () => {
            const e = document.getElementById('u-email').value;
            const p = document.getElementById('u-pass').value;
            try {
                if(isRegister) await createUserWithEmailAndPassword(auth, e, p);
                else await signInWithEmailAndPassword(auth, e, p);
            } catch (err) { alert("ERRO: " + err.message); }
        };

        window.toggleRegMode = () => {
            isRegister = !isRegister;
            document.getElementById('btn-auth-main').innerText = isRegister ? "CADASTRAR" : "CONECTAR";
            document.getElementById('reg-extra').classList.toggle('hidden', !isRegister);
        };

        window.handleLogout = () => { if(confirm("Deslogar?")) signOut(auth).then(() => location.reload()); };
        window.rotate = (dir) => { direction = (direction + dir + 8) % 8; updateRender(); };
    </script>
</body>
</html>
