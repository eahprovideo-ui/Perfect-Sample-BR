<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>Perfect Sample BR — SUPREME MARKET v27</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --gold: #D4A24C; --orange: #ff5500; --bg: #000;
            --mpc-metal: #1a1a1a; --screen-green: #0d1b10;
        }

        /* 🕹️ MOTOR PIXEL ART HD */
        * { image-rendering: pixelated; image-rendering: crisp-edges; }
        
        body { 
            background: #000; color: #fff; font-family: 'Space Grotesk', sans-serif;
            margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh;
            background-image: radial-gradient(circle, #1a1a1a 0%, #000 100%);
        }

        /* CHASSI MPC SUPREME */
        .mpc-chassi {
            width: 1200px; height: 800px;
            background: #111;
            background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            border: 6px solid #333; border-radius: 40px;
            padding: 30px; position: relative;
            box-shadow: 0 50px 100px #000, inset 4px 4px 0 #444;
        }

        /* TELA LCD */
        .lcd-screen {
            background: var(--screen-green); border: 10px solid #000;
            border-radius: 15px; position: relative; overflow: hidden;
            box-shadow: inset 0 0 60px #000;
        }

        /* MARKETPLACE UI (ESTILO FIVE-M / RP) */
        .market-box {
            background: #151515; border: 3px solid #333;
            display: flex; flex-direction: column; color: #fff;
        }
        .market-tab {
            padding: 12px; cursor: pointer; text-align: center; border-bottom: 2px solid #222;
            font-family: 'Press Start 2P'; font-size: 7px; color: #555;
        }
        .market-tab.active { background: var(--gold); color: #000; }

        .item-card {
            background: #0a0a0a; border: 2px solid #222; padding: 10px;
            position: relative; transition: 0.2s; cursor: pointer;
        }
        .item-card:hover { border-color: var(--gold); }
        .item-card.locked { opacity: 0.6; cursor: not-allowed; }
        .item-card.locked::after { content: '🔒'; position: absolute; top: 5px; right: 5px; font-size: 10px; }

        /* BONECO */
        .pedestal {
            width: 280px; height: 440px; background: rgba(0,0,0,0.4);
            border: 2px solid rgba(255,255,255,0.1); border-radius: 15px;
            position: relative; display: flex; align-items: center; justify-content: center;
        }
        .avatar-layer { position: absolute; width: 240px; height: 380px; background-size: contain; background-repeat: no-repeat; bottom: 30px; }

        /* BOTÕES MPC */
        .pad {
            background: linear-gradient(180deg, #2a2a2a 0%, #111 100%);
            border: 2px solid #333; border-bottom: 8px solid #000; border-radius: 10px;
            cursor: pointer; transition: 0.1s; display: flex; items-center; justify-content: center;
            font-family: 'Press Start 2P'; font-size: 7px;
        }
        .pad.active { color: #fff; border-color: var(--orange); box-shadow: 0 0 15px var(--orange); }
        .pad:active { transform: translateY(4px); border-bottom-width: 2px; }

        .btn-buy { background: var(--gold); color: #000; font-weight: bold; font-size: 10px; padding: 8px; border-radius: 5px; }
        .btn-buy:disabled { background: #333; color: #666; }
    </style>
</head>
<body>

    <div class="mpc-chassi">
        <div style="position:absolute; right:-30px; top:0; bottom:0; width:30px; background:#2b1a0a; border:4px solid #000; border-radius:0 10px 10px 0;"></div>

        <!-- LCD MONITOR: ARENA & MARKET -->
        <div class="lcd-screen h-[500px] p-8 flex gap-8">
            
            <!-- LADO ESQUERDO: PREVIEW BONECO 32-BIT -->
            <div class="w-1/3 flex flex-col items-center justify-center">
                <div class="pedestal">
                    <div id="l-body" class="avatar-layer"></div>
                    <div id="l-bottoms" class="avatar-layer"></div>
                    <div id="l-tops" class="avatar-layer"></div>
                    <div id="l-hair" class="avatar-layer"></div>
                    <div id="l-acc" class="avatar-layer"></div>
                </div>
                <div class="mt-4 flex gap-4">
                    <button onclick="rotate(-1)" class="bg-black/60 p-2 border border-white/20 text-white">◀</button>
                    <button onclick="rotate(1)" class="bg-black/60 p-2 border border-white/20 text-white">▶</button>
                </div>
            </div>

            <!-- LADO DIREITO: MARKETPLACE SUPREME -->
            <div class="flex-grow market-box rounded-xl overflow-hidden border-2 border-black">
                <div class="flex bg-black">
                    <div class="market-tab active" onclick="setMarketCat('vip')">👑 VIP_ICE</div>
                    <div class="market-tab" onclick="setMarketCat('ch')">👕 CLOTHES</div>
                    <div class="market-tab" onclick="setMarketCat('ha')">🎭 MASKS</div>
                </div>
                
                <div id="market-grid" class="grid grid-cols-3 gap-4 p-4 overflow-y-auto flex-grow bg-[#111]">
                    <!-- Itens carregados via JS -->
                </div>

                <div class="p-4 bg-black border-t border-white/10 flex justify-between items-center">
                    <div>
                        <span class="text-[7px] text-gray-500 block">ITEM_SELECTED:</span>
                        <span id="selected-item-name" class="text-gold text-[10px] font-bold">NENHUM</span>
                    </div>
                    <button id="buy-button" onclick="handlePurchase()" class="btn-buy" disabled>ADQUIRIR AGORA</button>
                </div>
            </div>
        </div>

        <!-- PAINEL DE CONTROLE PADS -->
        <div class="flex justify-between items-end mt-8">
            <div class="grid grid-cols-4 gap-4 w-[600px]">
                <div class="pad active aspect-square"><span>ARENA</span></div>
                <div class="pad aspect-square" onclick="alert('Passe em breve!')"><span>PASS</span></div>
                <div class="pad aspect-square" onclick="window.location.href='admin.html'"><span>ROOT</span></div>
                <div class="pad aspect-square active"><span>MARKET</span></div>
                <script>
                    for(let i=0; i<12; i++) document.write('<div class="pad aspect-square"></div>');
                </script>
            </div>

            <!-- HUD DE SALDO -->
            <div class="w-80 space-y-4">
                <div class="bg-black p-6 border-4 border-gold rounded-2xl">
                    <div class="flex justify-between items-center mb-4">
                        <span class="pixel text-[7px] text-gray-500">CARTEIRA_DIGITAL</span>
                        <span class="text-emerald-500 pixel text-[7px]">SINC_OK</span>
                    </div>
                    <div class="space-y-2">
                        <div class="flex justify-between font-bold">
                            <span class="text-white text-xs">BEAT TOKENS:</span>
                            <span class="text-white text-xs">🪙 <span id="bt-balance">420</span></span>
                        </div>
                        <div class="flex justify-between font-bold">
                            <span class="text-gold text-xs">BEAT COINS:</span>
                            <span class="text-gold text-xs">💎 <span id="bc-balance">150</span></span>
                        </div>
                    </div>
                    <button onclick="window.open('https://wa.me/5511999999999')" class="w-full mt-4 bg-emerald-600 text-white py-2 rounded font-bold text-[9px] pixel">RECARREGAR BC</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        // LÓGICA DE ECONOMIA E LOJA
        let balances = { bt: 420, bc: 150 };
        let figure = { hr: '115-42', hd: '180-1', ch: '215-62', lg: '270-92', sh: '300-64', ha: '0' };
        let currentItem = null;
        let direction = 4;

        const inventory = {
            vip: [
                { id: '2580-110', name: 'Corrente Gelo PS', price: 500, type: 'ha', currency: 'bc' },
                { id: '3190-62', name: 'Máscara Neon Trap', price: 200, type: 'ha', currency: 'bc' },
                { id: '3081-110', name: 'Moletom Legend', price: 1000, type: 'ch', currency: 'bc' }
            ],
            ch: [
                { id: '215-62', name: 'T-Shirt Basica', price: 50, type: 'ch', currency: 'bt' },
                { id: '3030-92', name: 'Jaqueta Bomber', price: 150, type: 'ch', currency: 'bt' }
            ]
        };

        window.setMarketCat = (cat) => {
            document.querySelectorAll('.market-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            renderMarket(cat);
        }

        function renderMarket(cat) {
            const grid = document.getElementById('market-grid');
            grid.innerHTML = '';
            const items = inventory[cat] || [];

            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'item-card';
                const hasMoney = balances[item.currency] >= item.price;
                if(!hasMoney) card.classList.add('locked');

                card.innerHTML = `
                    <img src="https://www.habbo.com.br/habbo-imaging/avatarimage?figure=${item.type}-${item.id}&headonly=1&size=m" class="mx-auto mb-2">
                    <p class="text-[7px] font-bold text-center">${item.name}</p>
                    <p class="text-[8px] text-gold text-center font-bold mt-1">${item.currency === 'bc' ? '💎' : '🪙'} ${item.price}</p>
                `;

                card.onclick = () => {
                    if(!hasMoney) {
                        alert("SALDO INSUFICIENTE! Faça uma recarga via WhatsApp.");
                        return;
                    }
                    selectItem(item);
                };
                grid.appendChild(card);
            });
        }

        function selectItem(item) {
            currentItem = item;
            document.getElementById('selected-item-name').innerText = item.name;
            document.getElementById('buy-button').disabled = false;
            
            // Preview instantâneo no boneco
            figure[item.type] = item.id;
            updateRender();
        }

        window.handlePurchase = () => {
            if(!currentItem) return;
            const confirm = window.confirm(`Deseja confirmar a compra de ${currentItem.name} por ${currentItem.price} ${currentItem.currency.toUpperCase()}?`);
            if(confirm) {
                if(currentItem.currency === 'bc') {
                    // Itens VIP levam ao WhatsApp para aprovação manual (sua regra)
                    window.open(`https://wa.me/5511999999999?text=Quero%20adquirir%20o%20item%20VIP:%20${currentItem.name}`);
                } else {
                    alert("ITEM ADQUIRIDO COM SUCESSO!");
                }
            }
        }

        function updateRender() {
            const figureString = `hr-${figure.hr}.hd-${figure.hd}.ch-${figure.ch}.lg-${figure.lg}.sh-${figure.sh}.ha-${figure.ha}`;
            const url = `https://www.habbo.com.br/habbo-imaging/avatarimage?figure=${figureString}&size=l&direction=${direction}&head_direction=${direction}&gesture=sml&action=std`;
            document.getElementById('l-body').style.backgroundImage = `url('https://www.habbo.com.br/habbo-imaging/avatarimage?figure=hd-${figure.hd}&size=l&direction=${direction}&headonly=0')`;
            document.getElementById('l-hair').style.backgroundImage = `url('https://www.habbo.com.br/habbo-imaging/avatarimage?figure=hr-${figure.hr}&size=l&direction=${direction}')`;
            document.getElementById('l-tops').style.backgroundImage = `url('https://www.habbo.com.br/habbo-imaging/avatarimage?figure=ch-${figure.ch}&size=l&direction=${direction}')`;
            document.getElementById('l-bottoms').style.backgroundImage = `url('https://www.habbo.com.br/habbo-imaging/avatarimage?figure=lg-${figure.lg}.sh-${figure.sh}&size=l&direction=${direction}')`;
            document.getElementById('l-acc').style.backgroundImage = `url('https://www.habbo.com.br/habbo-imaging/avatarimage?figure=ha-${figure.ha}&size=l&direction=${direction}')`;
        }

        window.rotate = (dir) => { direction = (direction + dir + 8) % 8; updateRender(); }

        updateRender();
        renderMarket('vip');
    </script>
</body>
</html>
