<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>Perfect Sample BR — Pixel Engine v19</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #D4A24C; --orange: #ff5500; --bg: #000; --habbo-gray: #e1e1e1; }
        
        /* 🕹️ PIXEL ART CORE RENDERING */
        * { 
            image-rendering: pixelated !important; 
            image-rendering: crisp-edges !important;
            font-smooth: never;
            -webkit-font-smoothing: none;
        }
        
        body { 
            background: #000; color: #fff; font-family: 'Press Start 2P', cursive; 
            margin: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; min-height: 100vh;
        }

        /* VIEWPORT 16:9 (GAME SCREEN) */
        #game-viewport {
            width: 1280px; height: 720px;
            display: none; position: relative;
            transform-origin: center;
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            border: 2px solid #222;
        }

        /* MPC CHASSI METALIZADO */
        .mpc-iron {
            background: #151515;
            border: 6px solid #333;
            box-shadow: 15px 15px 0 #000, inset 4px 4px 0 #444;
            padding: 25px; position: relative; width: 1200px; height: 680px;
            background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
        }

        /* HABBO STYLE WINDOW (DESIGN BY JUNIOR) */
        .habbo-window {
            background: var(--habbo-gray); border: 2px solid #000;
            box-shadow: 4px 4px 0 rgba(0,0,0,0.4); color: #000;
            font-family: 'Space Grotesk', sans-serif;
        }
        .habbo-header { background: #004f5d; padding: 8px 12px; color: #fff; font-size: 11px; display: flex; justify-content: space-between; }
        
        /* ABAS SUPERIORES */
        .tab-icon { 
            background: #adadad; border: 2px solid #000; padding: 8px; cursor: pointer; 
            border-bottom: 0; transition: 0.1s; display: flex; items-center; justify-content: center;
        }
        .tab-icon.active { background: var(--habbo-gray); }

        /* ENGINE DE CAMADAS DO BONECO (IMAGER EMULATION) */
        .avatar-pedestal {
            width: 320px; height: 480px; background: #000; border: 4px solid #222;
            position: relative; display: flex; align-items: center; justify-content: center;
            box-shadow: inset 0 0 50px #000;
        }
        .layer {
            position: absolute; width: 200px; height: 350px;
            background-size: contain; background-repeat: no-repeat;
            bottom: 50px; z-index: 1;
        }
        #l-body { z-index: 10; }   /* Pele */
        #l-bottoms { z-index: 20; } /* Calça */
        #l-tops { z-index: 30; }    /* Camisa */
        #l-hair { z-index: 40; }    /* Cabelo */
        #l-acc { z-index: 50; }     /* Corrente/Máscara */

        /* PADS MPC PROFISSIONAIS */
        .mpc-pad {
            background: linear-gradient(180deg, #222 0%, #111 100%);
            border: 2px solid #333; border-bottom: 8px solid #000;
            border-radius: 10px; height: 85px; cursor: pointer; transition: 0.05s;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .mpc-pad:active { transform: translateY(6px); border-bottom-width: 2px; background: var(--orange); }

        .item-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
            height: 380px; overflow-y: auto; padding: 10px; background: #fff; border: 2px solid #000;
        }
        .item-box {
            background: #f0f0f0; border: 1px solid #ccc; aspect-ratio: 1;
            cursor: pointer; display: flex; items: center; justify: center;
        }
        .item-box:hover { border-color: #000; background: #e0e0e0; }
        .item-box.selected { border: 2px solid var(--gold); box-shadow: inset 0 0 5px var(--gold); }
    </style>
</head>
<body>

    <!-- VU METER LOADING -->
    <div id="loading-screen" class="fixed inset-0 bg-[#050505] z-[9999] flex flex-col items-center justify-center">
        <img src="logo.png" style="width: 450px;" class="animate-pulse mb-8">
        <div class="flex gap-1 h-6 w-96 bg-[#111] p-1 border-2 border-[#333]" id="vu-meter"></div>
        <p class="pixel text-gold text-[8px] mt-6 tracking-[1.5em]">SYNTHESIZING_PIXEL_ENGINE...</p>
    </div>

    <div id="game-viewport">
        
        <!-- IDENTITY LAB (LOGIN + WARDROBE) -->
        <div id="auth-screen" class="fixed inset-0 z-[5000] bg-black/95 flex items-center justify-center hidden">
            <div class="habbo-window w-[1150px] h-[780px] flex flex-col">
                <div class="habbo-header">
                    <span>ASSINATURA DE CONTRATO — PERFECT SAMPLE BR</span>
                    <button onclick="location.reload()">[X]</button>
                </div>
                
                <div class="flex flex-grow p-8 gap-8 overflow-hidden bg-white/10">
                    <!-- LOGIN/DADOS -->
                    <div class="w-72 flex flex-col justify-between text-black">
                        <div class="habbo-window p-4 border-white/20">
                            <span class="text-[9px] block mb-4 font-black text-white">LOGIN_STATION</span>
                            <input type="email" id="u-email" placeholder="EMAIL" class="w-full p-3 border-2 border-black mb-2 text-xs outline-none">
                            <input type="password" id="u-pass" placeholder="CHAVE" class="w-full p-3 border-2 border-black text-xs outline-none">
                            <button onclick="handleAuth()" id="btn-auth-main" class="w-full bg-[#3d9a30] text-white py-4 border-b-8 border-[#1e4e18] font-bold text-sm mt-4">CONECTAR</button>
                        </div>
                        <button onclick="toggleRegMode()" id="btn-reg-mode" class="text-xs text-white underline uppercase">Novo Produtor?</button>
                    </div>

                    <!-- PERSONAGEM (STACKED LAYERS) -->
                    <div class="flex-grow flex flex-col items-center justify-center bg-[#adadad] rounded-xl border-4 border-white shadow-2xl">
                        <div class="avatar-pedestal">
                            <div id="l-body" class="layer"></div>
                            <div id="l-bottoms" class="layer"></div>
                            <div id="l-tops" class="layer"></div>
                            <div id="l-hair" class="layer"></div>
                            <div id="l-acc" class="layer"></div>
                            <div style="position: absolute; bottom: 40px; width: 120px; height: 10px; background: rgba(0,0,0,0.5); border-radius: 50%; filter: blur(4px);"></div>
                        </div>
                        <div class="flex gap-4 mt-6">
                            <button class="bg-gray-400 p-4 border-2 border-black" onclick="rotate(-45)">◀</button>
                            <button class="bg-gray-400 p-4 border-2 border-black" onclick="rotate(45)">▶</button>
                        </div>
                    </div>

                    <!-- WARDROBE HABBO ENGINE -->
                    <div class="w-[450px] flex flex-col">
                        <div class="flex mb-1" id="tabs">
                            <div class="tab-icon active" onclick="setCat('body')">👤</div>
                            <div class="tab-icon" onclick="setCat('hair')">💇</div>
                            <div class="tab-icon" onclick="setCat('tops')">👕</div>
                            <div class="tab-icon" onclick="setCat('bottoms')">👖</div>
                            <div class="tab-icon" onclick="setCat('acc')">💎</div>
                        </div>
                        <div id="item-grid" class="item-grid">
                            <!-- Itens filtrados via JS -->
                        </div>
                        <button onclick="finishReg()" class="w-full bg-orange-600 text-white py-5 border-b-8 border-[#803300] font-bold text-sm mt-2">GRAVAR MASTER</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- MAIN ARENA MPC -->
        <div id="app" class="mpc-iron hidden">
            <!-- HUD -->
            <div class="flex justify-between items-center mb-8 bg-black/80 p-6 border-4 border-black">
                <div class="flex items-center gap-6">
                    <div class="w-20 h-20 bg-black border-4 border-[#333] overflow-hidden relative">
                         <!-- HUD layers sync -->
                         <div id="hud-l-body" class="layer scale-50" style="bottom: -100px; left: -60px;"></div>
                         <div id="hud-l-tops" class="layer scale-50" style="bottom: -100px; left: -60px;"></div>
                    </div>
                    <div>
                        <h2 class="text-orange-500 text-[14px]" id="user-display">---</h2>
                        <span class="text-emerald-500 text-[8px]">PRODUTOR SUPREME // ONLINE</span>
                    </div>
                </div>
                <div class="text-right">
                    <span class="text-gold text-[18px] block font-black">1.500 BC</span>
                    <button onclick="handleLogout()" class="text-red-600 text-[8px] underline uppercase">Sair</button>
                </div>
            </div>

            <!-- TELA LCD -->
            <div class="grid grid-cols-12 gap-8">
                <div class="col-span-8">
                    <div class="bg-[#050a05] border-[10px] border-[#000] h-[450px] p-10 flex flex-col justify-between">
                         <div class="flex justify-between border-b border-emerald-950 pb-2 text-[10px] text-emerald-500">
                            <span>KERNEL_V19_PIXEL</span>
                            <span id="socket-status" class="animate-pulse">● STABLE</span>
                         </div>
                         <div class="flex flex-col items-center">
                            <h1 class="text-white text-[14px] mb-10 text-center leading-loose">INICIAR BUSCA DE ARENA COMPETITIVA?</h1>
                            <button onclick="alert('Queue Ativa')" class="bg-[#003311] border-4 border-emerald-500 px-14 py-8 text-emerald-400 text-[12px] hover:bg-emerald-500 hover:text-black">START_ARENA</button>
                         </div>
                         <p class="text-[8px] opacity-20 text-center uppercase">Copyright Perfect Sample BR 2030</p>
                    </div>
                </div>

                <!-- SIDEBAR PREVIEW -->
                <div class="col-span-4 bg-black/40 border-4 border-black p-8 flex flex-col items-center">
                    <div class="avatar-pedestal w-full h-64 border-gold/20 overflow-hidden">
                         <div id="side-l-body" class="layer scale-50" style="bottom: -100px;"></div>
                         <div id="side-l-tops" class="layer scale-50" style="bottom: -100px;"></div>
                    </div>
                    <div class="grid grid-cols-3 gap-2 w-full mt-6">
                        <button class="bg-black border-2 border-gold p-3 text-gold text-[10px] font-bold">S1</button>
                        <button class="bg-black border-2 border-gray-800 p-3 text-gray-800 text-[10px]">S2</button>
                        <button class="bg-black border-2 border-gray-800 p-3 text-gray-800 text-[10px]">S3</button>
                    </div>
                </div>
            </div>

            <!-- PADS -->
            <div class="grid grid-cols-4 gap-8 mt-10">
                <div class="mpc-pad"><span>ARENA</span></div>
                <div class="mpc-pad"><span>BPASS</span></div>
                <div id="admin-pad" class="mpc-pad hidden" onclick="window.location.href='admin.html'"><span class="text-red-500 font-bold">ADMIN</span></div>
                <div class="mpc-pad border-gold/40" onclick="toggleStore()"><span class="text-gold font-bold">MARKET</span></div>
            </div>
        </div>
    </div>

    <!-- LOJA STYLE (MODAL) -->
    <div id="store-modal" class="fixed inset-0 z-[6000] bg-black/98 hidden items-center justify-center p-12">
        <div class="mpc-iron w-[1100px] h-[700px] flex flex-col">
            <div class="flex justify-between items-center border-b-4 border-black pb-4 mb-6">
                <h2 class="text-gold text-[12px]">MARKETPLACE_SUPREME</h2>
                <button onclick="toggleStore()" class="text-red-600 text-[10px]">[X] FECHAR</button>
            </div>
            <div class="flex gap-6 flex-grow overflow-hidden">
                <div class="w-64 space-y-4">
                    <button class="w-full text-left p-6 bg-gold text-black text-[10px] font-black border-4 border-black">💎 PREMIUM BC</button>
                    <button class="w-full text-left p-6 bg-[#222] text-gray-500 text-[10px]">👕 ROUPAS BT</button>
                </div>
                <div id="store-grid" class="flex-grow grid grid-cols-3 gap-6 overflow-y-auto pr-4"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        let visual = { body: 1, hair: 1, tops: 1, bottoms: 1, acc: 1 };
        let currentCat = 'body';
        let isRegister = false;

        // 1. ENGINE DE CARREGAMENTO
        window.onload = () => {
            const vu = document.getElementById('vu-meter');
            for(let i=0; i<30; i++) {
                const s = document.createElement('div');
                s.className = "flex-1 bg-[#222]";
                vu.appendChild(s);
            }
            let p = 0;
            const segments = vu.children;
            const interval = setInterval(() => {
                p++;
                if(p <= segments.length) {
                    const s = segments[p-1];
                    if(p < 18) s.style.backgroundColor = "#00ff66";
                    else if(p < 26) s.style.backgroundColor = "#ffff00";
                    else s.style.backgroundColor = "#ff0000";
                }
                if(p >= segments.length + 10) {
                    clearInterval(interval);
                    document.getElementById('loading-screen').style.display = 'none';
                    checkSession();
                }
            }, 50);
        };

        // 2. TRUE LAYER ENGINE (HABBO STYLE)
        function updateRender() {
            const baseUrl = `https://api.dicebear.com/7.x/adventurer/svg?backgroundColor=transparent&seed=`;
            
            // Camadas do Boneco Principal
            document.getElementById('l-body').style.backgroundImage = `url('${baseUrl}body${visual.body}')`;
            document.getElementById('l-hair').style.backgroundImage = `url('${baseUrl}hair${visual.hair}')`;
            document.getElementById('l-tops').style.backgroundImage = `url('${baseUrl}tops${visual.tops}')`;
            document.getElementById('l-bottoms').style.backgroundImage = `url('${baseUrl}bottoms${visual.bottoms}')`;
            document.getElementById('l-acc').style.backgroundImage = `url('${baseUrl}acc${visual.acc}')`;

            // Sync HUD e Sidebar
            const finalSeed = JSON.stringify(visual);
            document.getElementById('hud-l-body').style.backgroundImage = `url('${baseUrl}body${visual.body}')`;
            document.getElementById('hud-l-tops').style.backgroundImage = `url('${baseUrl}tops${visual.tops}')`;
            document.getElementById('side-l-body').style.backgroundImage = `url('${baseUrl}body${visual.body}')`;
            document.getElementById('side-l-tops').style.backgroundImage = `url('${baseUrl}tops${visual.tops}')`;
        }

        window.setCat = (c) => { 
            currentCat = c; 
            document.querySelectorAll('.tab-icon').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            renderItems(); 
        };

        function renderItems() {
            const g = document.getElementById('item-grid'); g.innerHTML = '';
            for(let i=1; i<=30; i++) {
                // Filtro VIP (itens > 20 não aparecem no cadastro)
                if(i > 20) continue;
                const d = document.createElement('div');
                d.className = "item-box";
                d.innerHTML = `<img src="https://api.dicebear.com/7.x/adventurer/svg?seed=${currentCat}${i}&backgroundColor=transparent" class="w-16">`;
                d.onclick = () => { visual[currentCat] = i; updateRender(); };
                g.appendChild(d);
            }
        }

        // 3. AUTH & SCALE
        function checkSession() {
            onAuthStateChanged(auth, (user) => {
                document.getElementById('game-viewport').style.display = 'flex';
                scaleUI();
                if (user) {
                    document.getElementById('auth-screen').classList.add('hidden');
                    document.getElementById('app').classList.remove('hidden');
                    document.getElementById('user-display').innerText = user.email.split('@')[0].toUpperCase();
                    if(user.email === 'eahprovideo1@gmail.com') document.getElementById('admin-pad').classList.remove('hidden');
                    updateRender();
                } else {
                    document.getElementById('auth-screen').classList.remove('hidden');
                    renderItems(); updateRender();
                }
            });
        }

        window.handleAuth = async () => {
            const e = document.getElementById('u-email').value;
            const p = document.getElementById('u-pass').value;
            try {
                if(isRegister) await createUserWithEmailAndPassword(auth, e, p);
                else await signInWithEmailAndPassword(auth, e, p);
            } catch (err) { alert("ERRO: " + err.message); }
        };

        window.toggleRegMode = () => {
            isRegister = !isRegister;
            document.getElementById('btn-auth-main').innerText = isRegister ? "CADASTRAR" : "CONECTAR";
        };

        window.toggleStore = () => {
            const s = document.getElementById('store-overlay');
            s.style.display = (s.style.display === 'flex') ? 'none' : 'flex';
        };

        function scaleUI() {
            const v = document.getElementById('game-viewport');
            const s = Math.min(window.innerWidth / 1350, window.innerHeight / 850);
            v.style.transform = `scale(${s})`;
        }
        window.addEventListener('resize', scaleUI);
        window.handleLogout = () => { signOut(auth).then(() => location.reload()); };
    </script>
</body>
</html>
